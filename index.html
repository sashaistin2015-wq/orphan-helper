<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Орфанный помощник</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🧬</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0d7377; --primary-light: #14a3a8; --accent: #00b4d8; --danger: #ef4444; --success: #10b981; --warning: #f59e0b; --text: #1e293b; --text-light: #64748b; --bg: #f0f4f8; --card: #ffffff; --radius: 24px; --radius-sm: 16px; --shadow: 0 10px 30px rgba(0,0,0,0.06); }
        .dark-theme { --primary: #14a3a8; --text: #f1f5f9; --text-light: #94a3b8; --bg: #0f172a; --card: #1e293b; --shadow: 0 10px 30px rgba(0,0,0,0.3); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; transition: all 0.3s; }
        .navbar { background: rgba(255,255,255,0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); padding: 10px 0; }
        .dark-theme .navbar { background: rgba(30,41,59,0.8); }
        .navbar-brand { font-weight: 800; font-size: 1.35rem; background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .brand-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), var(--accent)); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; color: white; -webkit-text-fill-color: white; }
        .btn { border-radius: 30px; padding: 8px 20px; font-weight: 600; border: none; transition: all 0.25s; cursor: pointer; font-size: 0.9rem; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(13,115,119,0.35); }
        .btn-success { background: linear-gradient(135deg, #10b981, #34d399); color: white; }
        .btn-danger { background: linear-gradient(135deg, #ef4444, #f87171); color: white; }
        .btn-outline { border: 2px solid var(--primary); color: var(--primary); background: transparent; }
        .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 1.5rem; margin-bottom: 1.5rem; transition: transform 0.2s, box-shadow 0.2s; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 16px 48px rgba(0,0,0,0.08); }
        .dashboard-card { cursor: pointer; text-align: center; padding: 1.5rem; background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); transition: all 0.3s; }
        .dashboard-card:hover { transform: translateY(-6px); box-shadow: 0 20px 40px rgba(0,0,0,0.12); }
        .dashboard-card .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .form-control, .form-select { border-radius: var(--radius-sm); border: 2px solid #e2e8f0; padding: 11px 16px; background: var(--card); color: var(--text); width: 100%; margin-bottom: 10px; }
        .form-control:focus, .form-select:focus { border-color: var(--primary-light); outline: none; }
        .form-range { height: 8px; }
        .form-range::-webkit-slider-thumb { width: 24px; height: 24px; background: var(--primary); cursor: pointer; }
        .clock-widget { background: linear-gradient(135deg, #1e293b, #334155); color: white; border-radius: var(--radius); padding: 1.5rem; text-align: center; }
        .clock-widget .time { font-size: 2.5rem; font-weight: 800; }
        .calendar-widget { background: var(--card); border-radius: var(--radius); padding: 1.25rem; }
        .calendar-widget table { width: 100%; border-collapse: collapse; }
        .calendar-widget td { text-align: center; padding: 6px; cursor: pointer; border-radius: 10px; }
        .calendar-widget td.today { background: var(--primary); color: white; }
        .calendar-widget td.has-entry { background: var(--success); color: white; opacity: 0.7; }
        .faq-item { border-left: 3px solid var(--primary); padding: 1rem; margin-bottom: 1rem; background: var(--card); cursor: pointer; border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
        .toast { position: fixed; top: 20px; right: 20px; z-index: 9999; padding: 15px 20px; border-radius: 12px; color: white; animation: fadeInUp 0.5s ease; }
        @keyframes fadeInUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
        .hero-section { text-align: center; padding: 6rem 2rem; }
        .hero-title { font-size: 3.5rem; font-weight: 900; background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 1rem; }
        .hero-subtitle { font-size: 1.25rem; color: var(--text-light); max-width: 600px; margin: 0 auto 2rem; }
        .hero-btn { padding: 14px 40px; font-size: 1.1rem; }
        .palliative-badge { background: #fecaca; color: #991b1b; padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; }
        .reminder-badge { background: #c7d2fe; color: #3730a3; padding: 2px 8px; border-radius: 12px; font-size: 0.7rem; }
        .history-item { font-size: 0.85rem; padding: 8px 12px; border-bottom: 1px solid rgba(0,0,0,0.05); }
        footer { background: var(--card); border-top: 1px solid rgba(128,128,128,0.1); padding: 1.5rem 0; text-align: center; }
        .offcanvas { background: var(--card); color: var(--text); }
        @media (max-width: 768px) { .hero-title { font-size: 2.5rem; } .hero-section { padding: 3rem 1rem; } }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" onclick="App.navigate('/dashboard')"><span class="brand-icon">🧬</span> Орфанный помощник</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebar"><span class="navbar-toggler-icon"></span></button>
            <div class="d-none d-lg-flex ms-auto gap-1" id="navMenu"></div>
        </div>
    </nav>
    <div class="offcanvas offcanvas-start" tabindex="-1" id="sidebar"><div class="offcanvas-header"><h5>Меню</h5><button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button></div><div class="offcanvas-body" id="mobileNav"></div></div>
    <div class="container my-3" id="app"></div>
    <footer><p class="fw-bold mb-1" style="color: var(--primary);">🧬 Орфанный помощник</p><p class="text-muted small">Персонализированный помощник с паллиативным модулем</p><p class="text-muted small">Разработчик: Истин А.А. © 2026 | Научный руководитель: д.м.н. Леднева В.С.</p></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        (function() {
            const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw2kflA2T5B8XZ4HhN5jQ8t9uV3rL6mN1pR4sX8/exec';
            const SPREADSHEET_ID = '1r6wC1EEVXeBN6tymsg-J4aKBITtIwtgHkZEfoRsXFOk';
            const YANDEX_FORMS = {
                diary: { url: 'https://forms.yandex.ru/u/6a4640fbe010db3111be4d8d?iframe=true', fields: { patient: 'answer_short_text_9008982243801472', date: 'answer_short_text_9008982243933814', temperature: 'answer_short_text_9008982243865188', pressure: 'answer_short_text_9008982243959294', weight: 'answer_short_text_9008982243970860', wellbeing: 'answer_short_text_9008982243981124', symptoms: 'answer_short_text_9008982243992044' } },
                palliative: { url: 'https://forms.yandex.ru/u/6a46420d90290233739cb2dc?iframe=true', fields: { patient: 'answer_short_text_9008982244078472', date: 'answer_short_text_9008982244090874', pain: 'answer_short_text_9008982244099538', nausea: 'answer_short_text_9008982244111466', appetite: 'answer_short_text_9008982244119952', sleep: 'answer_short_text_9008982244127712', mood: 'answer_short_text_9008982244137858', dyspnea: 'answer_short_text_9008982244146280', fatigue: 'answer_short_text_9008982244158842', quality: 'answer_short_text_9008982244166458' } },
                medications: { url: 'https://forms.yandex.ru/u/6a46429602848f32aa3c608c?iframe=true', fields: { patient: 'answer_short_text_9008982244205454', date: 'answer_short_text_9008982244229810', name: 'answer_short_text_9008982244236874', dosage: 'answer_short_text_9008982244244130', time: 'answer_short_text_9008982244252698' } },
                nutrition: { url: 'https://forms.yandex.ru/u/6a46432e90fa7b3dcf51f634?iframe=true', fields: { patient: 'answer_short_text_9008982244365004', date: 'answer_short_text_9008982244372442', calories: 'answer_short_text_9008982244387096', protein: 'answer_short_text_9008982244400456', fat: 'answer_short_text_9008982244408464', carbs: 'answer_short_text_9008982244414128', notes: 'answer_short_text_9008982244427000' } },
                lab: { url: 'https://forms.yandex.ru/u/6a4643a9e010db317bbe4e0d?iframe=true', fields: { patient: 'answer_short_text_9008982244487744', date: 'answer_short_text_9008982244495464', testName: 'answer_short_text_9008982244541872', result: 'answer_short_text_9008982244551234', unit: 'answer_short_text_9008982244565678', normal: 'answer_short_text_9008982244578901', notes: 'answer_long_text_9008982244582345' } },
                timeline: { url: 'https://forms.yandex.ru/u/6a4643f5068ff032def2ae8d?iframe=true', fields: { patient: 'answer_short_text_9008982244565458', date: 'answer_short_text_9008982244572784', event: 'answer_short_text_9008982244586536', description: 'answer_long_text_9008982244595120' } }
            };
            const DB = {
                get(k) { try { return JSON.parse(localStorage.getItem(k)); } catch(e) { return null; } },
                set(k, v) { localStorage.setItem(k, JSON.stringify(v)); },
                getProfile() { return this.get('profile'); }, setProfile(p) { this.set('profile', p); },
                getData(type) { return this.get(`data_${type}`) || []; }, saveData(type, data) { this.set(`data_${type}`, data); },
                getMeds() { return this.get('medications') || []; }, saveMeds(meds) { this.set('medications', meds); },
                getAllPatients() { return this.get('all_patients') || {}; }, saveAllPatients(all) { this.set('all_patients', all); }
            };
            let profile = DB.getProfile();
            let clockTimer = null;
            let darkTheme = localStorage.getItem('darkTheme') === 'true';
            if (darkTheme) document.body.classList.add('dark-theme');

            const notify = (msg, type='success') => {
                const el = document.createElement('div'); el.className='toast';
                if (type === 'error') el.style.background = '#ef4444';
                else if (type === 'info') el.style.background = '#3b82f6';
                else el.style.background = '#10b981';
                el.innerHTML = msg; document.body.appendChild(el);
                setTimeout(()=>el.remove(), 4000);
            };
            const esc = s => { const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; };
            const fmtDate = d => new Date(d).toLocaleDateString('ru-RU', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

            async function sendToGoogleSheet(data) { try { await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(data), headers: { 'Content-Type': 'application/json' }, mode: 'no-cors' }); } catch(e) {} }
            function openYandexForm(formType, data) { const config = YANDEX_FORMS[formType]; if (!config) return notify('Форма не настроена', 'error'); const today = new Date().toISOString().split('T')[0]; const params = new URLSearchParams(); params.append(config.fields.patient, profile.fullName); params.append(config.fields.date, today); for (const [key, value] of Object.entries(data)) { if (config.fields[key]) params.append(config.fields[key], value); } window.open(config.url + '&' + params.toString(), '_blank'); notify('Форма открыта. Проверьте данные и нажмите «Отправить».'); }
            function saveLocally(type, data) { const today = new Date().toISOString().split('T')[0]; const existing = DB.getData(type); existing.push({ date: today, ...data }); DB.saveData(type, existing); }
            function registerPatientIfNeeded(patientName) { const all = DB.getAllPatients(); if (!all[patientName]) { all[patientName] = { fullName: patientName, firstSeen: new Date().toLocaleDateString('ru-RU'), birthDate: '', age: '', diagnosis: '', lastUpdate: new Date().toLocaleString('ru-RU'), diaryCount:0, palliativeCount:0, medsCount:0, nutritionCount:0, labCount:0, timelineCount:0 }; DB.saveAllPatients(all); } return all[patientName]; }
            function updatePatientStats(patientName, field) { const all = DB.getAllPatients(); if (all[patientName]) { all[patientName][field] = (all[patientName][field]||0) + 1; all[patientName].lastUpdate = new Date().toLocaleString('ru-RU'); DB.saveAllPatients(all); } }

            window.App = { navigate: page => { location.hash = '#' + page; }, logout: () => { if(clockTimer)clearInterval(clockTimer); DB.setProfile(null); profile = null; updateNav(); App.navigate('/'); } };
            function toggleTheme() { document.body.classList.toggle('dark-theme'); darkTheme = !darkTheme; localStorage.setItem('darkTheme', darkTheme); }

            async function updateNav() { const nav = document.getElementById('navMenu'); const mob = document.getElementById('mobileNav'); if (!nav) return; const items = (role) => { let html = `<button class="btn btn-sm btn-outline" onclick="App.navigate('/dashboard')"><i class="bi bi-house"></i></button><button class="btn btn-sm btn-outline" onclick="toggleTheme()"><i class="bi bi-moon-stars"></i></button>`; if (role === 'parent') { html += `<div class="dropdown d-inline"><button class="btn btn-sm btn-outline dropdown-toggle" data-bs-toggle="dropdown"><i class="bi bi-journal-medical"></i></button><ul class="dropdown-menu"><li><a class="dropdown-item" href="#" onclick="App.navigate('/diary')"><i class="bi bi-journal"></i> Дневник</a></li><li><a class="dropdown-item" href="#" onclick="App.navigate('/palliative')"><i class="bi bi-heart-pulse"></i> Паллиатив</a></li><li><a class="dropdown-item" href="#" onclick="App.navigate('/medications')"><i class="bi bi-capsule"></i> Лекарства</a></li><li><a class="dropdown-item" href="#" onclick="App.navigate('/nutrition')"><i class="bi bi-egg-fried"></i> Питание</a></li><li><a class="dropdown-item" href="#" onclick="App.navigate('/lab')"><i class="bi bi-virus"></i> Анализы</a></li><li><a class="dropdown-item" href="#" onclick="App.navigate('/timeline')"><i class="bi bi-calendar-event"></i> Таймлайн</a></li></ul></div>`; } else { html += `<button class="btn btn-sm btn-outline" onclick="App.navigate('/patients')"><i class="bi bi-people"></i></button><button class="btn btn-sm btn-outline" onclick="App.navigate('/analytics')"><i class="bi bi-graph-up"></i></button>`; } html += `<button class="btn btn-sm btn-outline" onclick="App.navigate('/reference')"><i class="bi bi-book"></i></button><button class="btn btn-sm btn-outline" onclick="App.navigate('/genetics')"><i class="bi bi-diagram-3"></i></button><button class="btn btn-sm btn-outline" onclick="App.navigate('/faq')"><i class="bi bi-question-circle"></i></button><button class="btn btn-sm btn-outline" onclick="App.navigate('/support')"><i class="bi bi-heart"></i></button><button class="btn btn-sm btn-danger" onclick="App.logout()"><i class="bi bi-box-arrow-right"></i></button>`; return html; }; if (profile) { nav.innerHTML = items(profile.role); if (mob) mob.innerHTML = items(profile.role); } else { nav.innerHTML = '<button class="btn btn-outline btn-sm" onclick="App.navigate(\'/login\')"><i class="bi bi-box-arrow-in-right"></i></button>'; if (mob) mob.innerHTML = '<button class="btn btn-outline btn-sm" onclick="App.navigate(\'/login\')"><i class="bi bi-box-arrow-in-right"></i></button>'; } }

            async function render() { await updateNav(); const page = location.hash.slice(1) || '/'; const app = document.getElementById('app'); if (!app) return; if (!profile && !['/', '/login', '/reference', '/faq', '/genetics', '/support'].includes(page)) { App.navigate('/login'); return; } switch (page) { case '/': app.innerHTML = renderWelcome(); break; case '/login': app.innerHTML = renderLogin(); setupLogin(); break; case '/dashboard': app.innerHTML = await renderDashboard(); initClock(); initCalendar(); break; case '/diary': app.innerHTML = await renderDiary(); break; case '/palliative': app.innerHTML = await renderPalliative(); break; case '/medications': app.innerHTML = await renderMedications(); break; case '/nutrition': app.innerHTML = await renderNutrition(); break; case '/lab': app.innerHTML = await renderLab(); break; case '/timeline': app.innerHTML = await renderTimeline(); break; case '/patients': app.innerHTML = await renderPatients(); break; case '/analytics': app.innerHTML = await renderAnalytics(); break; case '/reference': app.innerHTML = renderReference(); break; case '/genetics': app.innerHTML = renderGenetics(); setupGenetics(); break; case '/faq': app.innerHTML = renderFAQ(); break; case '/support': app.innerHTML = renderSupport(); break; default: app.innerHTML = '<h2 class="text-center mt-5">404</h2>'; } }

            function renderWelcome() { return `<div class="hero-section"><div style="font-size:5rem;">🧬</div><h1 class="hero-title">Орфанный помощник</h1><p class="hero-subtitle">Современный инструмент для ведения дневника здоровья и обмена данными с врачом</p><button class="btn btn-primary hero-btn" onclick="App.navigate('/login')">Войти в систему</button></div>`; }
            function renderLogin() { return `<div class="text-center mt-5"><h2>🔐 Вход</h2><div class="row justify-content-center mt-4"><div class="col-md-5 mb-3"><div class="card"><h4><i class="bi bi-person-badge"></i> Врач</h4><input id="docName" class="form-control" placeholder="ФИО"><input id="docCode" type="password" class="form-control" placeholder="Код доступа"><button class="btn btn-primary w-100" id="doctorBtn">Войти как врач</button></div></div><div class="col-md-5 mb-3"><div class="card"><h4><i class="bi bi-person"></i> Пациент</h4><input id="patName" class="form-control" placeholder="ФИО"><button class="btn btn-success w-100" id="patientBtn">Войти как пациент</button></div></div></div></div>`; }
            function setupLogin() { document.getElementById('doctorBtn')?.addEventListener('click', () => { const n = document.getElementById('docName').value.trim(); if(!n) return notify('Введите ФИО','error'); if(document.getElementById('docCode').value !== '123doc') return notify('Неверный код','error'); loginAs(n, 'doctor'); }); document.getElementById('patientBtn')?.addEventListener('click', () => { const n = document.getElementById('patName').value.trim(); if(!n) return notify('Введите ФИО','error'); loginAs(n, 'parent'); registerPatientIfNeeded(n); }); }
            function loginAs(name, role) { profile = { fullName: name, role }; DB.setProfile(profile); updateNav(); App.navigate('/dashboard'); }

            async function renderDashboard() { if (!profile) return ''; const isDoc = profile.role === 'doctor'; if (isDoc) return `<h2>👋 ${esc(profile.fullName)}</h2><p class="text-muted">Врач</p><div class="row mt-3"><div class="col-md-4 mb-3"><div class="dashboard-card" onclick="App.navigate('/patients')"><div class="icon"><i class="bi bi-people"></i></div><h5>Пациенты</h5></div></div><div class="col-md-4 mb-3"><div class="dashboard-card" onclick="App.navigate('/analytics')"><div class="icon"><i class="bi bi-graph-up"></i></div><h5>Аналитика</h5></div></div></div>`; const diary = DB.getData('diary'); const palliative = DB.getData('palliative'); const weekAgo = new Date(Date.now() - 7 * 86400000).toISOString().split('T')[0]; const recentDiary = diary.filter(e => e.date >= weekAgo); const recentPall = palliative.filter(e => e.date >= weekAgo); const avgTemp = recentDiary.length ? (recentDiary.reduce((s, e) => s + parseFloat(e.temperature||0), 0) / recentDiary.length).toFixed(1) : '—'; const avgPain = recentPall.length ? (recentPall.reduce((s, e) => s + parseFloat(e.pain||0), 0) / recentPall.length).toFixed(1) : '—'; const lastDiary = diary.slice(-5).reverse(); const lastPall = palliative.slice(-5).reverse(); return `<h2>👋 ${esc(profile.fullName)}</h2><div class="row mt-3"><div class="col-md-3 mb-3"><div class="card text-center"><i class="bi bi-thermometer-half fs-1 text-primary"></i><h5>Средняя t°</h5><div class="display-6">${avgTemp}°C</div></div></div><div class="col-md-3 mb-3"><div class="card text-center"><i class="bi bi-heart-pulse fs-1 text-danger"></i><h5>Средняя боль</h5><div class="display-6">${avgPain}</div></div></div><div class="col-md-3 mb-3"><div class="card text-center"><i class="bi bi-journal-medical fs-1 text-success"></i><h5>Записей дневника</h5><div class="display-6">${diary.length}</div></div></div><div class="col-md-3 mb-3"><div class="card text-center"><i class="bi bi-heart-pulse fs-1 text-warning"></i><h5>Паллиатив</h5><div class="display-6">${palliative.length}</div></div></div></div><div class="row mt-4"><div class="col-md-6"><div class="card"><h5>Последние записи дневника</h5>${lastDiary.map(e => `<div class="history-item">${e.date} | ${e.temperature||'—'}°C | ${e.wellbeing}/10</div>`).join('') || '<p class="text-muted">Нет записей</p>'}</div></div><div class="col-md-6"><div class="card"><h5>Последние паллиативные показатели</h5>${lastPall.map(e => `<div class="history-item">${e.date} | Боль: ${e.pain} | КЖ: ${e.quality}</div>`).join('') || '<p class="text-muted">Нет записей</p>'}</div></div></div>`; }

            async function renderDiary() { const today = new Date().toISOString().split('T')[0]; const history = DB.getData('diary').slice(-10).reverse(); let histHtml = history.map(e => `<div class="history-item"><strong>${e.date}</strong> | ${e.temperature||'—'}°C | ${e.pressure||'—'} | ${e.weight||'—'} кг | Самочувствие: ${e.wellbeing}/10</div>`).join(''); return `<h2>📋 Дневник — ${fmtDate(today)}</h2><div class="card"><form id="diaryForm"><div class="row"><div class="col-md-4"><input type="number" name="temperature" class="form-control" placeholder="Температура °C" step="0.1" min="30" max="45"></div><div class="col-md-4"><input name="pressure" class="form-control" placeholder="Давление 120/80"></div><div class="col-md-4"><input type="number" name="weight" class="form-control" placeholder="Вес (кг)" step="0.1" min="0" max="300"></div></div><label class="mt-2">Самочувствие (1-10)</label><input type="range" name="wellbeing" class="form-range" min="1" max="10" value="5"><textarea name="symptoms" class="form-control" rows="2" placeholder="Симптомы"></textarea><button type="button" class="btn btn-primary w-100 mt-2" onclick="saveDiaryLocally()">💾 Сохранить локально</button><button type="button" class="btn btn-success w-100 mt-2" onclick="sendDiary()">📤 Отправить врачу</button></form></div><div class="card mt-3"><h5>📊 История записей (последние 10)</h5>${histHtml || '<p class="text-muted">Нет записей</p>'}</div>`; }

            async function renderPalliative() { const fields = ['pain:Боль','nausea:Тошнота','appetite:Аппетит','sleep:Сон','mood:Настроение','dyspnea:Одышка','fatigue:Усталость','quality:Качество жизни']; const history = DB.getData('palliative').slice(-10).reverse(); let histHtml = history.map(e => `<div class="history-item"><strong>${e.date}</strong> | Боль: ${e.pain} | Тошнота: ${e.nausea} | Аппетит: ${e.appetite} | Сон: ${e.sleep} | Настроение: ${e.mood} | Одышка: ${e.dyspnea} | Усталость: ${e.fatigue} | КЖ: ${e.quality}</div>`).join(''); return `<h2>❤️ Паллиативный модуль</h2><div class="card"><form id="pallForm">${fields.map(f => { const [id, label] = f.split(':'); return `<label>${label} (0-10)</label><input type="range" name="${id}" class="form-range" min="0" max="10" value="5">`; }).join('')}<button type="button" class="btn btn-primary w-100 mt-2" onclick="savePalliativeLocally()">💾 Сохранить локально</button><button type="button" class="btn btn-success w-100 mt-2" onclick="sendPalliative()">📤 Отправить врачу</button></form></div><div class="card mt-3"><h5>📊 История записей (последние 10)</h5>${histHtml || '<p class="text-muted">Нет записей</p>'}</div>`; }
            window.savePalliativeLocally = function() { const f = document.getElementById('pallForm'); if(!f) return; const d = {}; ['pain','nausea','appetite','sleep','mood','dyspnea','fatigue','quality'].forEach(k => d[k] = f[k].value); saveLocally('palliative', d); updatePatientStats(profile.fullName, 'palliativeCount'); render(); };

            async function renderMedications() { const meds = DB.getMeds(); let list = meds.map((m, i) => `<div class="card mb-2"><strong>${esc(m.name)}</strong> – ${esc(m.dosage)} <span class="reminder-badge">${m.time||''}</span></div>`).join(''); return `<h2>💊 Лекарства</h2><div class="card"><form id="medsForm"><input name="name" class="form-control" placeholder="Название"><input name="dosage" class="form-control" placeholder="Дозировка"><input type="time" name="time" class="form-control" value="08:00"><button type="submit" class="btn btn-primary w-100 mt-2">➕ Добавить</button></form></div>${list || '<p>Нет лекарств</p>'}<button class="btn btn-success w-100 mt-3" onclick="sendMeds()">📤 Отправить список врачу</button>`; }
            window.sendMeds = function() { const meds = DB.getMeds(); meds.forEach(m => { openYandexForm('medications', { name: m.name, dosage: m.dosage, time: m.time }); sendToGoogleSheet({ form_name: 'Лекарства', patient: profile.fullName, med_name: m.name, dosage: m.dosage, med_time: m.time }); }); updatePatientStats(profile.fullName, 'medsCount'); };

            async function renderNutrition() { const history = DB.getData('nutrition').slice(-10).reverse(); let histHtml = history.map(e => `<div class="history-item"><strong>${e.date}</strong> | Калории: ${e.calories} | Белки: ${e.protein}г | Жиры: ${e.fat}г | Углеводы: ${e.carbs}г</div>`).join(''); return `<h2>🍽️ Питание</h2><div class="card"><form id="nutrForm"><div class="row"><div class="col-md-3"><input type="number" name="calories" class="form-control" placeholder="Ккал"></div><div class="col-md-3"><input type="number" name="protein" class="form-control" placeholder="Белки (г)"></div><div class="col-md-3"><input type="number" name="fat" class="form-control" placeholder="Жиры (г)"></div><div class="col-md-3"><input type="number" name="carbs" class="form-control" placeholder="Углеводы (г)"></div></div><textarea name="notes" class="form-control mt-2" rows="2" placeholder="Заметки"></textarea><button type="button" class="btn btn-primary w-100 mt-2" onclick="saveNutritionLocally()">💾 Сохранить локально</button><button type="button" class="btn btn-success w-100 mt-2" onclick="sendNutrition()">📤 Отправить врачу</button></form></div><div class="card mt-3"><h5>📊 История записей (последние 10)</h5>${histHtml || '<p class="text-muted">Нет записей</p>'}</div>`; }

            window.sendNutrition = function() { window.saveNutritionLocally(); const f = document.getElementById('nutrForm'); if(!f) return; const d = { calories: f.calories.value, protein: f.protein.value, fat: f.fat.value, carbs: f.carbs.value, notes: f.notes.value }; openYandexForm('nutrition', d); sendToGoogleSheet({ form_name: 'Питание', patient: profile.fullName, ...d }); };

            async function renderLab() { const history = DB.getData('lab').slice(-10).reverse(); let histHtml = history.map(e => `<div class="history-item"><strong>${e.date}</strong> | ${esc(e.testName)}: ${e.result} ${e.unit} (норма: ${e.normal||'—'})</div>`).join(''); return `<h2>🔬 Анализы</h2><div class="card"><form id="labForm"><input name="testName" class="form-control" placeholder="Название анализа"><div class="row"><div class="col-md-4"><input name="result" class="form-control" placeholder="Результат"></div><div class="col-md-4"><input name="unit" class="form-control" placeholder="Ед. изм."></div><div class="col-md-4"><input name="normal" class="form-control" placeholder="Норма"></div></div><textarea name="notes" class="form-control mt-2" rows="2" placeholder="Заметки"></textarea><button type="button" class="btn btn-primary w-100 mt-2" onclick="saveLabLocally()">💾 Сохранить локально</button><button type="button" class="btn btn-success w-100 mt-2" onclick="sendLab()">📤 Отправить врачу</button></form></div><div class="card mt-3"><h5>📊 История записей (последние 10)</h5>${histHtml || '<p class="text-muted">Нет записей</p>'}</div>`; }
            window.saveLabLocally = function() { const f = document.getElementById('labForm'); if(!f) return; saveLocally('lab', { testName: f.testName.value, result: f.result.value, unit: f.unit.value, normal: f.normal.value, notes: f.notes.value }); updatePatientStats(profile.fullName, 'labCount'); render(); };
            window.sendLab = function() { window.saveLabLocally(); const f = document.getElementById('labForm'); if(!f) return; const d = { testName: f.testName.value, result: f.result.value, unit: f.unit.value, normal: f.normal.value, notes: f.notes.value }; openYandexForm('lab', d); sendToGoogleSheet({ form_name: 'Анализы', patient: profile.fullName, ...d }); };

            async function renderTimeline() { const history = DB.getData('timeline').sort((a,b)=>new Date(b.date)-new Date(a.date)); let histHtml = history.map(e => `<div class="history-item"><strong>${e.date}</strong> — ${esc(e.event)}<br><small>${esc(e.description||'')}</small></div>`).join(''); return `<h2>📅 Таймлайн</h2><div class="card"><form id="tlForm"><input type="date" name="date" class="form-control" value="${new Date().toISOString().split('T')[0]}"><input name="event" class="form-control" placeholder="Событие"><textarea name="description" class="form-control mt-2" rows="2" placeholder="Описание"></textarea><button type="button" class="btn btn-primary w-100 mt-2" onclick="saveTimelineLocally()">💾 Сохранить локально</button><button type="button" class="btn btn-success w-100 mt-2" onclick="sendTimeline()">📤 Отправить врачу</button></form></div><div class="card mt-3"><h5>📊 История событий</h5>${histHtml || '<p class="text-muted">Нет событий</p>'}</div>`; }
            window.saveTimelineLocally = function() { const f = document.getElementById('tlForm'); if(!f) return; saveLocally('timeline', { event: f.event.value, description: f.description.value }); updatePatientStats(profile.fullName, 'timelineCount'); render(); };

            async function renderPatients() { if (profile.role !== 'doctor') return '<p>Только для врачей</p>'; const all = DB.getAllPatients(); const patients = Object.values(all); let list = patients.map(p => `<div class="card mb-3"><h5>${esc(p.fullName)}</h5><small>Обновлено: ${p.lastUpdate||'—'}</small><div class="mt-2"><span class="badge bg-primary">📋 ${p.diaryCount||0}</span><span class="badge bg-danger">❤️ ${p.palliativeCount||0}</span><span class="badge bg-info">💊 ${p.medsCount||0}</span><span class="badge bg-success">🍽️ ${p.nutritionCount||0}</span><span class="badge bg-warning">🔬 ${p.labCount||0}</span><span class="badge bg-secondary">📅 ${p.timelineCount||0}</span></div></div>`).join(''); return `<h2>👥 Мои пациенты</h2>${list || '<p>Нет пациентов</p>'}`; }
            async function renderAnalytics() { if (profile.role !== 'doctor') return '<p>Только для врачей</p>'; return `<h2>📈 Аналитика</h2><div class="card mb-3"><h5>📊 Единая таблица ответов</h5><a href="https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/edit" target="_blank" class="btn btn-outline me-2">📂 Открыть таблицу</a><a href="https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=xlsx" target="_blank" class="btn btn-success">📥 Скачать Excel</a></div><div class="card"><h5>📤 Загрузить локальный Excel</h5><input type="file" id="localExcel" accept=".xlsx,.xls" class="form-control mb-2"><button class="btn btn-primary" onclick="loadLocalExcel()">Показать данные</button><div id="excelPreview" class="mt-3"></div></div>`; }
            window.loadLocalExcel = function() { const file = document.getElementById('localExcel')?.files[0]; if (!file) return notify('Выберите файл', 'error'); const reader = new FileReader(); reader.onload = function(e) { try { const wb = XLSX.read(e.target.result, { type: 'array' }); let html = ''; wb.SheetNames.forEach(name => { const ws = wb.Sheets[name]; html += `<h6>${name}</h6><div class="table-responsive">${XLSX.utils.sheet_to_html(ws)}</div>`; }); document.getElementById('excelPreview').innerHTML = html; } catch(err) { notify('Ошибка чтения файла', 'error'); } }; reader.readAsArrayBuffer(file); };

            function renderReference() { const DISEASES = [ { id:'cf', name:'Муковисцидоз', icd:'E84', icon:'🫁', cat:'Генетические', desc:'Поражение экзокринных желез, густой секрет.', diag:'Потовый тест, CFTR.', treat:'Муколитики, CFTR-модуляторы.', gene:'CFTR (7q31.2)', mutations:'F508del (70%)' }, { id:'pku', name:'Фенилкетонурия', icd:'E70.0', icon:'🧠', cat:'Метаболические', desc:'Дефицит фенилаланингидроксилазы.', diag:'Неонатальный скрининг.', treat:'Диета с низким Phe.', gene:'PAH (12q23.2)', mutations:'R408W' }, { id:'wilson', name:'Болезнь Вильсона', icd:'E83.0', icon:'🧬', cat:'Метаболические', desc:'Накопление меди в печени, мозге.', diag:'Церулоплазмин <200 мг/л.', treat:'D-пеницилламин.', gene:'ATP7B (13q14.3)', mutations:'H1069Q' }, { id:'gaucher', name:'Болезнь Гоше', icd:'E75.2', icon:'🦴', cat:'Лизосомные', desc:'Гепатоспленомегалия, костные кризы.', diag:'β-глюкоцереброзидаза.', treat:'ФЗТ.', gene:'GBA (1q21)', mutations:'N370S' }, { id:'fabry', name:'Болезнь Фабри', icd:'E75.2', icon:'💔', cat:'Лизосомные', desc:'Акропарестезии, ангиокератомы.', diag:'α-галактозидаза.', treat:'ФЗТ.', gene:'GLA (Xq22.1)', mutations:'Более 900' } ]; return `<h2>📚 Справочник (${DISEASES.length})</h2><input id="searchDisease" class="form-control mb-3" placeholder="🔍 Поиск..." oninput="filterDiseases()"><div class="row" id="diseaseList">${DISEASES.map(d => `<div class="col-md-4 mb-3"><div class="card" onclick="notify('<strong>${d.icon} ${d.name}</strong><br>МКБ-10: ${d.icd}<br>${d.desc}<br><strong>Диагностика:</strong> ${d.diag}<br><strong>Лечение:</strong> ${d.treat}<br><strong>Ген:</strong> ${d.gene||'—'}<br><strong>Мутации:</strong> ${d.mutations||'—'}','info')" style="cursor:pointer;"><div class="card-body"><div style="font-size:2rem;">${d.icon}</div><h6>${esc(d.name)}</h6><span class="badge bg-primary">${d.icd}</span></div></div></div>`).join('')}</div>`; }
            window.filterDiseases = () => { const q = document.getElementById('searchDisease')?.value.toLowerCase()||''; document.querySelectorAll('#diseaseList .col-md-4').forEach(card => { card.style.display = card.textContent.toLowerCase().includes(q) ? '' : 'none'; }); };

            function renderGenetics() { return `<h2>🧬 Генетика</h2><div class="card"><h5>Калькулятор риска</h5><select id="inheritType" class="form-select mb-2"><option value="autosomal_recessive">Аутосомно-рецессивный</option><option value="autosomal_dominant">Аутосомно-доминантный</option><option value="x_linked">X-сцепленный</option></select><select id="fatherStatus" class="form-select mb-2"><option value="healthy">Здоров</option><option value="carrier">Носитель</option><option value="sick">Болен</option></select><select id="motherStatus" class="form-select mb-2"><option value="healthy">Здорова</option><option value="carrier">Носитель</option><option value="sick">Больна</option></select><button class="btn btn-primary w-100" onclick="calcRisk()">Рассчитать</button><div id="riskResult" class="mt-2 text-center fw-bold"></div></div>`; }
            function setupGenetics() { window.calcRisk = () => { const type = document.getElementById('inheritType')?.value; const f = document.getElementById('fatherStatus')?.value; const m = document.getElementById('motherStatus')?.value; if(!f||!m||!type) return; let risk = 0; if (type === 'autosomal_recessive') { if (f==='carrier'&&m==='carrier') risk=25; else if ((f==='sick'&&m==='carrier')||(f==='carrier'&&m==='sick')) risk=50; } else if (type === 'autosomal_dominant') { if (f==='sick'||m==='sick') risk=50; } else if (type === 'x_linked') { if (m==='carrier') risk=25; } document.getElementById('riskResult').textContent = `Вероятность: ${risk}%`; }; }

            function renderFAQ() { const FAQ = [ { q:'Как передать данные врачу?', a:'Нажмите «Отправить врачу» – откроется Яндекс.Форма с заполненными данными. Данные также автоматически попадают в Google Таблицу.' }, { q:'Где хранятся мои данные?', a:'Все записи сохраняются локально в вашем браузере. История видна в каждом модуле.' }, { q:'Что такое орфанные заболевания?', a:'Это редкие заболевания, распространённость которых не превышает 10 случаев на 100 000 населения.' }, { q:'Как получить лекарства через фонд «Круг добра»?', a:'Обратитесь к лечащему врачу для подачи заявки.' }, { q:'Как вести дневник здоровья?', a:'В разделе «Дневник» ежедневно отмечайте самочувствие, вес, симптомы.' } ]; return `<h2>❓ FAQ</h2>${FAQ.map(f => `<div class="faq-item" onclick="this.querySelector('.a').style.display=this.querySelector('.a').style.display==='block'?'none':'block'"><h6>${f.q}</h6><p class="a text-muted" style="display:none">${f.a}</p></div>`).join('')}`; }
            function renderSupport() { return `<h2>❤️ Фонд «Круг добра»</h2><div class="card"><p><i class="bi bi-telephone"></i> 8 (800) 201-62-26</p><a href="https://фондкругдобра.рф/" target="_blank" class="btn btn-primary">Перейти на сайт</a></div>`; }

            function initClock() { const update = () => { const now = new Date(); const c = document.getElementById('liveClock'), d = document.getElementById('liveDate'); if(c) c.textContent = now.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit',second:'2-digit'}); if(d) d.textContent = now.toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long',year:'numeric'}); }; update(); if(clockTimer)clearInterval(clockTimer); clockTimer = setInterval(update, 1000); }
            function initCalendar() { const cal = document.getElementById('miniCalendar'); if(!cal)return; const now = new Date(); const m = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь']; const fd = new Date(now.getFullYear(),now.getMonth(),1).getDay()||7; const days = new Date(now.getFullYear(),now.getMonth()+1,0).getDate(); const diary = DB.getData('diary'); const palliative = DB.getData('palliative'); const allDates = new Set([...diary.map(e=>e.date), ...palliative.map(e=>e.date)]); let h = `<div class="month-title">${m[now.getMonth()]} ${now.getFullYear()}</div><table><tr><th>Пн</th><th>Вт</th><th>Ср</th><th>Чт</th><th>Пт</th><th>Сб</th><th>Вс</th></tr><tr>`; for(let i=1;i<fd;i++)h+='<td></td>'; for(let d=1;d<=days;d++){if((fd+d-1)%7===1&&d>1)h+='</tr><tr>'; const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; h+=`<td class="${d===now.getDate()?'today':''} ${allDates.has(dateStr)?'has-entry':''}">${d}</td>`;} h+='</tr></table>'; cal.innerHTML = h; }

            window.onhashchange = () => { if(clockTimer)clearInterval(clockTimer); render(); };
            window.onload = render;
        })();
