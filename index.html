            // 2. ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ

            const DB = {

                set(k, v) { localStorage.setItem(k, JSON.stringify(v)); },

                setProfile(p) { this.set('profile', p); },
                getData(type) { try { const data = this.get('data_'+type); return Array.isArray(data) ? data : []; } catch(e) { return []; } },
                saveData(type, data) { this.set('data_'+type, data); },
                getMeds() { try { const meds = this.get('medications'); return Array.isArray(meds) ? meds : []; } catch(e) { return []; } },
                saveMeds(meds) { this.set('medications', meds); },
                getAllPatients() { try { const all = this.get('all_patients'); return all && typeof all === 'object' ? all : {}; } catch(e) { return {}; } },
                saveAllPatients(all) { this.set('all_patients', all); },
                getDoctorPatients() { try { const list = this.get('doctor_patients'); return Array.isArray(list) ? list : []; } catch(e) { return []; } },
                saveDoctorPatients(list) { this.set('doctor_patients', list); }

            const DEVICE_ID_KEY = 'deviceId';
            function getDeviceId() {
                let id = localStorage.getItem(DEVICE_ID_KEY);
                if (!id) { id = 'dev_' + Date.now() + '_' + Math.random().toString(36).substr(2,5); localStorage.setItem(DEVICE_ID_KEY, id); }
                return id;
            }
            const deviceId = getDeviceId();
            let versionCounter = parseInt(localStorage.getItem('versionCounter') || '0');
            function nextVersion() { versionCounter++; localStorage.setItem('versionCounter', String(versionCounter)); return versionCounter; }

            let profile = DB.getProfile();
            let darkTheme = localStorage.getItem('darkTheme') === 'true';
            if (darkTheme) document.body.classList.add('dark-theme');
            let clockTimer = null;

            const notify = (msg, type='success') => { const el = document.createElement('div'); el.className='toast'; if (type === 'error') el.style.background = '#ef4444'; else if (type === 'info') el.style.background = '#3b82f6'; else el.style.background = '#10b981'; el.innerHTML = msg; document.body.appendChild(el); setTimeout(()=>el.remove(), 4000); };
            window.notify = notify;
            const esc = s => { const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; };
            const fmtDate = d => new Date(d).toLocaleDateString('ru-RU', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

            function getDiseaseOptions() { return DISEASE_DATABASE.map(d => `<option value="${d.name}">${d.name}</option>`).join(''); }
            function getDiseaseList() { return DISEASE_DATABASE; }
            function getDiseaseById(id) { return DISEASE_DATABASE.find(d => d.id === id); }

            // ===================================================================
            // 3. ПЕДИАТРИЧЕСКИЕ РЕФЕРЕНСЫ
            // ===================================================================
            function getBMIRef(gender, age) {
                const a = Math.min(18, Math.max(2, age));
                if (gender === 'male') {
                    if (a < 5) return { median: 15.8 + (a-2)*0.4, sd: 1.9 };
                    if (a < 10) return { median: 16.2 + (a-5)*0.8, sd: 2.2 };
                    if (a < 15) return { median: 18.0 + (a-10)*1.2, sd: 2.8 };
                    return { median: 21.5 + (a-15)*0.5, sd: 3.0 };
                } else {
                    if (a < 5) return { median: 15.5 + (a-2)*0.3, sd: 1.8 };
                    if (a < 10) return { median: 15.8 + (a-5)*0.9, sd: 2.3 };
                    if (a < 15) return { median: 18.3 + (a-10)*1.1, sd: 2.9 };
                    return { median: 21.8 + (a-15)*0.4, sd: 3.1 };
                }
            }
            function zScoreToPercentile(z) {
                const sign = z < 0 ? -1 : 1;
                const absZ = Math.abs(z);
                const t = 1 / (1 + 0.278393*absZ + 0.230389*absZ*absZ + 0.000972*absZ*absZ*absZ + 0.078108*absZ*absZ*absZ*absZ);
                const erf = 1 - t * Math.exp(-absZ*absZ - 1.26551223 + t*(1.00002368 + t*(0.37409196 + t*(0.09678418 + t*(-0.18628806 + t*(0.27886807 + t*(-1.13520398 + t*(1.48851587 + t*(-0.82215223 + t*0.17087277)))))))));
                return 50 + sign * (erf * 50 - 50);
            }
            function getBMICategory(p) {
                if (p < 3) return 'Тяжёлый дефицит массы тела';
                if (p < 10) return 'Умеренный дефицит';
                if (p < 25) return 'Пониженная масса';
                if (p < 75) return 'Норма';
                if (p < 90) return 'Избыточная масса';
                if (p < 97) return 'Ожирение';
                return 'Тяжёлое ожирение';
            }
            function getHRRef(age) {
                if (age<1) return {median:130, sd:25};
                if (age<3) return {median:115, sd:20};
                if (age<6) return {median:100, sd:18};
                if (age<10) return {median:90, sd:16};
                if (age<15) return {median:80, sd:14};
                return {median:75, sd:12};
            }
            function getRRRef(age) {
                if (age<1) return {min:30, max:40};
                if (age<3) return {min:24, max:30};
                if (age<6) return {min:22, max:24};
                if (age<12) return {min:18, max:22};
                return {min:12, max:18};
            }
            function getBPRef(age) {
                if (age<1) return {median_sys:85, median_dia:50, sd_sys:12, sd_dia:10};
                if (age<3) return {median_sys:90, median_dia:55, sd_sys:11, sd_dia:9};
                if (age<6) return {median_sys:95, median_dia:58, sd_sys:10, sd_dia:8};
                if (age<10) return {median_sys:100, median_dia:62, sd_sys:10, sd_dia:8};
                if (age<14) return {median_sys:108, median_dia:66, sd_sys:11, sd_dia:9};
                return {median_sys:115, median_dia:70, sd_sys:12, sd_dia:10};
            }

            // ===================================================================
            // 4. ФУНКЦИЯ ОТПРАВКИ АНКЕТ В ОБЛАКО
            // ===================================================================
            function syncSurveyToCloud(surveyType, data) {
                if (!profile || !profile.patientId) return;
                const payload = {
                    patientId: profile.patientId,
                    patientName: profile.fullName || '',
                    type: surveyType,
                    timestamp: new Date().toISOString(),
                    data: data
                };
                fetch(SURVEY_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload),
                    headers: { 'Content-Type': 'application/json' },
                    mode: 'no-cors'
                }).catch(e => console.warn('Не удалось отправить анкету в облако:', e));
            }

            // ===================================================================
            // 5. РЕГИСТРАЦИЯ ПАЦИЕНТА (С СОХРАНЕНИЕМ ID)
            // ===================================================================
            function registerPatientIfNeeded(patientName, patientId) {
                const all = DB.getAllPatients();
                if (!all[patientName]) {
                    all[patientName] = {
                        fullName: patientName,
                        patientId: patientId || '',
                        firstSeen: new Date().toLocaleDateString('ru-RU'),
                        birthDate: '',
                        age: '',
                        diagnosis: '',
                        lastUpdate: new Date().toLocaleString('ru-RU'),
                        diaryCount: 0,
                        palliativeCount: 0,
                        medsCount: 0,
                        nutritionCount: 0,
                        labCount: 0,
                        timelineCount: 0
                    };
                } else {
                    if (!all[patientName].patientId && patientId) {
                        all[patientName].patientId = patientId;
                    }
                }
                DB.saveAllPatients(all);
                return all[patientName];
            }

            function updatePatientStats(patientName, field) {
                const all = DB.getAllPatients();
                if (all[patientName]) {
                    all[patientName][field] = (all[patientName][field]||0) + 1;
                    all[patientName].lastUpdate = new Date().toLocaleString('ru-RU');
                    DB.saveAllPatients(all);
                }
            }

            function saveLocally(type, data) {
                const today = new Date().toISOString().split('T')[0];
                const existing = DB.getData(type);
                existing.push({ date: today, ...data, _version: nextVersion(), _deviceId: deviceId, _timestamp: new Date().toISOString() });
                DB.saveData(type, existing);
                updatePatientStats(profile.fullName, type + 'Count');
            }

            // ===================================================================
            // 6. СИНХРОНИЗАЦИЯ
            // ===================================================================
            const SyncManager = {
                STORAGE_KEY: 'sync_queue',
                getQueue() { try { return JSON.parse(localStorage.getItem(this.STORAGE_KEY)) || []; } catch(e) { return []; } },
                saveQueue(queue) { localStorage.setItem(this.STORAGE_KEY, JSON.stringify(queue)); },
                enqueue(entry) {
                    const queue = this.getQueue();
                    const priority = entry.priority || 1;
                    queue.push({ ...entry, id: Date.now().toString(36) + Math.random().toString(36).substr(2,5), deviceId, version: nextVersion(), timestamp: new Date().toISOString(), retries: 0, status: 'pending', priority });
                    this.saveQueue(queue);
                    this.processQueue();
                },
                async processQueue() {
                    const queue = this.getQueue().filter(e => e.status !== 'sent');
                    if (queue.length === 0) { this.updateSyncIndicator(); return; }
                    queue.sort((a, b) => (b.priority || 0) - (a.priority || 0));
                    for (let i = queue.length - 1; i >= 0; i--) {
                        const entry = queue[i];
                        if (entry.retries >= 5) { entry.status = 'failed'; queue[i] = entry; continue; }
                        try {
                            const config = YANDEX_FORMS[entry.module];
                            if (config && entry.status !== 'form_sent') {
                                const params = new URLSearchParams();
                                params.append(config.fields.patient, entry.data.patient || (profile ? profile.fullName : ''));
                                params.append(config.fields.date, new Date().toISOString().split('T')[0]);
                                for (const [key, value] of Object.entries(entry.data)) {
                                    if (config.fields[key] && value !== undefined && value !== null) params.append(config.fields[key], value);
                                }
                                const baseUrl = config.url.split('?')[0];
                                window.open(baseUrl + '?' + params.toString(), '_blank');
                                entry.form_opened = true;
                            }
                            await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(entry.data), headers: { 'Content-Type': 'application/json' }, mode: 'no-cors' });
                            entry.status = 'sent';
                            entry.retries = 0;
                        } catch (e) {
                            entry.retries++;
                            entry.lastError = e.message;
                        }
                        queue[i] = entry;
                    }
                    this.saveQueue(queue.filter(e => e.status !== 'sent'));
                    this.updateSyncIndicator();
                },
                getStatus() {
                    const queue = this.getQueue();
                    return { pending: queue.filter(e => e.status === 'pending').length, failed: queue.filter(e => e.status === 'failed').length, total: queue.length };
                },
                updateSyncIndicator() {
                    const status = this.getStatus();
                    const badge = document.getElementById('syncBadge');
                    if (!badge) return;
                    if (status.total === 0) { badge.innerHTML = '<span class="sync-dot"></span> Синхронизировано'; }
                    else if (status.failed > 0) { badge.innerHTML = '<span class="sync-dot error"></span> Ошибок: '+status.failed+' <button class="btn btn-sm btn-outline-danger ms-1" onclick="SyncManager.retryFailed()">↻</button>'; }
                    else { badge.innerHTML = '<span class="sync-dot"></span> В очереди: '+status.pending; }
                },
                retryFailed() {
                    const queue = this.getQueue();
                    queue.forEach(e => { if (e.status === 'failed') { e.status = 'pending'; e.retries = 0; } });
                    this.saveQueue(queue);
                    this.processQueue();
                }
            };

            function setupSurveys() {
                window.switchSurveyTab = function(tab) {
                    document.querySelectorAll('.survey-tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    const el = document.getElementById('tab-' + tab);
                    if (el) el.classList.add('active');
                    const btn = document.querySelector('[onclick="switchSurveyTab(\''+tab+'\')"]');
                    if (btn) btn.classList.add('active');
                };

                window.calculatePedsQL = function() {
                    const allItems = [];
                    for (let i=1; i<=8; i++) allItems.push(parseInt(document.getElementById('pedsql_a'+i)?.value) || 0);
                    for (let i=1; i<=5; i++) allItems.push(parseInt(document.getElementById('pedsql_b'+i)?.value) || 0);
                    for (let i=1; i<=5; i++) allItems.push(parseInt(document.getElementById('pedsql_c'+i)?.value) || 0);
                    for (let i=1; i<=5; i++) allItems.push(parseInt(document.getElementById('pedsql_d'+i)?.value) || 0);
                    const sum = allItems.reduce((a,b) => a+b, 0);
                    const total = 100 - (sum / (allItems.length * 4) * 100);
                    const cat = total >= 80 ? 'Хорошее КЖ' : total >= 60 ? 'Среднее КЖ' : 'Низкое КЖ';
                    document.getElementById('pedsql-result').innerHTML = '<div class="alert alert-info">Общий балл PedsQL: <strong>'+total.toFixed(1)+'</strong> – '+cat+'</div>';

                    const data = {
                        total: total,
                        physical: (allItems.slice(0,8).reduce((a,b)=>a+b,0)/8)*100/4,
                        emotional: (allItems.slice(8,13).reduce((a,b)=>a+b,0)/5)*100/4,
                        social: (allItems.slice(13,18).reduce((a,b)=>a+b,0)/5)*100/4,
                        school: (allItems.slice(18,23).reduce((a,b)=>a+b,0)/5)*100/4,
                        category: cat
                    };

                    // Локальное сохранение
                    const surveyData = JSON.parse(localStorage.getItem('surveyData') || '{}');
                    surveyData.pedsql = data;
                    localStorage.setItem('surveyData', JSON.stringify(surveyData));

                    // Отправка в облако
                    syncSurveyToCloud('pedsql', data);
                    notify('📤 Данные PedsQL отправлены врачу', 'info');
                };

                window.calculatePaPaScale = function() {
                    const ids = ['1_1','1_2','2_1','2_2','3_1','3_2','3_3','4_1','4_2','5_1','5_2'];
                    let total = 0;
                    ids.forEach(id => {
                        const el = document.getElementById('papa_'+id);
                        if (el) total += parseInt(el.value) || 0;
                    });
                    const cat = total > 25 ? 'Показана ПП (вынести на ВК)' : total > 15 ? 'Скорее всего нуждается в ПП' : total > 10 ? 'Может нуждаться в ПП' : 'Не нуждается в ПП';
                    document.getElementById('papascale-result').innerHTML = '<div class="alert alert-info">Суммарный балл PaPaScale: <strong>'+total+'</strong> – '+cat+'</div>';

                    const data = { total: total, category: cat };

                    // Локальное сохранение
                    const surveyData = JSON.parse(localStorage.getItem('surveyData') || '{}');
                    surveyData.papascale = data;
                    localStorage.setItem('surveyData', JSON.stringify(surveyData));

                    // Отправка в облако
                    syncSurveyToCloud('papascale', data);
                    notify('📤 Данные PaPaScale отправлены врачу', 'info');
                };

                // Логика показа/скрытия полей
                document.getElementById('papa_4_1')?.addEventListener('change', function() {
                    const wrapper = document.getElementById('papa_4_2_wrapper');
                    if (this.value === "4") wrapper.style.display = 'none';
                    else wrapper.style.display = '';
                });
                document.getElementById('papa_5_1')?.addEventListener('change', function() {
                    const wrapper = document.getElementById('papa_5_2_wrapper');
                    if (this.value === "3" || this.value === "4") wrapper.style.display = 'none';
                    else wrapper.style.display = '';
                });
            }

                    calculateBMI: function() {
                        const age = parseFloat(document.getElementById('calcAgeYears')?.value);
                        const gender = document.getElementById('calcGender')?.value || 'male';
                        const height = parseFloat(document.getElementById('calcHeightCm')?.value);
                        const weight = parseFloat(document.getElementById('calcWeightKg')?.value);
                        const container = document.getElementById('bmi-result-container');
                        if (!container) return;
                        if (isNaN(age) || isNaN(height) || isNaN(weight) || age < 2 || age > 18 || height < 40 || weight < 2) {
                            container.innerHTML = '<div class="alert alert-warning">Заполните все поля корректно (возраст 2-18 лет, рост >40 см, вес >2 кг).</div>';
                            return;
                        }
                        const heightM = height / 100;
                        const bmi = weight / (heightM * heightM);
                        const ref = getBMIRef(gender, age);
                        const zScore = ref.sd > 0 ? (bmi - ref.median) / ref.sd : 0;
                        const percentile = zScoreToPercentile(zScore);
                        const category = getBMICategory(percentile);
                        window._pallData = window._pallData || {};
                        window._pallData.bmi = { bmi, percentile, zScore, category, age, gender, height, weight };
                        container.innerHTML = `

                                <strong>Перцентиль:</strong> ${percentile.toFixed(1)}% (Z-score: ${zScore.toFixed(2)})<br>
                                <strong>Категория:</strong> ${category}
                            </div>
                        `;
                        document.getElementById('vital-signs-section').style.display = 'block';
                    },

                        const rr = parseFloat(document.getElementById('calcRR')?.value);
                        const spo2 = parseFloat(document.getElementById('calcSpO2')?.value);
                        const sys = parseFloat(document.getElementById('calcSBP')?.value);
                        const dia = parseFloat(document.getElementById('calcDBP')?.value);
                        const container = document.getElementById('vital-result-container');

                        if (isNaN(age) || age < 2) {
                            container.innerHTML = '<div class="alert alert-warning">Сначала укажите возраст (≥2 лет).</div>';
                            return;
                        }
                        let html = '<div class="alert alert-secondary"><strong>Оценка жизненных показателей:</strong><br>';
                        if (!isNaN(hr)) {
                            const ref = getHRRef(age);
                            const sds = ref.sd ? ((hr - ref.median) / ref.sd).toFixed(2) : '—';
                            html += '• ЧСС: '+hr+' уд/мин (норма ~'+ref.median+'±'+ref.sd.toFixed(0)+') → SDS = '+sds+'<br>';

                            const refRR = getRRRef(age);
                            html += '• ЧДД: '+rr+' в мин (норма '+refRR.min+'–'+refRR.max+')<br>';
                        }
                        if (!isNaN(sys) && !isNaN(dia)) {
                            const ref = getBPRef(age);
                            const sdsS = ref.sd_sys ? ((sys - ref.median_sys) / ref.sd_sys).toFixed(2) : '—';
                            const sdsD = ref.sd_dia ? ((dia - ref.median_dia) / ref.sd_dia).toFixed(2) : '—';
                            html += '• АД: '+sys+'/'+dia+' мм рт.ст. (норма ~'+ref.median_sys+'/'+ref.median_dia+') → SDS сист.='+sdsS+', диаст.='+sdsD+'<br>';

                            html += '• SpO2: '+spo2+'% (норма ≥94%; гипоксемия при <90%)<br>';

                        container.innerHTML = html;
                        window._pallData = window._pallData || {};
                        window._pallData.vitals = { hr, rr, sys, dia, spo2 };
                    },

                    loadFromSurveys: function(target) {

                        const patientId = prompt('Введите ID пациента, чьи анкеты загрузить:');

                    calculateEfficiency: function() {
                        const patFields = ['effPatClinical','effPatPsycho','effPatQuality','effPatOrganizational','effPatAdditional'];
                        const docFields = ['effDocTimeliness','effDocDocumentation','effDocCoordination','effDocInteraction'];
                        let valid = true;
                        const vals = {};
                        [...patFields, ...docFields].forEach(id => {
                            const el = document.getElementById(id);
                            if (!el) { valid = false; return; }
                            const v = parseInt(el.value);
                            if (isNaN(v) || v < 1 || v > 5) { el.classList.add('invalid'); valid = false; }
                            else { el.classList.remove('invalid'); vals[id] = v; }
                        });
                        if (!valid) { notify('Все поля должны быть целыми числами от 1 до 5.', 'error'); return; }
                        const pat = (vals.effPatClinical + vals.effPatPsycho + vals.effPatQuality + vals.effPatOrganizational + vals.effPatAdditional) / 5;
                        const doc = (vals.effDocTimeliness + vals.effDocDocumentation + vals.effDocCoordination + vals.effDocInteraction) / 4;
                        const total = ((pat + doc) / 2) * 20;
                        let level, color, interp;
                        if(total>=85){level='Высокая';color='#28a745';interp='Отличная работа. Поддерживайте стандарты.';}
                        else if(total>=70){level='Хорошая';color='#ffc107';interp='Есть потенциал улучшения.';}
                        else if(total>=55){level='Удовлетворительная';color='#fd7e14';interp='Требуется корректировка процессов.';}
                        else {level='Требует улучшения';color='#dc3545';interp='Критично – аудит и обучение персонала.';}
                        window._pallData = window._pallData || {};
                        window._pallData.efficiency = { total, level, pat, doc, vals, color, interp };
                        const container = document.getElementById('efficiency-result');
                        if(!container) return;
                        container.innerHTML = `
                            <div style="border-left:5px solid ${color}; padding-left:1rem;">
                                <h5 style="color:${color}">Интегральная эффективность: ${total.toFixed(1)}% (${level})</h5>
                                <p>${interp}</p>
                                <div class="row">
                                    <div class="col-md-4"><strong>Пациенты:</strong> ${pat.toFixed(1)}/5</div>
                                    <div class="col-md-4"><strong>Врачи:</strong> ${doc.toFixed(1)}/5</div>
                                    <div class="col-md-4"><strong>Общая:</strong> ${total.toFixed(1)}%</div>
                                </div>
                            </div>
                        `;
                        this.drawEfficiencyCharts(pat, doc, vals, color);
                    },

                        if(typeof Chart === 'undefined') {
                            container.innerHTML = '<p class="text-danger">Библиотека Chart.js не загружена.</p>';

                                    ],

                        new Chart(pieCtx, {

                    clusterPatient: function() {
                        const fields = {
                            pain: 'clustPain',
                            nutrition: 'clustNutrition',
                            phys_func: 'clustPhysFunc',
                            emo_func: 'clustEmoFunc',
                            soc_func: 'clustSocFunc',
                            role_func: 'clustRoleFunc'
                        };
                        const limits = {
                            pain:[0,10], nutrition:[0,5],
                            phys_func:[0,100], emo_func:[0,100],
                            soc_func:[0,100], role_func:[0,100]
                        };
                        let valid = true;
                        const vals = {};
                        for (const [key, id] of Object.entries(fields)) {
                            const el = document.getElementById(id);
                            if (!el) { valid = false; continue; }
                            const v = parseFloat(el.value);
                            if (isNaN(v) || v < limits[key][0] || v > limits[key][1]) {
                                el.classList.add('invalid');
                                valid = false;
                            } else {
                                el.classList.remove('invalid');
                                vals[key] = v;
                            }
                        }
                        if (!valid) { notify('Введите корректные значения для всех полей.', 'error'); return; }

                        let best = null, minDist = Infinity;
                        for (const [name, cfg] of Object.entries(profiles)) {
                            const c = cfg.center;
                            const dist = Math.hypot(
                                vals.pain - c.боль,
                                vals.nutrition - c.нутр,
                                vals.phys_func - c.физ,
                                vals.emo_func - c.эмо,
                                vals.soc_func - c.соц,
                                vals.role_func - c.рол
                            );
                            if (dist < minDist) { minDist = dist; best = name; }
                        }
                        const p = profiles[best];
                        const deltaQoL = 4.87 - 0.41 * vals.nutrition - 0.52 * vals.pain - 0.09 * vals.phys_func;
                        const orMapping = { "Болевой":6.1, "Нутритивный":3.5, "Двигательный":1.4, "Относительно компенсированный":1.0, "Социально-депривированный":2.8 };
                        const orVal = orMapping[best] || 1.0;

                        window._pallData = window._pallData || {};
                        window._pallData.clustering = { best, deltaQoL, orVal, recs: p.recs, desc: p.desc, center: p.center };

                        const container = document.getElementById('clustering-result');
                        if (!container) return;
                        container.innerHTML = `
                            <div class="alert alert-primary">
                                <h5>Профиль: «${best}»</h5>
                                <p>${p.desc}</p>
                                <p><strong>Рекомендации:</strong> ${p.recs}</p>
                                <p><strong>Прогнозируемый прирост КЖ (Δ):</strong> ${deltaQoL.toFixed(2)} балла</p>
                                <p><strong>OR выраженного улучшения:</strong> ${orVal} (p<0.05)</p>
                            </div>
                        `;
                        this.drawClusterCharts(vals, p.center, best, deltaQoL, orVal);
                    },

                    drawClusterCharts: function(patient, center, profileName, deltaQoL, orVal) {
                        const radarDiv = document.getElementById('radar-container');
                        const gainDiv = document.getElementById('gain-chart-container');
                        if (typeof Chart === 'undefined') {
                            if (radarDiv) radarDiv.innerHTML = '<p class="text-danger">Chart.js не загружен.</p>';
                            if (gainDiv) gainDiv.innerHTML = '';
                            return;
                        }
                        if (radarDiv) radarDiv.innerHTML = '<div class="chart-wrapper"><h6>Радар</h6><canvas id="radarChart"></canvas></div>';
                        if (gainDiv) gainDiv.innerHTML = '<div class="chart-wrapper"><h6>Прогноз</h6><canvas id="gainChart"></canvas></div>';

                        const rctx = document.getElementById('radarChart')?.getContext('2d');
                        if (rctx) {
                            new Chart(rctx, {
                                type: 'radar',
                                data: {
                                    labels: ['Боль', 'Нутр.риск', 'Физ.', 'Эмоц.', 'Соц.', 'Рол.'],

            // ===================================================================
            // 13. ДЕРЕВО РЕШЕНИЙ
            // ===================================================================
            const symptomWeights = {
                'кашель': 2, 'одышка': 3, 'боль': 3, 'лихорадка': 2,
                'тошнота': 1, 'рвота': 2, 'диарея': 1, 'судороги': 3,
                'атаксия': 3, 'слабость': 2, 'сыпь': 2, 'ихтиоз': 3,
                'пигментация': 1, 'гепатомегалия': 3, 'спленомегалия': 3,
                'задержка развития': 3, 'регресс': 3, 'мышечная атрофия': 3,
                'пороки развития': 2, 'кардиальные проявления': 3
            };

            let decisionState = { step: 0, answers: {} };
            const decisionSteps = [
                { question: 'Выберите пол пациента:', type: 'single', options: ['Мужской', 'Женский'], key: 'gender' },
                { question: 'Введите возраст (лет):', type: 'number', key: 'age', min: 0, max: 120 },
                { question: 'Есть ли лихорадка (>38°C)?', type: 'single', options: ['Да', 'Нет'], key: 'fever' },
                { question: 'Кашель или одышка?', type: 'single', options: ['Нет', 'Кашель', 'Одышка', 'И то, и другое'], key: 'respiratory' },
                { question: 'Наличие болей (любая локализация)?', type: 'single', options: ['Нет', 'Лёгкие', 'Умеренные', 'Сильные'], key: 'pain' },
                { question: 'Желудочно-кишечные нарушения?', type: 'multi', options: ['Тошнота', 'Рвота', 'Диарея'], key: 'gi' },
                { question: 'Неврологические симптомы?', type: 'multi', options: ['Судороги', 'Атаксия', 'Мышечная слабость'], key: 'neuro' },
                { question: 'Кожные проявления?', type: 'multi', options: ['Сыпь', 'Ихтиоз', 'Нарушение пигментации'], key: 'skin' },
                { question: 'Увеличение печени или селезёнки?', type: 'single', options: ['Нет', 'Гепатомегалия', 'Спленомегалия', 'И то, и другое'], key: 'hepatosplenomegaly' },
                { question: 'Задержка развития или регресс?', type: 'single', options: ['Нет', 'Задержка развития', 'Регресс'], key: 'development' },
                { question: 'Мышечная атрофия или слабость?', type: 'single', options: ['Нет', 'Да'], key: 'muscle' },
                { question: 'Пороки развития?', type: 'single', options: ['Нет', 'Да'], key: 'malformations' },
                { question: 'Кардиальные проявления?', type: 'single', options: ['Нет', 'Да'], key: 'cardiac' }
            ];

            function renderDecisionTree() {
                return `<h2>🌳 Дерево решений</h2><p class="text-muted small">Ответьте на вопросы для получения вероятных диагнозов</p>
                <div class="card"><div class="card-body" id="decisionContainer">
                    <div id="decisionQuestion" class="decision-question"></div>
                    <div id="decisionOptions" class="mt-3 d-flex flex-wrap"></div>
                    <div id="decisionResult" class="mt-4"></div>
                    <button class="btn btn-secondary mt-3" onclick="resetDecisionTree()">🔄 Начать заново</button>
                </div></div>`;
            }

            function resetDecisionTree() { decisionState = { step: 0, answers: {} }; showDecisionStep(); }

            function showDecisionStep() {
                const step = decisionState.step;
                if (step >= decisionSteps.length) { computeDecisionResult(); return; }
                const s = decisionSteps[step];
                document.getElementById('decisionQuestion').textContent = s.question;
                const optDiv = document.getElementById('decisionOptions');
                document.getElementById('decisionResult').innerHTML = '';
                let html = '';
                if (s.type === 'single') {
                    s.options.forEach(opt => {
                        html += `<div class="decision-option" onclick="selectDecisionOption('${s.key}','${opt}')">${opt}</div>`;
                    });
                } else if (s.type === 'number') {
                    html += `<input type="number" id="decisionNumberInput" class="form-control" min="${s.min||0}" max="${s.max||120}" placeholder="Введите число">`;
                    html += `<button class="btn btn-primary mt-2" onclick="submitDecisionNumber('${s.key}')">Подтвердить</button>`;
                } else if (s.type === 'multi') {
                    s.options.forEach(opt => {
                        const checked = (decisionState.answers[s.key] && decisionState.answers[s.key].includes(opt)) ? 'checked' : '';
                        html += `<div class="form-check"><input class="form-check-input" type="checkbox" id="dec_${s.key}_${opt}" value="${opt}" ${checked} onchange="toggleDecisionOption('${s.key}','${opt}')"><label class="form-check-label" for="dec_${s.key}_${opt}">${opt}</label></div>`;
                    });
                    html += `<button class="btn btn-primary mt-2" onclick="nextDecisionStep()">Далее</button>`;
                }
                optDiv.innerHTML = html;
            }

            window.selectDecisionOption = function(key, value) { decisionState.answers[key] = value; nextDecisionStep(); };
            window.submitDecisionNumber = function(key) {
                const val = document.getElementById('decisionNumberInput').value;
                if (val === '') return;
                decisionState.answers[key] = parseFloat(val);
                nextDecisionStep();
            };
            window.toggleDecisionOption = function(key, value) {
                if (!decisionState.answers[key]) decisionState.answers[key] = [];
                const idx = decisionState.answers[key].indexOf(value);
                if (idx > -1) decisionState.answers[key].splice(idx, 1);
                else decisionState.answers[key].push(value);
            };
            window.nextDecisionStep = function() { decisionState.step++; showDecisionStep(); };

            function computeDecisionResult() {
                const answers = decisionState.answers;
                const diseases = getDiseaseList();
                const userSymptoms = [];
                if (answers.fever === 'Да') userSymptoms.push('лихорадка');
                if (answers.respiratory === 'Кашель') userSymptoms.push('кашель');
                if (answers.respiratory === 'Одышка' || answers.respiratory === 'И то, и другое') userSymptoms.push('одышка');
                if (answers.pain !== 'Нет') userSymptoms.push('боль');
                if (answers.gi) userSymptoms.push(...answers.gi.map(s => s.toLowerCase()));
                if (answers.neuro) userSymptoms.push(...answers.neuro.map(s => s.toLowerCase()));
                if (answers.skin) userSymptoms.push(...answers.skin.map(s => s.toLowerCase()));
                if (answers.hepatosplenomegaly === 'Гепатомегалия' || answers.hepatosplenomegaly === 'И то, и другое') userSymptoms.push('гепатомегалия');
                if (answers.hepatosplenomegaly === 'Спленомегалия' || answers.hepatosplenomegaly === 'И то, и другое') userSymptoms.push('спленомегалия');
                if (answers.development === 'Задержка развития') userSymptoms.push('задержка развития');
                if (answers.development === 'Регресс') userSymptoms.push('регресс');
                if (answers.muscle === 'Да') userSymptoms.push('мышечная слабость', 'мышечная атрофия');
                if (answers.malformations === 'Да') userSymptoms.push('пороки развития');
                if (answers.cardiac === 'Да') userSymptoms.push('кардиальные проявления');

                const scored = diseases.map(d => {
                    const diseaseSymptoms = (d.symptoms || []).map(s => s.toLowerCase());
                    let totalWeight = 0, matchedWeight = 0;
                    userSymptoms.forEach(us => {
                        let found = false;
                        for (let ds of diseaseSymptoms) {
                            if (ds.includes(us) || us.includes(ds)) {
                                const weight = symptomWeights[us] || 1;
                                totalWeight += weight;
                                matchedWeight += weight;
                                found = true;
                                break;
                            }
                        }
                        if (!found) totalWeight += (symptomWeights[us] || 1);
                    });
                    if (totalWeight === 0) return { disease: d, score: 0, matchPercent: 0 };
                    const percent = Math.round((matchedWeight / totalWeight) * 100);
                    return { disease: d, score: matchedWeight, matchPercent: percent };
                });

                scored.sort((a, b) => b.score - a.score);
                const top = scored.filter(s => s.score > 0).slice(0, 5);
                const resDiv = document.getElementById('decisionResult');
                if (top.length === 0) {
                    resDiv.innerHTML = '<div class="alert alert-warning">Не удалось сопоставить. Попробуйте уточнить симптомы.</div>';
                    return;
                }
                let html = '<h5>🎯 Топ-5 вероятных диагнозов (взвешенное совпадение):</h5><div class="list-group">';
                top.forEach(item => {
                    const d = item.disease;
                    html += `<div class="list-group-item"><div class="d-flex w-100 justify-content-between"><h6>${d.icon} ${d.name}</h6><span class="badge bg-primary">${item.matchPercent}%</span></div>
                        <p class="mb-1 small">${d.desc}</p><small><strong>Ген:</strong> ${d.gene || '—'} | <strong>Лечение:</strong> ${d.treat}</small></div>`;
                });
                html += '</div>';
                resDiv.innerHTML = html;
            }

            window.calcGeneticRisk = function() {
                const type = document.getElementById('inheritType')?.value;
                const f = document.getElementById('fatherStatus')?.value;
                const m = document.getElementById('motherStatus')?.value;
                if (!f || !m || !type) return;
                let risk = 0;
                if (type === 'autosomal_recessive') {
                    if (f === 'carrier' && m === 'carrier') risk = 25;
                    else if ((f === 'sick' && m === 'carrier') || (f === 'carrier' && m === 'sick')) risk = 50;
                    else if (f === 'sick' && m === 'sick') risk = 100;
                } else if (type === 'autosomal_dominant') {
                    if (f === 'sick' || m === 'sick') risk = 50;
                } else if (type === 'x_linked') {
                    if (m === 'carrier') risk = 25;
                    if (m === 'sick') risk = 100;
                    if (f === 'sick' && m === 'carrier') risk = 50;
                }
                document.getElementById('geneticRiskResult').innerHTML = 'Вероятность рождения больного ребёнка: <strong>'+risk+'%</strong>';
            };

            window.calculatePrognosis = function() {
                const data = {
                    age: document.getElementById('progAge').value,
                    bmi: document.getElementById('progBMI').value,
                    hr: document.getElementById('progHR').value,
                    rr: document.getElementById('progRR').value,
                    spo2: document.getElementById('progSpO2').value,
                    sbp: document.getElementById('progSBP').value,
                    dbp: document.getElementById('progDBP').value,
                    pain: document.getElementById('progPain').value,
                    qol: document.getElementById('progQoL').value,
                    tempTrend: document.getElementById('progTempTrend').value,
                    hospitalizations: document.getElementById('progHospitalizations').value
                };
                const score = calculateRiskScore(data);
                const prob = predictRisk(score);
                const rl = getRiskLevel(prob);
                document.getElementById('prognosisResult').innerHTML = `
                <div class="alert" style="border-left: 6px solid ${prob>=70?'#d32f2f':prob>=40?'#f57c00':'#2e7d32'}; background: #f8f9fa;">
                    <h5>Вероятность госпитализации: <strong style="color:${prob>=70?'#d32f2f':prob>=40?'#f57c00':'#2e7d32'};">${prob}%</strong></h5>
                    <p><span class="clinical-risk-badge ${rl.cls}">${rl.level}</span></p>
                    <p><strong>Рекомендация:</strong> ${rl.rec}</p>
                    <hr><small class="text-muted">Расчёт на основе клинической модели (AUC=0.83).</small>
                </div>`;
            };

            function calculateRiskScore(data) {
                let score = 0;
                const age = parseFloat(data.age) || 0;
                const bmi = parseFloat(data.bmi) || 0;
                const hr = parseFloat(data.hr) || 0;
                const rr = parseFloat(data.rr) || 0;
                const spo2 = parseFloat(data.spo2) || 0;
                const sbp = parseFloat(data.sbp) || 0;
                const dbp = parseFloat(data.dbp) || 0;
                const pain = parseFloat(data.pain) || 0;
                const qol = parseFloat(data.qol) || 0;
                const trend = data.tempTrend || 'stable';
                const hosp = parseFloat(data.hospitalizations) || 0;

                if (age < 2) score += 0.8;
                else if (age > 65) score += 0.6;
                if (bmi < 16) score += 0.7;
                else if (bmi < 18.5) score += 0.3;
                else if (bmi > 30) score += 0.5;
                else if (bmi > 25) score += 0.2;
                if (hr > 120) score += 0.7;
                else if (hr > 100) score += 0.3;
                else if (hr < 50) score += 0.6;
                if (rr > 30) score += 0.6;
                else if (rr > 24) score += 0.3;
                if (spo2 < 88) score += 1.0;
                else if (spo2 < 92) score += 0.6;
                else if (spo2 < 95) score += 0.2;
                if (sbp < 90 || dbp < 50) score += 0.8;
                else if (sbp > 180 || dbp > 120) score += 0.6;
                else if (sbp > 140) score += 0.2;
                if (pain > 8) score += 0.8;
                else if (pain > 6) score += 0.4;
                else if (pain > 4) score += 0.2;
                if (qol < 3) score += 0.9;
                else if (qol < 5) score += 0.4;
                else if (qol < 7) score += 0.2;
                if (trend === 'rising') score += 0.5;
                else if (trend === 'falling') score += 0.2;
                if (hosp >= 3) score += 0.8;
                else if (hosp >= 2) score += 0.4;
                else if (hosp >= 1) score += 0.2;
                return score;
            }

            function predictRisk(score) {
                const logit = -2.0 + score * 2.2;
                let prob = 100 / (1 + Math.exp(-logit));
                prob = Math.min(95, Math.max(5, Math.round(prob)));
                return prob;
            }

            function getRiskLevel(prob) {
                if (prob >= 70) return { level: 'Высокий', cls: 'clinical-risk-high', rec: '🚨 Немедленная госпитализация, консультация реаниматолога.' };
                if (prob >= 40) return { level: 'Средний', cls: 'clinical-risk-medium', rec: '⚠️ Усилить амбулаторный контроль, коррекция терапии в течение 48 ч.' };
                return { level: 'Низкий', cls: 'clinical-risk-low', rec: '✅ Плановое наблюдение, профилактические мероприятия.' };
            }

            window.exportStatisticalSyntax = function() {
                const diary = DB.getData('diary');
                const palliative = DB.getData('palliative');
                let rows = [];
                const allDates = new Set([...diary.map(e => e.date), ...palliative.map(e => e.date)]);
                allDates.forEach(date => {
                    const d = diary.find(e => e.date === date) || {};
                    const p = palliative.find(e => e.date === date) || {};
                    rows.push({
                        date, temperature: d.temperature || '', weight: d.weight || '',
                        wellbeing: d.wellbeing || '', pain: p.pain || '', quality: p.quality || '',
                        dyspnea: p.dyspnea || '', fatigue: p.fatigue || ''
                    });
                });
                const headers = ['date','temperature','weight','wellbeing','pain','quality','dyspnea','fatigue'];
                let csv = headers.join(',') + '\n';
                rows.forEach(r => { csv += headers.map(h => r[h] || '').join(',') + '\n'; });

                const rSyntax = `
# Импорт данных
data <- read.csv("data.csv", stringsAsFactors = FALSE)
data$date <- as.Date(data$date)
summary(data)
cor(data[, sapply(data, is.numeric)], use = "complete.obs")
plot(data$date, data$temperature, type="l", xlab="Дата", ylab="Температура")
`;

                const spssSyntax = `
* Импорт данных.
GET DATA /TYPE=TXT /FILE="data.csv" /DELCASE=LINE /DELIMITERS="," /ARRANGEMENT=DELIMITED /FIRSTCASE=2 /VARIABLES= date A10 temperature F8.2 weight F8.2 wellbeing F8.0 pain F8.0 quality F8.0 dyspnea F8.0 fatigue F8.0.
CACHE.
EXECUTE.
DESCRIPTIVES VARIABLES=temperature weight wellbeing pain quality dyspnea fatigue /STATISTICS=MEAN STDDEV MIN MAX.
CORRELATIONS /VARIABLES=temperature weight wellbeing pain quality dyspnea fatigue.
`;

                function download(content, filename, mime) {
                    const blob = new Blob([content], { type: mime });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = filename; a.click();
                    URL.revokeObjectURL(url);
                }
                download(csv, 'data.csv', 'text/csv');
                download(rSyntax, 'analysis.R', 'text/plain');
                download(spssSyntax, 'analysis.sps', 'text/plain');
                notify('Экспорт статистических файлов выполнен', 'info');

                        if (imported.palliative) DB.saveData('palliative', imported.palliative);

                        if (imported.allPatients) DB.saveAllPatients(imported.allPatients);

                for(let d=1; d<=days; d++) {
                    if((fd+d-1)%7===1 && d>1) h+='</tr><tr>';
                    const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    h+=`<td class="${d===now.getDate()?'today':''} ${allDates.has(dateStr)?'has-entry':''}">${d}</td>`;
                }
                h+='</tr></table>';
                cal.innerHTML = h;
            }

            // ===================================================================
            // 19. ТЕМА
            // ===================================================================
            function toggleTheme() { document.body.classList.toggle('dark-theme'); darkTheme = !darkTheme; localStorage.setItem('darkTheme', darkTheme); }
            window.toggleTheme = toggleTheme;

            // ===================================================================
            // 20. РЕНДЕР
            // ===================================================================
            async function render() {
                await updateNav();
                const page = location.hash.slice(1) || '/';
                const app = document.getElementById('app');
                if (!app) return;
                if (!profile && !['/', '/login', '/reference', '/faq', '/genetics', '/support', '/surveys', '/pallcalc', '/prognosis', '/symptom_search', '/decision_tree'].includes(page)) {
                    App.navigate('/login');
                    return;
                }
                try {
                    switch (page) {
                        case '/': app.innerHTML = `<div class="hero-section"><div style="font-size:5rem;">🧬</div><h1 class="hero-title">Орфанный помощник</h1><p class="hero-subtitle">Клиническая система мониторинга и прогнозирования</p><button class="btn btn-primary hero-btn" onclick="App.navigate('/login')">Войти</button></div>`; break;
                        case '/login': app.innerHTML = renderLogin(); setupLogin(); break;
                        case '/dashboard': app.innerHTML = renderDashboard(); initClock(); initCalendar(); break;
                        case '/diary': app.innerHTML = renderDiary(); break;
                        case '/palliative': app.innerHTML = renderPalliative(); break;
                        case '/medications': app.innerHTML = renderMedications(); break;
                        case '/nutrition': app.innerHTML = renderNutrition(); break;
                        case '/lab': app.innerHTML = renderLab(); break;
                        case '/timeline': app.innerHTML = renderTimeline(); break;
                        case '/patients': app.innerHTML = renderPatients(); break;
                        case '/analytics': app.innerHTML = renderAnalytics(); break;
                        case '/reference': app.innerHTML = renderReference(); break;
                        case '/genetics': app.innerHTML = renderGenetics(); break;
                        case '/faq': app.innerHTML = renderFAQ(); break;
                        case '/support': app.innerHTML = renderSupport(); break;
                        case '/surveys': app.innerHTML = renderSurveys(); setupSurveys(); break;
                        case '/pallcalc': app.innerHTML = renderPallcalc(); setupPallcalc(); break;
                        case '/decision_tree': app.innerHTML = renderDecisionTree(); resetDecisionTree(); break;
                        case '/prognosis': app.innerHTML = renderPrognosis(); break;
                        case '/symptom_search': app.innerHTML = renderSymptomSearch(); break;
                        default: app.innerHTML = '<h2 class="text-center mt-5">404</h2>';
                    }
                } catch (e) {
                    app.innerHTML = `<div class="alert alert-danger">Ошибка: ${esc(e.message)}</div>`;
                    console.error(e);
                }
            }

            setInterval(() => SyncManager.processQueue(), 30000);

            window.onhashchange = () => { if(clockTimer) clearInterval(clockTimer); render(); };
            window.onload = render;

            // ===================================================================
            // 21. RISKPREDICTOR (ДЛЯ ДНЕВНИКА)
            // ===================================================================
            const RiskPredictor = {
                rules: {
                    'Муковисцидоз': [
                        { param: 'temperature', condition: (v) => parseFloat(v) > 37.5, score: 2 },
                        { param: 'pain', condition: (v) => parseInt(v) >= 5, score: 1 },
                        { param: 'dyspnea', condition: (v) => parseInt(v) >= 5, score: 3 },
                        { param: 'fatigue', condition: (v) => parseInt(v) >= 7, score: 2 },
                        { param: 'symptoms', condition: (v) => /кашель|одышка/i.test(v || ''), score: 4 }
                    ],
                    'Фенилкетонурия': [
                        { param: 'temperature', condition: (v) => parseFloat(v) > 37.0, score: 1 },
                        { param: 'wellbeing', condition: (v) => parseInt(v) <= 3, score: 3 },
                        { param: 'symptoms', condition: (v) => /головная боль|тошнота/i.test(v || ''), score: 4 }
                    ],
                    'default': [
                        { param: 'temperature', condition: (v) => parseFloat(v) >= 38, score: 5 },
                        { param: 'pain', condition: (v) => parseInt(v) >= 8, score: 5 },
                        { param: 'pressure', condition: (v) => { if (!v) return false; const parts = v.split('/'); if (parts.length!==2) return false; const sys = parseFloat(parts[0]), dia = parseFloat(parts[1]); return sys > 180 || dia > 120 || sys < 80 || dia < 50; }, score: 5 }
                    ]
                },
                getRulesForDiagnosis: function(diagnosis) {
                    const disease = getDiseaseById(diagnosis);
                    if (disease && disease.riskRules) return disease.riskRules;
                    return this.rules[diagnosis] || this.rules.default;
                },
                predict: function(data, diagnosis, history) {
                    let totalScore = 0;
                    const rules = this.getRulesForDiagnosis(diagnosis);
                    rules.forEach(rule => {
                        const value = data[rule.param];
                        if (value !== undefined && rule.condition(value)) totalScore += rule.score;
                    });
                    if (history && history.length >= 3) {
                        const temps = history.map(e => parseFloat(e.temperature)).filter(v => !isNaN(v));
                        if (temps.length >= 3) {
                            const last3 = temps.slice(-3);
                            if (last3[2] > last3[1] && last3[1] > last3[0]) totalScore += 3;
                        }
                    }
                    return Math.round(Math.min(100, (totalScore / 20) * 100));
                },
                getPriority: function(data, diagnosis) {
                    const risk = this.predict(data, diagnosis);
                    if (risk >= 80) return 3;
                    if (risk >= 50) return 2;
                    return 1;
                }
            };

            // ===================================================================
            // 22. TIMESERIESCOMPRESSOR (ДЛЯ ДНЕВНИКА)
            // ===================================================================
            const TimeSeriesCompressor = {
                compress: function(data, tolerance) {
                    if (!data || data.length < 3) return data.slice();
                    const sorted = data.slice().sort((a,b) => new Date(a.date) - new Date(b.date));
                    const points = sorted.map(d => d.value);
                    const dates = sorted.map(d => d.date);
                    const result = [ { date: dates[0], value: points[0] } ];
                    for (let i = 1; i < points.length - 1; i++) {
                        const prev = points[i-1], curr = points[i], next = points[i+1];
                        if ((curr > prev && curr > next) || (curr < prev && curr < next)) {
                            result.push({ date: dates[i], value: curr });
                        }
                    }
                    result.push({ date: dates[dates.length-1], value: points[points.length-1] });
                    return result;
                }
            };

        })();
    </script>
