<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Орфанный помощник</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🧬</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #93c5fd;
            --secondary: #0ea5e9;
            --success: #22c55e;
            --warning: #eab308;
            --danger: #ef4444;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --gray-400: #94a3b8;
            --gray-500: #64748b;
            --gray-600: #475569;
            --gray-700: #334155;
            --gray-800: #1e293b;
            --gray-900: #0f172a;
            --radius: 16px;
            --shadow: 0 4px 24px rgba(0,0,0,0.06);
            --shadow-lg: 0 8px 40px rgba(0,0,0,0.10);
            --transition: all 0.25s ease;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background: var(--gray-50);
            color: var(--gray-800);
            font-size: 0.875rem;
            line-height: 1.6;
        }
        .navbar {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--gray-200);
            padding: 0.5rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.15rem;
            color: var(--gray-900);
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }
        .navbar-brand .brand-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            background: var(--primary);
            border-radius: 10px;
            font-size: 1.1rem;
            color: white;
        }
        .btn {
            border-radius: 10px;
            padding: 6px 16px;
            font-weight: 500;
            font-size: 0.8rem;
            transition: var(--transition);
            border: none;
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
        }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
        .btn-outline-primary {
            background: transparent;
            color: var(--primary);
            border: 1.5px solid var(--primary);
        }
        .btn-outline-primary:hover { background: var(--primary); color: #fff; }
        .btn-success { background: var(--success); color: #fff; }
        .btn-success:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-danger:hover { opacity: 0.9; }
        .btn-outline-secondary {
            background: transparent;
            color: var(--gray-600);
            border: 1px solid var(--gray-300);
        }
        .btn-outline-secondary:hover { background: var(--gray-100); }
        .btn-sm { padding: 4px 12px; font-size: 0.75rem; }
        .form-control, .form-select {
            border-radius: 10px;
            border: 1.5px solid var(--gray-200);
            padding: 8px 14px;
            font-size: 0.85rem;
            background: #fff;
            transition: var(--transition);
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
            outline: none;
        }
        .form-label { font-weight: 500; font-size: 0.8rem; color: var(--gray-600); margin-bottom: 4px; }
        .card {
            background: #fff;
            border-radius: var(--radius);
            border: 1px solid var(--gray-200);
            box-shadow: var(--shadow);
            padding: 1.25rem;
            margin-bottom: 1.25rem;
            transition: var(--transition);
        }
        .card:hover { box-shadow: var(--shadow-lg); }
        .card-header {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--gray-800);
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--gray-200);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-header i { color: var(--primary); font-size: 1.1rem; }
        .stat-card {
            background: #fff;
            border-radius: var(--radius);
            border: 1px solid var(--gray-200);
            padding: 1.25rem;
            text-align: center;
            transition: var(--transition);
        }
        .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
        .stat-card .stat-icon { font-size: 1.8rem; margin-bottom: 4px; }
        .stat-card .stat-value { font-size: 1.8rem; font-weight: 700; color: var(--gray-900); }
        .stat-card .stat-label { font-size: 0.75rem; color: var(--gray-500); }
        .stat-card.primary .stat-icon { color: var(--primary); }
        .stat-card.success .stat-icon { color: var(--success); }
        .stat-card.warning .stat-icon { color: var(--warning); }
        .stat-card.danger .stat-icon { color: var(--danger); }
        .stat-card.info .stat-icon { color: var(--secondary); }
        .badge {
            border-radius: 20px;
            padding: 3px 12px;
            font-weight: 500;
            font-size: 0.7rem;
        }
        .badge-primary { background: var(--primary-light); color: var(--primary-dark); }
        .badge-success { background: #bbf7d0; color: #166534; }
        .badge-warning { background: #fde68a; color: #92400e; }
        .badge-danger { background: #fecaca; color: #991b1b; }
        .badge-info { background: #bfdbfe; color: #1e40af; }
        .badge-gray { background: var(--gray-200); color: var(--gray-600); }
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid var(--gray-100);
            font-size: 0.82rem;
        }
        .history-item:last-child { border-bottom: none; }
        .history-item .date { color: var(--gray-500); font-size: 0.7rem; }
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 9999;
            padding: 12px 20px;
            border-radius: 12px;
            color: #fff;
            font-weight: 500;
            font-size: 0.85rem;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.35s ease;
            max-width: 400px;
        }
        .toast-success { background: var(--success); }
        .toast-error { background: var(--danger); }
        .toast-info { background: var(--primary); }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .hero-section {
            text-align: center;
            padding: 4rem 1rem 3rem;
            max-width: 600px;
            margin: 0 auto;
        }
        .hero-section .hero-icon { font-size: 4rem; margin-bottom: 0.5rem; }
        .hero-section .hero-title {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero-section .hero-subtitle {
            color: var(--gray-500);
            font-size: 1.05rem;
            margin: 0.5rem 0 1.5rem;
        }
        .tab-btn {
            border-radius: 10px 10px 0 0;
            padding: 6px 16px;
            font-weight: 500;
            font-size: 0.8rem;
            border: none;
            background: transparent;
            color: var(--gray-500);
            cursor: pointer;
            transition: var(--transition);
            border-bottom: 2px solid transparent;
        }
        .tab-btn:hover { color: var(--gray-800); }
        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .gene-card {
            border-left: 3px solid var(--primary);
            padding: 0.75rem 1rem;
            background: var(--gray-50);
            border-radius: 0 10px 10px 0;
            margin-bottom: 0.6rem;
        }
        .gene-card .gene-name { font-weight: 600; }
        .gene-card .gene-meta { font-size: 0.75rem; color: var(--gray-500); }
        .faq-item {
            border: 1px solid var(--gray-200);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            margin-bottom: 0.6rem;
            cursor: pointer;
            transition: var(--transition);
        }
        .faq-item:hover { border-color: var(--primary-light); }
        .faq-item .faq-q {
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .faq-item .faq-a {
            display: none;
            padding-top: 0.6rem;
            margin-top: 0.6rem;
            border-top: 1px solid var(--gray-200);
            color: var(--gray-600);
            font-size: 0.85rem;
        }
        .faq-item.open .faq-a { display: block; }
        .faq-item .faq-toggle { color: var(--gray-400); font-size: 0.8rem; transition: var(--transition); }
        .faq-item.open .faq-toggle { transform: rotate(180deg); }
        .params-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 0.8rem; }
        .param-field label { font-weight: 500; font-size: 0.75rem; color: var(--gray-600); display: block; margin-bottom: 2px; }
        .param-field .form-control { height: 38px; }
        .decision-option {
            display: inline-block;
            padding: 8px 18px;
            margin: 4px 6px 4px 0;
            background: #fff;
            border: 2px solid var(--gray-200);
            border-radius: 10px;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 500;
            font-size: 0.8rem;
        }
        .decision-option:hover { border-color: var(--primary); background: var(--primary-light); }
        .decision-option.selected { border-color: var(--primary); background: var(--primary); color: #fff; }
        .decision-question {
            font-size: 1rem;
            font-weight: 600;
            padding: 12px 16px;
            background: var(--gray-50);
            border-radius: 10px;
            border-left: 4px solid var(--primary);
            margin-bottom: 1rem;
        }
        .risk-badge {
            padding: 4px 14px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.75rem;
            display: inline-block;
        }
        .risk-badge.low { background: #bbf7d0; color: #166534; }
        .risk-badge.medium { background: #fde68a; color: #92400e; }
        .risk-badge.high { background: #fecaca; color: #991b1b; }
        .chart-box { display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 1rem; }
        .chart-wrapper { flex: 1; min-width: 200px; background: var(--gray-50); border-radius: 10px; padding: 0.8rem; }
        .clock-widget {
            background: linear-gradient(135deg, var(--gray-800), var(--gray-900));
            color: #fff;
            border-radius: var(--radius);
            padding: 1.25rem;
            text-align: center;
        }
        .clock-widget .time { font-size: 2.2rem; font-weight: 700; letter-spacing: 1px; }
        .clock-widget .date { font-size: 0.85rem; opacity: 0.7; }
        .calendar-widget {
            background: #fff;
            border-radius: var(--radius);
            border: 1px solid var(--gray-200);
            padding: 0.8rem;
        }
        .calendar-widget table { width: 100%; border-collapse: collapse; }
        .calendar-widget th { font-weight: 500; font-size: 0.7rem; color: var(--gray-500); padding: 4px; text-align: center; }
        .calendar-widget td {
            text-align: center;
            padding: 4px;
            font-size: 0.75rem;
            border-radius: 6px;
            cursor: default;
        }
        .calendar-widget td.today { background: var(--primary); color: #fff; font-weight: 600; }
        .calendar-widget td.has-entry { background: var(--success); color: #fff; opacity: 0.7; }
        .calendar-widget .month-title { text-align: center; font-weight: 600; margin-bottom: 6px; font-size: 0.9rem; }
        .password-wrapper { position: relative; }
        .password-wrapper .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--gray-400);
            background: none;
            border: none;
        }
        footer {
            background: #fff;
            border-top: 1px solid var(--gray-200);
            padding: 1.5rem 0;
            text-align: center;
            font-size: 0.8rem;
            color: var(--gray-500);
            margin-top: 2rem;
        }
        footer strong { color: var(--gray-700); }
        .offcanvas { background: #fff; }
        .offcanvas .btn-close:focus { box-shadow: none; }
        @media (max-width: 768px) {
            .hero-section .hero-title { font-size: 1.8rem; }
            .stat-card .stat-value { font-size: 1.4rem; }
            .params-grid { grid-template-columns: 1fr; }
            .navbar-brand { font-size: 0.95rem; }
            .navbar-brand .brand-icon { width: 28px; height: 28px; font-size: 0.9rem; }
        }
        .disease-card { cursor: pointer; transition: var(--transition); }
        .disease-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
        .disease-card .disease-details { display: none; padding-top: 8px; margin-top: 8px; border-top: 1px solid var(--gray-200); }
        .disease-card.active .disease-details { display: block; }
        .pallcalc-tab, .survey-tab { display: none; }
        .pallcalc-tab.active, .survey-tab.active { display: block; }
        .pallcalc-card {
            background: #fff;
            border-radius: var(--radius);
            padding: 1.25rem;
            border: 1px solid var(--gray-200);
            margin-bottom: 1rem;
        }
        .section-title {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--gray-800);
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title i { color: var(--primary); }
        .clinical-risk-high { background: #fecaca; color: #991b1b; padding: 4px 14px; border-radius: 20px; font-weight: 600; font-size: 0.75rem; display: inline-block; }
        .clinical-risk-medium { background: #fde68a; color: #92400e; padding: 4px 14px; border-radius: 20px; font-weight: 600; font-size: 0.75rem; display: inline-block; }
        .clinical-risk-low { background: #bbf7d0; color: #166534; padding: 4px 14px; border-radius: 20px; font-weight: 600; font-size: 0.75rem; display: inline-block; }
        .support-card { border-left: 3px solid var(--primary); padding: 1rem; background: var(--gray-50); border-radius: 0 10px 10px 0; margin-bottom: 0.8rem; }
        .support-card .support-title { font-weight: 600; }
    </style>
</head>

    function getBMIRef(gender, age) {
        const a = Math.min(18, Math.max(2, age));
        if (gender === 'male') {
            if (a < 5) return { median: 15.8 + (a-2)*0.4, sd: 1.9 };
            if (a < 10) return { median: 16.2 + (a-5)*0.8, sd: 2.2 };
            if (a < 15) return { median: 18.0 + (a-10)*1.2, sd: 2.8 };
            return { median: 21.5 + (a-15)*0.5, sd: 3.0 };
        } else {
            if (a < 5) return { median: 15.5 + (a-2)*0.3, sd: 1.8 };
            if (a < 10) return { median: 15.8 + (a-5)*0.9, sd: 2.3 };
            if (a < 15) return { median: 18.3 + (a-10)*1.1, sd: 2.9 };
            return { median: 21.8 + (a-15)*0.4, sd: 3.1 };
        }
    }
    function zScoreToPercentile(z) {
        const sign = z < 0 ? -1 : 1;
        const absZ = Math.abs(z);
        const t = 1 / (1 + 0.278393*absZ + 0.230389*absZ*absZ + 0.000972*absZ*absZ*absZ + 0.078108*absZ*absZ*absZ*absZ);
        const erf = 1 - t * Math.exp(-absZ*absZ - 1.26551223 + t*(1.00002368 + t*(0.37409196 + t*(0.09678418 + t*(-0.18628806 + t*(0.27886807 + t*(-1.13520398 + t*(1.48851587 + t*(-0.82215223 + t*0.17087277)))))))));
        return 50 + sign * (erf * 50 - 50);
    }

        if (p < 10) return 'Умеренный дефицит';

        if (p < 75) return 'Норма';

        if (p < 97) return 'Ожирение';
        return 'Тяжёлое ожирение';
    }

    const SyncManager = {
        STORAGE_KEY: 'sync_queue',
        getQueue() { try { return JSON.parse(localStorage.getItem(this.STORAGE_KEY)) || []; } catch(e) { return []; } },
        saveQueue(queue) { localStorage.setItem(this.STORAGE_KEY, JSON.stringify(queue)); },
        enqueue(entry) {
            const queue = this.getQueue();
            queue.push({ ...entry, id: Date.now().toString(36)+Math.random().toString(36).substr(2,5), deviceId, timestamp: new Date().toISOString(), retries:0, status:'pending', priority: entry.priority || 1 });
            this.saveQueue(queue);
            this.processQueue();
        },
        async processQueue() {
            const queue = this.getQueue().filter(e => e.status !== 'sent');
            if (queue.length === 0) return;
            for (const entry of queue) {
                if (entry.retries >= 5) { entry.status = 'failed'; continue; }
                try {
                    await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(entry.data), headers: { 'Content-Type': 'application/json' }, mode: 'no-cors' });
                    entry.status = 'sent';
                    entry.retries = 0;
                } catch(e) { entry.retries++; }
            }
            this.saveQueue(queue.filter(e => e.status !== 'sent'));
        }
    };

    function setupLogin() {
        document.getElementById('doctorBtn')?.addEventListener('click', () => {
            const n = document.getElementById('docName').value.trim();
            if (!n) return notify('Введите ФИО', 'error');
            if (document.getElementById('docCode').value !== '123doc') return notify('Неверный код', 'error');
            loginAs(n, 'doctor');
        });
        document.getElementById('patientBtn')?.addEventListener('click', () => {
            const n = document.getElementById('patName').value.trim();
            if (!n) return notify('Введите ФИО', 'error');
            if (document.getElementById('patCode').value !== 'pat2026') return notify('Неверный код', 'error');
            const d = document.getElementById('patDiagnosis')?.value || '';
            let pid = document.getElementById('patPatientId')?.value.trim() || 'pat_' + Math.random().toString(36).substr(2,8);
            if (!document.getElementById('patPatientId')?.value.trim()) {
                notify('Вам присвоен ID: ' + pid + '. Сообщите его врачу.', 'info');
            }
            loginAs(n, 'parent', d, pid);
            registerPatientIfNeeded(n, pid);
        });
    }

    window.togglePwd = function(id, icon) {
        const inp = document.getElementById(id);
        if (!inp) return;
        if (inp.type === 'password') { inp.type = 'text'; icon.classList.replace('bi-eye', 'bi-eye-slash'); }
        else { inp.type = 'password'; icon.classList.replace('bi-eye-slash', 'bi-eye'); }
    };

    function registerPatientIfNeeded(name, pid) {
        const all = DB.getAllPatients();
        if (!all[name]) all[name] = { fullName: name, patientId: pid || '', firstSeen: new Date().toLocaleDateString('ru-RU'), diagnosis: '', lastUpdate: new Date().toLocaleString('ru-RU'), diaryCount:0, palliativeCount:0, medsCount:0, nutritionCount:0, labCount:0, timelineCount:0 };
        else if (!all[name].patientId && pid) all[name].patientId = pid;
        DB.saveAllPatients(all);
    }

    function updatePatientStats(name, field) {
        const all = DB.getAllPatients();
        if (all[name]) { all[name][field] = (all[name][field] || 0) + 1; all[name].lastUpdate = new Date().toLocaleString('ru-RU'); DB.saveAllPatients(all); }
    }

    function saveLocally(type, data) {
        const today = new Date().toISOString().split('T')[0];
        const existing = DB.getData(type);
        existing.push({ date: today, ...data, _timestamp: new Date().toISOString() });
        DB.saveData(type, existing);
        if (profile) updatePatientStats(profile.fullName, type+'Count');
    }

    function getFields(module, diagnosis) {
        const config = FieldConfig[module];
        if (!config) return [];
        return config[diagnosis] || config.default || [];
    }

    function generateFormHtml(fields) {
        return fields.map(f => {
            if (f.type === 'range') return `<div class="param-field"><label>${f.label}</label><input type="range" name="${f.name}" class="form-range" min="${f.min||0}" max="${f.max||10}" value="${Math.floor(((f.min||0)+(f.max||10))/2)}"></div>`;
            else if (f.type === 'textarea') return `<div class="param-field"><label>${f.label}</label><textarea name="${f.name}" class="form-control" rows="2" placeholder="${f.placeholder||''}"></textarea></div>`;
            else if (f.type === 'date') return `<div class="param-field"><label>${f.label}</label><input type="date" name="${f.name}" class="form-control" value="${new Date().toISOString().split('T')[0]}"></div>`;
            else return `<div class="param-field"><label>${f.label}</label><input type="${f.type}" name="${f.name}" class="form-control" placeholder="${f.placeholder||f.label}" ${f.step?'step="'+f.step+'"':''} ${f.min!==undefined?'min="'+f.min+'"':''} ${f.max!==undefined?'max="'+f.max+'"':''}></div>`;
        }).join('');
    }

    window.calculatePedsQL = function() {
        const all = [];
        for (let i=1;i<=8;i++) all.push(parseInt(document.getElementById('pedsql_a'+i)?.value) || 0);
        for (let i=1;i<=5;i++) all.push(parseInt(document.getElementById('pedsql_b'+i)?.value) || 0);
        for (let i=1;i<=5;i++) all.push(parseInt(document.getElementById('pedsql_c'+i)?.value) || 0);
        for (let i=1;i<=5;i++) all.push(parseInt(document.getElementById('pedsql_d'+i)?.value) || 0);
        const sum = all.reduce((a,b)=>a+b,0);
        const total = 100 - (sum/(all.length*4)*100);
        const cat = total>=80 ? 'Хорошее КЖ' : total>=60 ? 'Среднее КЖ' : 'Низкое КЖ';
        document.getElementById('pedsql-result').innerHTML = `<div class="alert alert-info">Общий балл PedsQL: <strong>${total.toFixed(1)}</strong> – ${cat}</div>`;
        const data = { total, physical: (all.slice(0,8).reduce((a,b)=>a+b,0)/8)*100/4, emotional: (all.slice(8,13).reduce((a,b)=>a+b,0)/5)*100/4, social: (all.slice(13,18).reduce((a,b)=>a+b,0)/5)*100/4, school: (all.slice(18,23).reduce((a,b)=>a+b,0)/5)*100/4, category: cat };
        localStorage.setItem('surveyData', JSON.stringify({ ...JSON.parse(localStorage.getItem('surveyData')||'{}'), pedsql: data }));
        notify('📤 Данные PedsQL сохранены', 'info');
    };

    window.calculatePaPaScale = function() {
        const ids = ['1_1','1_2','2_1','2_2','3_1','3_2','3_3','4_1','4_2','5_1','5_2'];
        let total = 0;
        ids.forEach(id => { const el = document.getElementById('papa_'+id); if (el) total += parseInt(el.value) || 0; });
        const cat = total>25 ? 'Показана ПП (вынести на ВК)' : total>15 ? 'Скорее всего нуждается в ПП' : total>10 ? 'Может нуждаться в ПП' : 'Не нуждается в ПП';
        document.getElementById('papascale-result').innerHTML = `<div class="alert alert-info">Суммарный балл PaPaScale: <strong>${total}</strong> – ${cat}</div>`;
        const data = { total, category: cat };
        localStorage.setItem('surveyData', JSON.stringify({ ...JSON.parse(localStorage.getItem('surveyData')||'{}'), papascale: data }));
        notify('📤 Данные PaPaScale сохранены', 'info');
    };

    window.PalliativeCalc = {
        calculateBMI: function() {
            const age = parseFloat(document.getElementById('calcAgeYears')?.value) || 10;
            const gender = document.getElementById('calcGender')?.value || 'male';
            const height = parseFloat(document.getElementById('calcHeightCm')?.value) || 140;
            const weight = parseFloat(document.getElementById('calcWeightKg')?.value) || 35;
            const container = document.getElementById('bmi-result-container');
            if (!container) return;
            if (isNaN(age) || isNaN(height) || isNaN(weight) || age<2 || age>18 || height<40 || weight<2) {
                container.innerHTML = '<div class="alert alert-warning">Заполните все поля корректно (возраст 2-18 лет).</div>';
                return;
            }
            const bmi = weight / Math.pow(height/100, 2);
            const ref = getBMIRef(gender, age);
            const z = (bmi - ref.median) / ref.sd;
            const pct = zScoreToPercentile(z);
            const cat = getBMICategory(pct);
            window._pallData = window._pallData || {};
            window._pallData.bmi = { bmi, pct, z, cat, age, gender, height, weight };
            container.innerHTML = `<div class="alert alert-info">ИМТ: ${bmi.toFixed(1)} кг/м², перцентиль: ${pct.toFixed(1)}% (Z=${z.toFixed(2)}), категория: <strong>${cat}</strong></div>`;
            document.getElementById('vital-signs-section').style.display = 'block';
        },

        assessVitalSigns: function() {
            const age = parseFloat(document.getElementById('calcAgeYears')?.value) || 10;
            const hr = parseFloat(document.getElementById('calcHR')?.value) || 0;
            const rr = parseFloat(document.getElementById('calcRR')?.value) || 0;
            const spo2 = parseFloat(document.getElementById('calcSpO2')?.value) || 0;
            const sys = parseFloat(document.getElementById('calcSBP')?.value) || 0;
            const dia = parseFloat(document.getElementById('calcDBP')?.value) || 0;
            const container = document.getElementById('vital-result-container');
            if (!container) return;
            if (isNaN(age) || age < 2) { container.innerHTML = '<div class="alert alert-warning">Сначала укажите возраст (≥2 лет).</div>'; return; }
            let html = '<div class="alert alert-secondary"><strong>Оценка жизненных показателей:</strong><br>';
            if (hr > 0) { const ref = getHRRef(age); html += `• ЧСС: ${hr} уд/мин (норма ~${ref.median}±${ref.sd.toFixed(0)})<br>`; }
            if (rr > 0) { const ref = getRRRef(age); html += `• ЧДД: ${rr} в мин (норма ${ref.min}–${ref.max})<br>`; }
            if (sys > 0 && dia > 0) { const ref = getBPRef(age); html += `• АД: ${sys}/${dia} мм рт.ст. (норма ~${ref.median_sys}/${ref.median_dia})<br>`; }
            if (spo2 > 0) html += `• SpO₂: ${spo2}% (норма ≥94%)<br>`;
            html += '</div>';
            container.innerHTML = html;
            window._pallData = window._pallData || {};
            window._pallData.vitals = { hr, rr, spo2, sys, dia };
        },

        calculateEfficiency: function() {
            const patFields = ['effPatClinical','effPatPsycho','effPatQuality','effPatOrganizational','effPatAdditional'];
            const docFields = ['effDocTimeliness','effDocDocumentation','effDocCoordination','effDocInteraction'];
            const vals = {};
            let valid = true;
            [...patFields, ...docFields].forEach(id => {
                const el = document.getElementById(id);
                if (!el) { valid = false; return; }
                const v = parseInt(el.value);
                if (isNaN(v) || v < 1 || v > 5) { el.classList.add('invalid'); valid = false; }
                else { el.classList.remove('invalid'); vals[id] = v; }
            });
            if (!valid) { notify('Все поля должны быть от 1 до 5', 'error'); return; }
            const pat = (vals.effPatClinical + vals.effPatPsycho + vals.effPatQuality + vals.effPatOrganizational + vals.effPatAdditional) / 5;
            const doc = (vals.effDocTimeliness + vals.effDocDocumentation + vals.effDocCoordination + vals.effDocInteraction) / 4;
            const total = ((pat + doc) / 2) * 20;
            let level, color, interp;
            if (total >= 85) { level = 'Высокая'; color = '#22c55e'; interp = 'Отличная работа.'; }
            else if (total >= 70) { level = 'Хорошая'; color = '#eab308'; interp = 'Есть потенциал улучшения.'; }
            else if (total >= 55) { level = 'Удовлетворительная'; color = '#f97316'; interp = 'Требуется корректировка.'; }
            else { level = 'Требует улучшения'; color = '#ef4444'; interp = 'Критично – аудит и обучение.'; }
            window._pallData = window._pallData || {};
            window._pallData.efficiency = { total, level, pat, doc, vals, color, interp };
            document.getElementById('efficiency-result').innerHTML = `<div style="border-left:4px solid ${color};padding-left:1rem;"><h5 style="color:${color}">Эффективность: ${total.toFixed(1)}% (${level})</h5><p>${interp}</p></div>`;
            this.drawEfficiencyCharts(pat, doc, vals);
        },

        drawEfficiencyCharts: function(pat, doc, vals) {
            const container = document.getElementById('efficiency-chart');
            if (!container || typeof Chart === 'undefined') return;
            container.innerHTML = `<div class="chart-wrapper"><h6>Профиль</h6><canvas id="effBar"></canvas></div><div class="chart-wrapper"><h6>Вклад</h6><canvas id="effPie"></canvas></div>`;
            new Chart(document.getElementById('effBar').getContext('2d'), {
                type:'bar',

        clusterPatient: function() {
            const vals = {
                pain: parseFloat(document.getElementById('clustPain')?.value) || 0,
                nutrition: parseFloat(document.getElementById('clustNutrition')?.value) || 0,
                phys_func: parseFloat(document.getElementById('clustPhysFunc')?.value) || 0,
                emo_func: parseFloat(document.getElementById('clustEmoFunc')?.value) || 0,
                soc_func: parseFloat(document.getElementById('clustSocFunc')?.value) || 0,
                role_func: parseFloat(document.getElementById('clustRoleFunc')?.value) || 0
            };
            let best = null, minDist = Infinity;
            for (const [name, cfg] of Object.entries(profiles)) {
                const c = cfg.center;
                const dist = Math.hypot(vals.pain-c.боль, vals.nutrition-c.нутр, vals.phys_func-c.физ, vals.emo_func-c.эмо, vals.soc_func-c.соц, vals.role_func-c.рол);
                if (dist < minDist) { minDist = dist; best = name; }
            }
            const p = profiles[best];
            const deltaQoL = 4.87 - 0.41*vals.nutrition - 0.52*vals.pain - 0.09*vals.phys_func;
            const orMapping = { "Болевой":6.1, "Нутритивный":3.5, "Двигательный":1.4, "Относительно компенсированный":1.0, "Социально-депривированный":2.8 };
            const orVal = orMapping[best] || 1.0;
            window._pallData = window._pallData || {};
            window._pallData.clustering = { best, deltaQoL, orVal, recs: p.recs, desc: p.desc, center: p.center };
            document.getElementById('clustering-result').innerHTML = `<div class="alert alert-primary"><h5>Профиль: «${best}»</h5><p>${p.desc}</p><p><strong>Рекомендации:</strong> ${p.recs}</p><p>Δ КЖ: ${deltaQoL.toFixed(2)} балла</p><p>OR: ${orVal}</p></div>`;
            this.drawClusterCharts(vals, p.center, best, deltaQoL, orVal);
        },

    function resetDecisionTree() { decisionState = { step:0, answers:{} }; showDecisionStep(); }
    function showDecisionStep() {
        const step = decisionState.step;
        if (step >= decisionSteps.length) { computeDecisionResult(); return; }
        const s = decisionSteps[step];
        document.getElementById('decisionQuestion').textContent = s.question;
        const optDiv = document.getElementById('decisionOptions');
        document.getElementById('decisionResult').innerHTML = '';
        let html = '';
        if (s.type === 'single') {
            s.options.forEach(opt => { html += `<div class="decision-option" onclick="selectDecisionOption('${s.key}','${opt}')">${opt}</div>`; });
        } else if (s.type === 'number') {
            html += `<input type="number" id="decisionNumberInput" class="form-control" min="${s.min||0}" max="${s.max||120}"><button class="btn btn-primary mt-2" onclick="submitDecisionNumber('${s.key}')">Подтвердить</button>`;
        } else if (s.type === 'multi') {
            s.options.forEach(opt => {
                const checked = (decisionState.answers[s.key] && decisionState.answers[s.key].includes(opt)) ? 'checked' : '';
                html += `<div class="form-check"><input class="form-check-input" type="checkbox" id="dec_${s.key}_${opt}" value="${opt}" ${checked} onchange="toggleDecisionOption('${s.key}','${opt}')"><label class="form-check-label" for="dec_${s.key}_${opt}">${opt}</label></div>`;
            });

    window.selectDecisionOption = function(key, value) { decisionState.answers[key] = value; nextDecisionStep(); };
    window.submitDecisionNumber = function(key) { const val = document.getElementById('decisionNumberInput').value; if (val === '') return; decisionState.answers[key] = parseFloat(val); nextDecisionStep(); };
    window.toggleDecisionOption = function(key, value) { if (!decisionState.answers[key]) decisionState.answers[key] = []; const idx = decisionState.answers[key].indexOf(value); if (idx > -1) decisionState.answers[key].splice(idx,1); else decisionState.answers[key].push(value); };
    window.nextDecisionStep = function() { decisionState.step++; showDecisionStep(); };

    function computeDecisionResult() {
        const answers = decisionState.answers;
        const diseases = getDiseaseList();
        const userSymptoms = [];
        if (answers.fever === 'Да') userSymptoms.push('лихорадка');
        if (answers.respiratory === 'Кашель') userSymptoms.push('кашель');
        if (answers.respiratory === 'Одышка' || answers.respiratory === 'И то, и другое') userSymptoms.push('одышка');
        if (answers.pain !== 'Нет') userSymptoms.push('боль');
        if (answers.gi) userSymptoms.push(...answers.gi.map(s=>s.toLowerCase()));
        if (answers.neuro) userSymptoms.push(...answers.neuro.map(s=>s.toLowerCase()));
        if (answers.skin) userSymptoms.push(...answers.skin.map(s=>s.toLowerCase()));
        if (answers.hepatosplenomegaly === 'Гепатомегалия' || answers.hepatosplenomegaly === 'И то, и другое') userSymptoms.push('гепатомегалия');
        if (answers.hepatosplenomegaly === 'Спленомегалия' || answers.hepatosplenomegaly === 'И то, и другое') userSymptoms.push('спленомегалия');
        if (answers.development === 'Задержка развития') userSymptoms.push('задержка развития');
        if (answers.development === 'Регресс') userSymptoms.push('регресс');
        if (answers.muscle === 'Да') userSymptoms.push('мышечная слабость','мышечная атрофия');
        if (answers.malformations === 'Да') userSymptoms.push('пороки развития');
        if (answers.cardiac === 'Да') userSymptoms.push('кардиальные проявления');

        const scored = diseases.map(d => {
            const ds = (d.symptoms||[]).map(s=>s.toLowerCase());
            let tw=0, mw=0;
            userSymptoms.forEach(us => {
                let found = false;
                for (let s of ds) {
                    if (s.includes(us) || us.includes(s)) {
                        const w = symptomWeights[us] || 1;
                        tw += w; mw += w; found = true;
                        break;
                    }
                }
                if (!found) tw += (symptomWeights[us] || 1);
            });
            if (tw === 0) return { disease:d, score:0, matchPercent:0 };
            return { disease:d, score:mw, matchPercent:Math.round((mw/tw)*100) };
        });
        scored.sort((a,b)=>b.score-a.score);
        const top = scored.filter(s=>s.score>0).slice(0,5);
        const resDiv = document.getElementById('decisionResult');
        if (top.length === 0) { resDiv.innerHTML = '<div class="alert alert-warning">Не удалось сопоставить симптомы.</div>'; return; }
        let html = '<h6 class="fw-bold">🎯 Топ-5 вероятных диагнозов:</h6><div class="list-group">';
        top.forEach(item => {
            const d = item.disease;
            html += `<div class="list-group-item"><div class="d-flex w-100 justify-content-between"><span class="fw-bold">${d.icon} ${d.name}</span><span class="badge bg-primary">${item.matchPercent}%</span></div><p class="mb-1 small">${d.desc}</p><small class="text-muted">Ген: ${d.gene||'—'} | Лечение: ${d.treat}</small></div>`;
        });
        html += '</div>';
        resDiv.innerHTML = html;
    }

    const RiskPredictor = {
        rules: {
            'Муковисцидоз': [
                { param:'temperature', condition:(v)=>parseFloat(v)>37.5, score:2 },
                { param:'pain', condition:(v)=>parseInt(v)>=5, score:1 },
                { param:'dyspnea', condition:(v)=>parseInt(v)>=5, score:3 },
                { param:'fatigue', condition:(v)=>parseInt(v)>=7, score:2 },
                { param:'symptoms', condition:(v)=>/(кашель|одышка)/i.test(v||""), score:4 }
            ],
            'Фенилкетонурия': [
                { param:'temperature', condition:(v)=>parseFloat(v)>37.0, score:1 },
                { param:'wellbeing', condition:(v)=>parseInt(v)<=3, score:3 },
                { param:'symptoms', condition:(v)=>/(головная боль|тошнота|рвота)/i.test(v||""), score:4 }
            ],
            'default': [
                { param:'temperature', condition:(v)=>parseFloat(v)>=38, score:5 },
                { param:'pain', condition:(v)=>parseInt(v)>=8, score:5 },
                { param:'pressure', condition:(v)=>{ if(!v) return false; const p=v.split('/'); if(p.length!==2) return false; const s=parseFloat(p[0]), d=parseFloat(p[1]); return s>180 || d>120 || s<80 || d<50; }, score:5 }
            ]
        },
        predict: function(data, diagnosis="", history=[]) {
            let totalScore = 0;
            const rules = this.rules[diagnosis] || this.rules.default;
            rules.forEach(rule => {
                const value = data[rule.param];
                if (value !== undefined && rule.condition(value)) totalScore += rule.score;
            });
            if (history.length >= 3) {
                const temps = history.map(e => parseFloat(e.temperature)).filter(v => !isNaN(v));
                if (temps.length >= 3) {
                    const last3 = temps.slice(-3);
                    if (last3[2] > last3[1] && last3[1] > last3[0]) totalScore += 3;
                }
            }
            return Math.round(Math.min(100, (totalScore / 20) * 100));
        },
        getPriority: function(data, diagnosis="") {
            const risk = this.predict(data, diagnosis);
            if (risk >= 80) return 3;
            if (risk >= 50) return 2;
            return 1;
        }
    };

    function calculateRiskScore(data) {
        let s=0;
        const a=parseFloat(data.age)||0, b=parseFloat(data.bmi)||0, h=parseFloat(data.hr)||0, r=parseFloat(data.rr)||0, o=parseFloat(data.spo2)||0, sb=parseFloat(data.sbp)||0, db=parseFloat(data.dbp)||0, p=parseFloat(data.pain)||0, q=parseFloat(data.qol)||0, tt=data.tempTrend||'stable', ho=parseFloat(data.hospitalizations)||0;
        if (a<2) s+=0.8; else if (a>65) s+=0.6;
        if (b<16) s+=0.7; else if (b<18.5) s+=0.3; else if (b>30) s+=0.5; else if (b>25) s+=0.2;
        if (h>120) s+=0.7; else if (h>100) s+=0.3; else if (h<50) s+=0.6;
        if (r>30) s+=0.6; else if (r>24) s+=0.3;
        if (o<88) s+=1.0; else if (o<92) s+=0.6; else if (o<95) s+=0.2;
        if (sb<90 || db<50) s+=0.8; else if (sb>180 || db>120) s+=0.6; else if (sb>140) s+=0.2;
        if (p>8) s+=0.8; else if (p>6) s+=0.4; else if (p>4) s+=0.2;
        if (q<3) s+=0.9; else if (q<5) s+=0.4; else if (q<7) s+=0.2;
        if (tt==='rising') s+=0.5; else if (tt==='falling') s+=0.2;
        if (ho>=3) s+=0.8; else if (ho>=2) s+=0.4; else if (ho>=1) s+=0.2;
        return s;
    }
    function predictRisk(s) { const l = -2.0 + s*2.2; let p = 100/(1+Math.exp(-l)); p = Math.min(95, Math.max(5, Math.round(p))); return p; }
    function getRiskLevel(p) {
        if (p>=70) return {level:'Высокий', cls:'clinical-risk-high', rec:'🚨 Немедленная госпитализация.'};
        if (p>=40) return {level:'Средний', cls:'clinical-risk-medium', rec:'⚠️ Усилить контроль.'};
        return {level:'Низкий', cls:'clinical-risk-low', rec:'✅ Плановое наблюдение.'};
    }
    window.calculatePrognosis = function() {
        const data = {
            age: document.getElementById('progAge').value,
            bmi: document.getElementById('progBMI').value,
            hr: document.getElementById('progHR').value,
            rr: document.getElementById('progRR').value,

    window.calcGeneticRisk = function() {
        const t = document.getElementById('inheritType')?.value;
        const f = document.getElementById('fatherStatus')?.value;
        const m = document.getElementById('motherStatus')?.value;
        let risk = 0, explanation = '';
        if (t === 'autosomal_recessive') {
            if (f === 'carrier' && m === 'carrier') { risk = 25; explanation = 'Оба родителя — носители. 25% детей больны.'; }
            else if ((f === 'sick' && m === 'carrier') || (f === 'carrier' && m === 'sick')) { risk = 50; explanation = 'Один родитель болен, второй — носитель. 50% детей больны.'; }
            else if (f === 'sick' && m === 'sick') { risk = 100; explanation = 'Оба родителя больны. Все дети больны.'; }
            else { risk = 0; explanation = 'Риска нет.'; }
        } else if (t === 'autosomal_dominant') {
            if (f === 'sick' || m === 'sick') { risk = 50; explanation = 'Один родитель болен. 50% детей унаследуют мутацию.'; }
            else { risk = 0; explanation = 'Риска нет.'; }
        } else if (t === 'x_linked') {
            if (m === 'carrier') { risk = 25; explanation = 'Мать — носитель. 25% детей (мальчики) больны.'; }
            else if (m === 'sick') { risk = 50; explanation = 'Мать больна. 50% сыновей больны.'; }
            else { risk = 0; explanation = 'Риска нет.'; }
        }
        document.getElementById('geneticRiskResult').innerHTML = `<div class="alert alert-info">Вероятность: <strong>${risk}%</strong><br><small>${explanation}</small></div>`;
    };

    window.exportStatisticalSyntax = function() {
        const diary = DB.getData('diary'), palliative = DB.getData('palliative');
        let rows = [];
        const allDates = new Set([...diary.map(e=>e.date), ...palliative.map(e=>e.date)]);
        const headers = ['date','temperature','weight','wellbeing','pain','quality','dyspnea','fatigue'];
        allDates.forEach(date => {
            const d = diary.find(e=>e.date===date)||{}, p = palliative.find(e=>e.date===date)||{};
            rows.push({ date, temperature:d.temperature||'', weight:d.weight||'', wellbeing:d.wellbeing||'', pain:p.pain||'', quality:p.quality||'', dyspnea:p.dyspnea||'', fatigue:p.fatigue||'' });
        });
        let csv = headers.join(',')+'\n';
        rows.forEach(r => { csv += headers.map(h=>r[h]||'').join(',')+'\n'; });
        const download = (c,n,m) => { const b = new Blob([c],{type:m}), u = URL.createObjectURL(b), a = document.createElement('a'); a.href = u; a.download = n; a.click(); URL.revokeObjectURL(u); };
        download(csv, 'data.csv', 'text/csv');
        download('# R syntax\ndata <- read.csv("data.csv", stringsAsFactors=FALSE)\ndata$date <- as.Date(data$date)\nsummary(data)\n', 'analysis.R', 'text/plain');
        download('* SPSS syntax.\nGET DATA /TYPE=TXT /FILE="data.csv".\n', 'analysis.sps', 'text/plain');
        notify('Экспорт выполнен', 'info');
    };

            <div class="col-md-3"><div class="stat-card primary"><div class="stat-icon"><i class="bi bi-people"></i></div><div class="stat-value">${DB.getDoctorPatients().length}</div><div class="stat-label">Пациенты</div></div></div>
            <div class="col-md-3"><div class="stat-card success"><div class="stat-icon"><i class="bi bi-journal-medical"></i></div><div class="stat-value">${diary.length}</div><div class="stat-label">Записей дневника</div></div></div>
            <div class="col-md-3"><div class="stat-card warning"><div class="stat-icon"><i class="bi bi-heart-pulse"></i></div><div class="stat-value">${palliative.length}</div><div class="stat-label">Паллиативных</div></div></div>
            <div class="col-md-3"><div class="stat-card info"><div class="stat-icon"><i class="bi bi-calendar-check"></i></div><div class="stat-value">${new Date().toLocaleDateString('ru-RU')}</div><div class="stat-label">Сегодня</div></div></div>
        ` : `
            <div class="col-md-3"><div class="stat-card primary"><div class="stat-icon"><i class="bi bi-thermometer-half"></i></div><div class="stat-value">${avgTemp}°C</div><div class="stat-label">Средняя t°</div></div></div>
            <div class="col-md-3"><div class="stat-card danger"><div class="stat-icon"><i class="bi bi-heart-pulse"></i></div><div class="stat-value">${avgPain}</div><div class="stat-label">Средняя боль</div></div></div>
            <div class="col-md-3"><div class="stat-card success"><div class="stat-icon"><i class="bi bi-journal-medical"></i></div><div class="stat-value">${diary.length}</div><div class="stat-label">Записей дневника</div></div></div>
            <div class="col-md-3"><div class="stat-card warning"><div class="stat-icon"><i class="bi bi-heart-pulse"></i></div><div class="stat-value">${palliative.length}</div><div class="stat-label">Паллиативных</div></div></div>
        `;

        let riskHtml = '';
        if (!isDoc && profile.diagnosis) {
            const lastData = diary.length ? diary[diary.length-1] : {};
            const risk = RiskPredictor.predict(lastData, profile.diagnosis, diary.slice(-7));
            let cls = 'low';
            if (risk > 50) cls = 'medium';
            if (risk > 80) cls = 'high';
            riskHtml = `<div class="card text-center"><h6>📈 Прогноз риска</h6><div class="stat-value"><span class="risk-badge ${cls}">${risk}%</span></div><small class="text-muted">На основе данных за 7 дней</small></div>`;
        }

        let docPalliativeHtml = '';
        if (isDoc) {
            const mp = DB.getDoctorPatients(), ap = DB.getAllPatients();
            const heavy = [];
            mp.forEach(name => {
                const p = ap[name] || {};
                const pDiary = DB.getData('diary').filter(e=>e.patient===name);
                const pPall = DB.getData('palliative').filter(e=>e.patient===name);
                const lastPall = pPall.length ? pPall[pPall.length-1] : {};
                const risk = RiskPredictor.predict(lastPall, p.diagnosis||'', pDiary.slice(-7));
                if (risk >= 50 || (lastPall.pain && parseInt(lastPall.pain) >= 7) || (lastPall.quality && parseInt(lastPall.quality) <= 3)) {
                    heavy.push({ name, risk, pain:lastPall.pain, quality:lastPall.quality });
                }
            });
            if (heavy.length > 0) {
                docPalliativeHtml = `<div class="card"><div class="card-header text-danger"><i class="bi bi-heart-pulse"></i> Требуют внимания</div>`;
                heavy.forEach(p => {
                    let cls = 'low';
                    if (p.risk > 50) cls = 'medium';
                    if (p.risk > 80) cls = 'high';
                    docPalliativeHtml += `<div class="d-flex justify-content-between align-items-center border-bottom py-2"><span><strong>${esc(p.name)}</strong> <small class="text-muted">Боль:${p.pain||'—'} КЖ:${p.quality||'—'}</small></span><span class="risk-badge ${cls}">${p.risk}%</span></div>`;
                });
                docPalliativeHtml += '</div>';
            }
        }

        return `
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="fw-bold">👋 ${esc(profile.fullName)}</h4>
            ${profile.patientId ? `<span class="badge badge-gray">ID: ${esc(profile.patientId)}</span>` : ''}
        </div>
        <div class="row g-3 mb-4">${cards}</div>
        ${riskHtml}
        ${docPalliativeHtml}
        <div class="row g-3">
            <div class="col-md-6">
                <div class="card"><div class="card-header"><i class="bi bi-clock-history"></i> Последние записи дневника</div>
                    ${lDiary.map(e => `<div class="history-item"><span>${e.date}</span><span>${e.temperature||'—'}°C | ${e.wellbeing}/10</span></div>`).join('') || '<p class="text-muted">Нет записей</p>'}
                </div>
            </div>
            <div class="col-md-6">
                <div class="card"><div class="card-header"><i class="bi bi-clock-history"></i> Последние паллиативные</div>
                    ${lPall.map(e => `<div class="history-item"><span>${e.date}</span><span>Боль:${e.pain} | КЖ:${e.quality}</span></div>`).join('') || '<p class="text-muted">Нет записей</p>'}
                </div>
            </div>
        </div>
        <div class="row g-3 mt-2">
            <div class="col-md-4"><div class="clock-widget"><div class="time" id="liveClock">--:--:--</div><div class="date" id="liveDate"></div></div></div>
            <div class="col-md-8"><div class="calendar-widget" id="miniCalendar"></div></div>
        </div>
        <div class="card mt-3">
            <div class="card-header"><i class="bi bi-arrow-down-up"></i> Импорт/Экспорт</div>
            <div class="d-flex gap-2 flex-wrap">
                <button class="btn btn-outline-primary btn-sm" onclick="window.exportData()">📤 Экспорт JSON</button>
                <input type="file" id="importFile" accept=".json" class="d-none" onchange="window.importData(this)">
                <button class="btn btn-outline-primary btn-sm" onclick="document.getElementById('importFile').click()">📥 Импорт JSON</button>
            </div>
        </div>`;
    }

    window.exportData = function() {
        const exportObj = {
            version:1,
            timestamp:new Date().toISOString(),
            deviceId:deviceId,
            syncQueue:SyncManager.getQueue(),
            diary:DB.getData('diary'),
            palliative:DB.getData('palliative'),
            medications:DB.getMeds(),
            nutrition:DB.getData('nutrition'),
            lab:DB.getData('lab'),
            timeline:DB.getData('timeline'),
            allPatients:DB.getAllPatients(),
            doctorPatients:DB.getDoctorPatients()
        };
        const blob = new Blob([JSON.stringify(exportObj, null, 2)], {type:'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `orphan_helper_export_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
        URL.revokeObjectURL(url);
        notify('Экспорт выполнен', 'info');
    };

    window.importData = function(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const imported = JSON.parse(e.target.result);
                if (imported.syncQueue) { SyncManager.saveQueue(imported.syncQueue); }
                if (imported.diary) DB.saveData('diary', imported.diary);
                if (imported.palliative) DB.saveData('palliative', imported.palliative);
                if (imported.medications) DB.saveMeds(imported.medications);
                if (imported.nutrition) DB.saveData('nutrition', imported.nutrition);
                if (imported.lab) DB.saveData('lab', imported.lab);
                if (imported.timeline) DB.saveData('timeline', imported.timeline);
                if (imported.allPatients) DB.saveAllPatients(imported.allPatients);
                if (imported.doctorPatients) DB.saveDoctorPatients(imported.doctorPatients);
                notify('Импорт завершён', 'success');
                render();
            } catch(err) { notify('Ошибка импорта', 'error'); }
        };
        reader.readAsText(file);
        input.value = '';
    };

    // ============================================================
    // 23. WIDGETS
    // ============================================================
    function initClock() {
        const u = () => {
            const n = new Date();
            const c = document.getElementById('liveClock'), d = document.getElementById('liveDate');
            if (c) c.textContent = n.toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
            if (d) d.textContent = n.toLocaleDateString('ru-RU', {weekday:'long',day:'numeric',month:'long',year:'numeric'});
        };
        u();
        if (clockTimer) clearInterval(clockTimer);
        clockTimer = setInterval(u, 1000);
    }

    function initCalendar() {
        const cal = document.getElementById('miniCalendar');
        if (!cal) return;
        const now = new Date();
        const m = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
        const fd = new Date(now.getFullYear(), now.getMonth(), 1).getDay() || 7;
        const days = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
        const diary = DB.getData('diary'), pall = DB.getData('palliative');
        const allDates = new Set([...diary.map(e=>e.date), ...pall.map(e=>e.date)]);
        let h = `<div class="month-title">${m[now.getMonth()]} ${now.getFullYear()}</div><table><tr><th>Пн</th><th>Вт</th><th>Ср</th><th>Чт</th><th>Пт</th><th>Сб</th><th>Вс</th></tr><tr>`;
        for (let i=1; i<fd; i++) h += '<td></td>';
        for (let d=1; d<=days; d++) {
            if ((fd+d-1)%7===1 && d>1) h += '</tr><tr>';
            const ds = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            h += `<td class="${d===now.getDate()?'today':''} ${allDates.has(ds)?'has-entry':''}">${d}</td>`;
        }
        h += '</tr></table>';
        cal.innerHTML = h;
    }

    function toggleTheme() {
        const dark = document.body.classList.toggle('dark-theme');
        localStorage.setItem('darkTheme', dark);
    }

    // ============================================================
    // 24. РЕНДЕР
    // ============================================================
    async function render() {
        updateNav();
        const page = location.hash.slice(1) || '/';
        const app = document.getElementById('app');
        if (!app) return;
        if (!profile && !['/', '/login', '/reference', '/faq', '/genetics', '/support', '/surveys', '/pallcalc', '/prognosis', '/symptom_search', '/decision_tree'].includes(page)) {
            App.navigate('/login');
            return;
        }
        try {
            switch (page) {
                case '/': app.innerHTML = `<div class="hero-section"><div class="hero-icon">🧬</div><h1 class="hero-title">Орфанный помощник</h1><p class="hero-subtitle">Платформа для мониторинга редких заболеваний и паллиативной помощи</p><button class="btn btn-primary hero-btn" onclick="App.navigate('/login')">Войти</button></div>`; break;
                case '/login': app.innerHTML = renderLogin(); setupLogin(); break;
                case '/dashboard': app.innerHTML = renderDashboard(); initClock(); initCalendar(); break;
                case '/diary': app.innerHTML = renderDiary(); break;
                case '/palliative': app.innerHTML = renderPalliative(); break;
                case '/medications': app.innerHTML = renderMedications(); break;
                case '/nutrition': app.innerHTML = renderNutrition(); break;
                case '/lab': app.innerHTML = renderLab(); break;
                case '/timeline': app.innerHTML = renderTimeline(); break;
                case '/patients': app.innerHTML = renderPatients(); break;
                case '/analytics': app.innerHTML = renderAnalytics(); break;
                case '/reference': app.innerHTML = renderReference(); break;
                case '/genetics': app.innerHTML = renderGenetics(); break;
                case '/faq': app.innerHTML = renderFAQ(); break;
                case '/support': app.innerHTML = renderSupport(); break;
                case '/surveys': app.innerHTML = renderSurveys(); setupSurveys(); break;
                case '/pallcalc': app.innerHTML = renderPallcalc(); setupPallcalc(); break;
                case '/decision_tree': app.innerHTML = renderDecisionTree(); resetDecisionTree(); break;
                case '/prognosis': app.innerHTML = renderPrognosis(); break;
                case '/symptom_search': app.innerHTML = renderSymptomSearch(); break;
                default: app.innerHTML = '<h4 class="text-center mt-5">404 — страница не найдена</h4>';
            }
        } catch(e) { app.innerHTML = `<div class="alert alert-danger">Ошибка: ${esc(e.message)}</div>`; console.error(e); }
    }

    // ============================================================
    // 25. СОБЫТИЯ
    // ============================================================
    document.addEventListener('submit', (e) => {
        if (e.target.id === 'medsForm') {
            e.preventDefault();
            const f = e.target;
            const meds = DB.getMeds();
            meds.push({ name: f.name.value, dosage: f.dosage.value, time: f.time.value });
            DB.saveMeds(meds);
            f.reset();
            render();
            notify('Лекарство добавлено', 'success');
        } else if (e.target.id === 'addPatientForm') {
            e.preventDefault();
            const f = e.target;
            const name = f.name.value.trim();
            if (!name) return notify('Введите ФИО', 'error');
            window.addDoctorPatient(name);
            registerPatientIfNeeded(name);
            f.reset();
            render();
            notify('Пациент добавлен', 'success');
        }
    });

    setInterval(() => SyncManager.processQueue(), 30000);
    window.onhashchange = () => { if(clockTimer) clearInterval(clockTimer); render(); };
    window.onload = render;

})();
</script>
</body>
</html>
