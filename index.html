<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Орфанный помощник</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🧬</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0d7377; --primary-light: #14a3a8; --accent: #00b4d8; --danger: #ef4444; --success: #10b981; --warning: #f59e0b; --text: #1e293b; --text-light: #64748b; --bg: #f0f4f8; --card: #ffffff; --radius: 24px; --radius-sm: 16px; --shadow: 0 10px 30px rgba(0,0,0,0.06); }
        .dark-theme { --primary: #14a3a8; --text: #f1f5f9; --text-light: #94a3b8; --bg: #0f172a; --card: #1e293b; --shadow: 0 10px 30px rgba(0,0,0,0.3); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; transition: all 0.3s; }
        .navbar { background: rgba(255,255,255,0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); padding: 10px 0; }
        .dark-theme .navbar { background: rgba(30,41,59,0.8); }
        .navbar-brand { font-weight: 800; font-size: 1.35rem; background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .brand-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), var(--accent)); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; color: white; -webkit-text-fill-color: white; }
        .btn { border-radius: 30px; padding: 8px 20px; font-weight: 600; border: none; transition: all 0.25s; cursor: pointer; font-size: 0.9rem; position: relative; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(13,115,119,0.35); }
        .btn-success { background: linear-gradient(135deg, #10b981, #34d399); color: white; }
        .btn-danger { background: linear-gradient(135deg, #ef4444, #f87171); color: white; }
        .btn-outline { border: 2px solid var(--primary); color: var(--primary); background: transparent; }
        .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 1.5rem; margin-bottom: 1.5rem; transition: transform 0.2s, box-shadow 0.2s; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 16px 48px rgba(0,0,0,0.08); }
        .dashboard-card { cursor: pointer; text-align: center; padding: 1.5rem; background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); transition: all 0.3s; }
        .dashboard-card:hover { transform: translateY(-6px); box-shadow: 0 20px 40px rgba(0,0,0,0.12); }
        .dashboard-card .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .form-control, .form-select { border-radius: var(--radius-sm); border: 2px solid #e2e8f0; padding: 11px 16px; background: var(--card); color: var(--text); width: 100%; margin-bottom: 10px; }
        .form-control:focus, .form-select:focus { border-color: var(--primary-light); outline: none; }
        .form-range { height: 8px; }
        .form-range::-webkit-slider-thumb { width: 24px; height: 24px; background: var(--primary); cursor: pointer; }
        .clock-widget { background: linear-gradient(135deg, #1e293b, #334155); color: white; border-radius: var(--radius); padding: 1.5rem; text-align: center; }
        .clock-widget .time { font-size: 2.5rem; font-weight: 800; }
        .calendar-widget { background: var(--card); border-radius: var(--radius); padding: 1.25rem; }
        .calendar-widget table { width: 100%; border-collapse: collapse; }
        .calendar-widget td { text-align: center; padding: 6px; cursor: pointer; border-radius: 10px; }
        .calendar-widget td.today { background: var(--primary); color: white; }
        .calendar-widget td.has-entry { background: var(--success); color: white; opacity: 0.7; }
        .faq-item { border-left: 3px solid var(--primary); padding: 1rem; margin-bottom: 1rem; background: var(--card); cursor: pointer; border-radius: 0 var(--radius-sm) var(--radius-sm) 0; transition: all 0.3s; }
        .faq-item:hover { background: rgba(13,115,119,0.05); transform: translateX(4px); }
        .faq-item.active { border-left-color: var(--accent); background: rgba(0,180,216,0.08); }
        .faq-question { display: flex; align-items: center; gap: 10px; }
        .faq-icon { font-size: 14px; color: var(--primary); min-width: 20px; transition: transform 0.3s; }
        .faq-item.active .faq-icon { transform: rotate(90deg); }
        .faq-answer { margin-top: 10px; padding-top: 10px; border-top: 2px dashed rgba(128,128,128,0.2); display: none; }
        .faq-search { margin-bottom: 15px; }
        .toast { position: fixed; top: 20px; right: 20px; z-index: 9999; padding: 15px 20px; border-radius: 12px; color: white; animation: fadeInUp 0.5s ease; }
        @keyframes fadeInUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
        .hero-section { text-align: center; padding: 6rem 2rem; }
        .hero-title { font-size: 3.5rem; font-weight: 900; background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 1rem; }
        .hero-subtitle { font-size: 1.25rem; color: var(--text-light); max-width: 600px; margin: 0 auto 2rem; }
        .hero-btn { padding: 14px 40px; font-size: 1.1rem; }
        .reminder-badge { background: #c7d2fe; color: #3730a3; padding: 2px 8px; border-radius: 12px; font-size: 0.7rem; }
        .history-item { font-size: 0.85rem; padding: 8px 12px; border-bottom: 1px solid rgba(0,0,0,0.05); }
        footer { background: var(--card); border-top: 1px solid rgba(128,128,128,0.1); padding: 1.5rem 0; text-align: center; }
        .offcanvas { background: var(--card); color: var(--text); }
        .disease-details { display: none; padding-top: 10px; margin-top: 10px; border-top: 1px solid rgba(128,128,128,0.2); }
        .disease-card.active .disease-details { display: block; }
        .password-wrapper { position: relative; }
        .password-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-light); z-index: 10; background: none; border: none; font-size: 1.1rem; }
        @media (max-width: 768px) { .hero-title { font-size: 2.5rem; } .hero-section { padding: 3rem 1rem; } .btn { padding: 6px 14px; font-size: 0.8rem; } .navbar-brand { font-size: 1.1rem; } .card { padding: 1rem; } }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" onclick="App.navigate('/dashboard')"><span class="brand-icon">🧬</span> Орфанный помощник</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebar"><span class="navbar-toggler-icon"></span></button>
            <div class="d-none d-lg-flex ms-auto gap-1" id="navMenu"></div>
        </div>
    </nav>
    <div class="offcanvas offcanvas-start" tabindex="-1" id="sidebar"><div class="offcanvas-header"><h5>Меню</h5><button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button></div><div class="offcanvas-body" id="mobileNav"></div></div>
    <div class="container my-3" id="app"></div>
    <footer><p class="fw-bold mb-1" style="color: var(--primary);">🧬 Орфанный помощник</p><p class="text-muted small">Персонализированный помощник с паллиативным модулем</p><p class="text-muted small">Разработчик: Истин А.А. © 2026 | Научный руководитель: д.м.н. Леднева В.С.</p></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
         (function() {
            // ═══════════════ НАСТРОЙКИ ═══════════════
            const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyh6UqZnYsplMUEyGetAzgSc4rAbn4IJRoLD_qNsINAXuHk_Bq-1I5y8QufPmM_P3ZjEg/exec';
            const SPREADSHEET_ID = '1r6wC1EEVXeBN6tymsg-J4aKBITtIwtgHkZEfoRsXFOk';

            const YANDEX_FORMS = {
                diary: {
                    url: 'https://forms.yandex.ru/u/6a4640fbe010db3111be4d8d?iframe=true',
                    fields: { patient: 'answer_short_text_9008982243801472', date: 'answer_short_text_9008982243933814', temperature: 'answer_short_text_9008982243865188', pressure: 'answer_short_text_9008982243959294', weight: 'answer_short_text_9008982243970860', wellbeing: 'answer_short_text_9008982243981124', symptoms: 'answer_short_text_9008982243992044' }
                },
                palliative: {
                    url: 'https://forms.yandex.ru/u/6a46420d90290233739cb2dc?iframe=true',
                    fields: { patient: 'answer_short_text_9008982244078472', date: 'answer_short_text_9008982244090874', pain: 'answer_short_text_9008982244099538', nausea: 'answer_short_text_9008982244111466', appetite: 'answer_short_text_9008982244119952', sleep: 'answer_short_text_9008982244127712', mood: 'answer_short_text_9008982244137858', dyspnea: 'answer_short_text_9008982244146280', fatigue: 'answer_short_text_9008982244158842', quality: 'answer_short_text_9008982244166458' }
                },
                medications: {
                    url: 'https://forms.yandex.ru/u/6a46429602848f32aa3c608c?iframe=true',
                    fields: { patient: 'answer_short_text_9008982244205454', date: 'answer_short_text_9008982244229810', name: 'answer_short_text_9008982244236874', dosage: 'answer_short_text_9008982244244130', time: 'answer_short_text_9008982244252698' }
                },
                nutrition: {
                    url: 'https://forms.yandex.ru/u/6a46432e90fa7b3dcf51f634?iframe=true',
                    fields: { patient: 'answer_short_text_9008982244365004', date: 'answer_short_text_9008982244372442', calories: 'answer_short_text_9008982244387096', protein: 'answer_short_text_9008982244400456', fat: 'answer_short_text_9008982244408464', carbs: 'answer_short_text_9008982244414128', notes: 'answer_short_text_9008982244427000' }
                },
                lab: {
                    url: 'https://forms.yandex.ru/u/6a4643a9e010db317bbe4e0d?iframe=true',
                    fields: { patient: 'answer_short_text_9008982244487744', date: 'answer_short_text_9008982244495464', testName: 'answer_short_text_9008982244541872', result: 'answer_short_text_9008982244551234', unit: 'answer_short_text_9008982244565678', normal: 'answer_short_text_9008982244578901', notes: 'answer_long_text_9008982244582345' }
                },
                timeline: {
                    url: 'https://forms.yandex.ru/u/6a4643f5068ff032def2ae8d?iframe=true',
                    fields: { patient: 'answer_short_text_9008982244565458', date: 'answer_short_text_9008982244572784', event: 'answer_short_text_9008982244586536', description: 'answer_long_text_9008982244595120' }
                }
            };

            const DB = {
                get(k) { try { return JSON.parse(localStorage.getItem(k)); } catch(e) { return null; } },
                set(k, v) { localStorage.setItem(k, JSON.stringify(v)); },
                getProfile() { return this.get('profile'); },
                setProfile(p) { this.set('profile', p); },
                getData(type) { return this.get(`data_${type}`) || []; },
                saveData(type, data) { this.set(`data_${type}`, data); },
                getMeds() { return this.get('medications') || []; },
                saveMeds(meds) { this.set('medications', meds); },
                getPatients() { return this.get('doctor_patients') || []; },
                savePatients(patients) { this.set('doctor_patients', patients); },
                getAllPatients() { return this.get('all_patients') || {}; },
                saveAllPatients(all) { this.set('all_patients', all); }
            };

            let profile = DB.getProfile();
            let clockTimer = null;

            const notify = (msg, type='success') => {
                const el = document.createElement('div'); el.className='toast';
                el.style.background = type==='error'?'#ef4444':'#10b981';
                el.textContent = msg; document.body.appendChild(el);
                setTimeout(()=>el.remove(), 3000);
            };
            const esc = s => { const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; };
            const fmtDate = d => new Date(d).toLocaleDateString('ru-RU', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

            async function sendToGoogleSheet(data) {
                try {
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify(data),
                        headers: { 'Content-Type': 'application/json' },
                        mode: 'no-cors'
                    });
                } catch(e) { console.error('Ошибка отправки в таблицу:', e); }
            }

            function openYandexForm(formType, data) {
                const config = YANDEX_FORMS[formType];
                if (!config) return notify('Форма не настроена', 'error');
                const today = new Date().toISOString().split('T')[0];
                const params = new URLSearchParams();
                params.append(config.fields.patient, profile.fullName);
                params.append(config.fields.date, today);
                for (const [key, value] of Object.entries(data)) {
                    if (config.fields[key]) params.append(config.fields[key], value);
                }
                window.open(config.url + '&' + params.toString(), '_blank');
                notify('Форма открыта. Проверьте данные и нажмите «Отправить».');
            }

            function saveLocally(type, data) {
                const today = new Date().toISOString().split('T')[0];
                const existing = DB.getData(type);
                existing.push({ date: today, ...data });
                DB.saveData(type, existing);
                notify('Данные сохранены локально');
            }

            function registerPatientIfNeeded(patientName) {
                const all = DB.getAllPatients();
                if (!all[patientName]) {
                    all[patientName] = {
                        fullName: patientName,
                        firstSeen: new Date().toLocaleDateString('ru-RU'),
                        birthDate: '',
                        age: '',
                        diagnosis: '',
                        lastUpdate: new Date().toLocaleString('ru-RU'),
                        diaryCount: 0,
                        palliativeCount: 0,
                        medsCount: 0,
                        nutritionCount: 0,
                        labCount: 0,
                        timelineCount: 0
                    };
                    DB.saveAllPatients(all);
                }
                return all[patientName];
            }

            function updatePatientStats(patientName, field) {
                const all = DB.getAllPatients();
                if (all[patientName]) {
                    all[patientName][field] = (all[patientName][field] || 0) + 1;
                    all[patientName].lastUpdate = new Date().toLocaleString('ru-RU');
                    DB.saveAllPatients(all);
                }
            }

            window.App = {
                navigate: page => { location.hash = '#' + page; },
                logout: () => { if(clockTimer)clearInterval(clockTimer); DB.setProfile(null); profile = null; updateNav(); App.navigate('/'); }
            };

            async function updateNav() {
                const nav = document.getElementById('navMenu');
                const mob = document.getElementById('mobileNav');
                if (!nav) return;
                const items = (role) => {
                    let html = `<button class="btn btn-sm btn-outline" onclick="App.navigate('/dashboard')"><i class="bi bi-house"></i></button>
                    <button class="btn btn-sm btn-outline" onclick="toggleTheme()"><i class="bi bi-moon-stars"></i></button>`;
                    if (role === 'parent') {
                        html += `<div class="dropdown d-inline">
                            <button class="btn btn-sm btn-outline dropdown-toggle" data-bs-toggle="dropdown"><i class="bi bi-journal-medical"></i></button>
                            <ul class="dropdown-menu">
                                <li><a class="dropdown-item" href="#" onclick="App.navigate('/diary')"><i class="bi bi-journal"></i> Дневник</a></li>
                                <li><a class="dropdown-item" href="#" onclick="App.navigate('/palliative')"><i class="bi bi-heart-pulse"></i> Паллиатив</a></li>
                                <li><a class="dropdown-item" href="#" onclick="App.navigate('/medications')"><i class="bi bi-capsule"></i> Лекарства</a></li>
                                <li><a class="dropdown-item" href="#" onclick="App.navigate('/nutrition')"><i class="bi bi-egg-fried"></i> Питание</a></li>
                                <li><a class="dropdown-item" href="#" onclick="App.navigate('/lab')"><i class="bi bi-virus"></i> Анализы</a></li>
                                <li><a class="dropdown-item" href="#" onclick="App.navigate('/timeline')"><i class="bi bi-calendar-event"></i> Таймлайн</a></li>
                            </ul>
                        </div>`;
                    } else {
                        html += `<button class="btn btn-sm btn-outline" onclick="App.navigate('/patients')"><i class="bi bi-people"></i></button>
                        <button class="btn btn-sm btn-outline" onclick="App.navigate('/analytics')"><i class="bi bi-graph-up"></i></button>`;
                    }
                    html += `<button class="btn btn-sm btn-outline" onclick="App.navigate('/reference')"><i class="bi bi-book"></i></button>
                    <button class="btn btn-sm btn-outline" onclick="App.navigate('/genetics')"><i class="bi bi-diagram-3"></i></button>
                    <button class="btn btn-sm btn-outline" onclick="App.navigate('/faq')"><i class="bi bi-question-circle"></i></button>
                    <button class="btn btn-sm btn-outline" onclick="App.navigate('/support')"><i class="bi bi-heart"></i></button>
                    <button class="btn btn-sm btn-danger" onclick="App.logout()"><i class="bi bi-box-arrow-right"></i></button>`;
                    return html;
                };
                if (profile) {
                    nav.innerHTML = items(profile.role);
                    if (mob) mob.innerHTML = items(profile.role);
                } else {
                    nav.innerHTML = '<button class="btn btn-outline btn-sm" onclick="App.navigate(\'/login\')"><i class="bi bi-box-arrow-in-right"></i></button>';
                    if (mob) mob.innerHTML = '<button class="btn btn-outline btn-sm" onclick="App.navigate(\'/login\')"><i class="bi bi-box-arrow-in-right"></i></button>';
                }
            }

            async function render() {
                await updateNav();
                const page = location.hash.slice(1) || '/';
                const app = document.getElementById('app');
                if (!app) return;
                if (!profile && !['/', '/login', '/reference', '/faq', '/genetics', '/support', '/diary', '/palliative', '/medications', '/nutrition', '/lab', '/timeline', '/patients', '/analytics'].includes(page)) {
                    App.navigate('/login');
                    return;
                }
                try {
                    switch (page) {
                        case '/': app.innerHTML = renderWelcome(); break;
                        case '/login': app.innerHTML = renderLogin(); setupLogin(); break;
                        case '/dashboard': app.innerHTML = await renderDashboard(); initClock(); initCalendar(); break;
                        case '/diary': app.innerHTML = await renderDiary(); break;
                        case '/palliative': app.innerHTML = await renderPalliative(); break;
                        case '/medications': app.innerHTML = await renderMedications(); break;
                        case '/nutrition': app.innerHTML = await renderNutrition(); break;
                        case '/lab': app.innerHTML = await renderLab(); break;
                        case '/timeline': app.innerHTML = await renderTimeline(); break;
                        case '/patients': app.innerHTML = await renderPatients(); break;
                        case '/analytics': app.innerHTML = await renderAnalytics(); break;
                        case '/reference': app.innerHTML = renderReference(); setupReference(); break;
                        case '/genetics': app.innerHTML = renderGenetics(); setupGenetics(); break;
                        case '/faq': app.innerHTML = renderFAQ(); break;
                        case '/support': app.innerHTML = renderSupport(); break;
                        default: app.innerHTML = '<h2 class="text-center mt-5">404</h2>';
                    }
                } catch (e) {
                    app.innerHTML = `<div class="alert alert-danger">Произошла ошибка при загрузке страницы. Попробуйте перезагрузить приложение или очистить кэш браузера.<br><small>${esc(e.message)}</small></div>`;
                    console.error(e);
                }
            }

            function renderWelcome() { return `<div class="hero-section"><div style="font-size:5rem;">🧬</div><h1 class="hero-title">Орфанный помощник</h1><p class="hero-subtitle">Современный инструмент для ведения дневника здоровья и обмена данными с врачом</p><button class="btn btn-primary hero-btn" onclick="App.navigate('/login')">Войти в систему</button></div>`; }
            function renderLogin() { return `<div class="text-center mt-5"><h2>🔐 Вход</h2><div class="row justify-content-center mt-4"><div class="col-md-5 mb-3"><div class="card"><h4><i class="bi bi-person-badge"></i> Врач</h4><input id="docName" class="form-control" placeholder="ФИО"><div class="password-wrapper"><input id="docCode" type="password" class="form-control" placeholder="Код доступа"><i class="bi bi-eye password-toggle" onclick="window.togglePasswordVisibility('docCode', this)"></i></div><button class="btn btn-primary w-100 mt-2" id="doctorBtn">Войти как врач</button></div></div><div class="col-md-5 mb-3"><div class="card"><h4><i class="bi bi-person"></i> Пациент</h4><input id="patName" class="form-control" placeholder="ФИО"><div class="password-wrapper"><input id="patCode" type="password" class="form-control" placeholder="Код доступа"><i class="bi bi-eye password-toggle" onclick="window.togglePasswordVisibility('patCode', this)"></i></div><button class="btn btn-success w-100 mt-2" id="patientBtn">Войти как пациент</button></div></div></div></div>`; }
            window.togglePasswordVisibility = function(inputId, iconEl) {
                const input = document.getElementById(inputId);
                if (!input) return;
                if (input.type === 'password') {
                    input.type = 'text';
                    iconEl.classList.remove('bi-eye');
                    iconEl.classList.add('bi-eye-slash');
                } else {
                    input.type = 'password';
                    iconEl.classList.remove('bi-eye-slash');
                    iconEl.classList.add('bi-eye');
                }
            };
            function setupLogin() { document.getElementById('doctorBtn')?.addEventListener('click', () => { const n = document.getElementById('docName').value.trim(); if(!n) return notify('Введите ФИО','error'); if(document.getElementById('docCode').value !== '123doc') return notify('Неверный код','error'); loginAs(n, 'doctor'); }); document.getElementById('patientBtn')?.addEventListener('click', () => { const n = document.getElementById('patName').value.trim(); if(!n) return notify('Введите ФИО','error'); if(document.getElementById('patCode').value !== 'pat2026') return notify('Неверный код','error'); loginAs(n, 'parent'); registerPatientIfNeeded(n); }); }
            function loginAs(name, role) { profile = { fullName: name, role }; DB.setProfile(profile); updateNav(); App.navigate('/dashboard'); }

            async function renderDashboard() { if (!profile) return ''; const isDoc = profile.role === 'doctor'; let cards = isDoc ? `<div class="col-md-4 mb-3"><div class="dashboard-card" onclick="App.navigate('/patients')"><div class="icon"><i class="bi bi-people"></i></div><h5>Пациенты</h5></div></div><div class="col-md-4 mb-3"><div class="dashboard-card" onclick="App.navigate('/analytics')"><div class="icon"><i class="bi bi-graph-up"></i></div><h5>Аналитика</h5></div></div>` : `<div class="col-md-4 mb-3"><div class="dashboard-card" onclick="App.navigate('/diary')"><div class="icon"><i class="bi bi-journal"></i></div><h5>Дневник</h5></div></div><div class="col-md-4 mb-3"><div class="dashboard-card" onclick="App.navigate('/palliative')"><div class="icon"><i class="bi bi-heart-pulse"></i></div><h5>Паллиатив</h5></div></div><div class="col-md-4 mb-3"><div class="dashboard-card" onclick="App.navigate('/medications')"><div class="icon"><i class="bi bi-capsule"></i></div><h5>Лекарства</h5></div></div>`; const diary = DB.getData('diary'); const palliative = DB.getData('palliative'); const weekAgo = new Date(Date.now() - 7 * 86400000).toISOString().split('T')[0]; const recentDiary = diary.filter(e => e.date >= weekAgo); const recentPall = palliative.filter(e => e.date >= weekAgo); const avgTemp = recentDiary.length ? (recentDiary.reduce((s, e) => s + parseFloat(e.temperature||0), 0) / recentDiary.length).toFixed(1) : '—'; const avgPain = recentPall.length ? (recentPall.reduce((s, e) => s + parseFloat(e.pain||0), 0) / recentPall.length).toFixed(1) : '—'; const lastDiary = diary.slice(-5).reverse(); const lastPall = palliative.slice(-5).reverse(); const instruction = isDoc ? `<div class="card mt-4"><h5><i class="bi bi-info-circle"></i> Инструкция для врача</h5><p>Добавляйте пациентов в разделе «Пациенты». Все данные автоматически собираются в Google Таблицу. Используйте раздел «Аналитика» для просмотра и скачивания Excel.</p></div>` : `<div class="card mt-4"><h5><i class="bi bi-info-circle"></i> Инструкция для пациента</h5><p>Заполняйте модули и нажимайте «Отправить врачу». Данные сохраняются локально и открываются в Яндекс.Форме для отправки врачу.</p></div>`; return `<div class="row"><div class="col-lg-9"><h2>👋 ${esc(profile.fullName)}</h2><div class="row mt-3">${cards}</div>${!isDoc ? `<div class="row mt-4"><div class="col-md-3 mb-3"><div class="card text-center"><i class="bi bi-thermometer-half fs-1 text-primary"></i><h5>Средняя t°</h5><div class="display-6">${avgTemp}°C</div></div></div><div class="col-md-3 mb-3"><div class="card text-center"><i class="bi bi-heart-pulse fs-1 text-danger"></i><h5>Средняя боль</h5><div class="display-6">${avgPain}</div></div></div><div class="col-md-3 mb-3"><div class="card text-center"><i class="bi bi-journal-medical fs-1 text-success"></i><h5>Записей дневника</h5><div class="display-6">${diary.length}</div></div></div><div class="col-md-3 mb-3"><div class="card text-center"><i class="bi bi-heart-pulse fs-1 text-warning"></i><h5>Паллиатив</h5><div class="display-6">${palliative.length}</div></div></div></div><div class="row mt-4"><div class="col-md-6"><div class="card"><h5>Последние записи дневника</h5>${lastDiary.map(e => `<div class="history-item">${e.date} | ${e.temperature||'—'}°C | ${e.wellbeing}/10</div>`).join('') || '<p class="text-muted">Нет записей</p>'}</div></div><div class="col-md-6"><div class="card"><h5>Последние паллиативные показатели</h5>${lastPall.map(e => `<div class="history-item">${e.date} | Боль: ${e.pain} | КЖ: ${e.quality}</div>`).join('') || '<p class="text-muted">Нет записей</p>'}</div></div></div>` : ''}${instruction}</div><div class="col-lg-3"><div class="clock-widget mb-3"><div class="time" id="liveClock">--:--:--</div><div class="date" id="liveDate"></div></div><div class="calendar-widget" id="miniCalendar"></div></div></div>`; }

            async function renderPalliative() { const fields = ['pain:Боль','nausea:Тошнота','appetite:Аппетит','sleep:Сон','mood:Настроение','dyspnea:Одышка','fatigue:Усталость','quality:Качество жизни']; const history = DB.getData('palliative').slice(-10).reverse(); let histHtml = history.map(e => `<div class="history-item"><strong>${e.date}</strong> | Боль: ${e.pain} | Тошнота: ${e.nausea} | Аппетит: ${e.appetite} | Сон: ${e.sleep} | Настроение: ${e.mood} | Одышка: ${e.dyspnea} | Усталость: ${e.fatigue} | КЖ: ${e.quality}</div>`).join(''); return `<h2>❤️ Паллиативный модуль</h2><div class="card"><form id="pallForm">${fields.map(f => { const [id, label] = f.split(':'); return `<label>${label} (0-10)</label><input type="range" name="${id}" class="form-range" min="0" max="10" value="5">`; }).join('')}<button type="button" class="btn btn-primary w-100 mt-2" onclick="savePalliativeLocally()">💾 Сохранить локально</button><button type="button" class="btn btn-success w-100 mt-2" onclick="sendPalliative()">📤 Отправить врачу</button></form></div><div class="card mt-3"><h5>📊 История записей (последние 10)</h5>${histHtml || '<p class="text-muted">Нет записей</p>'}</div>`; }
            window.savePalliativeLocally = function() { const f = document.getElementById('pallForm'); if(!f) return; const d = {}; ['pain','nausea','appetite','sleep','mood','dyspnea','fatigue','quality'].forEach(k => d[k] = f[k].value); saveLocally('palliative', d); updatePatientStats(profile.fullName, 'palliativeCount'); render(); };
            window.sendPalliative = function() { const f = document.getElementById('pallForm'); if(!f) return; const d = {}; ['pain','nausea','appetite','sleep','mood','dyspnea','fatigue','quality'].forEach(k => d[k] = f[k].value); saveLocally('palliative', d); updatePatientStats(profile.fullName, 'palliativeCount'); openYandexForm('palliative', d); sendToGoogleSheet({ form_name: 'Паллиатив', patient: profile.fullName, ...d }); };

            async function renderMedications() { const meds = DB.getMeds(); let list = meds.map((m, i) => `<div class="card mb-2"><strong>${esc(m.name)}</strong> – ${esc(m.dosage)} <span class="reminder-badge">${m.time||''}</span></div>`).join(''); return `<h2>💊 Лекарства</h2><div class="card"><form id="medsForm"><input name="name" class="form-control" placeholder="Название"><input name="dosage" class="form-control" placeholder="Дозировка"><input type="time" name="time" class="form-control" value="08:00"><button type="submit" class="btn btn-primary w-100 mt-2">➕ Добавить</button></form></div>${list || '<p>Нет лекарств</p>'}<button type="button" class="btn btn-success w-100 mt-3" onclick="sendMeds()">📤 Отправить список врачу</button>`; }
            window.sendMeds = function() { const meds = DB.getMeds(); if (meds.length === 0) { notify('Нет лекарств для отправки', 'error'); return; } if (meds.length > 1) notify(`Открыта форма для первого препарата (${meds[0].name}). Остальные отправьте отдельно.`, 'info'); openYandexForm('medications', { name: meds[0].name, dosage: meds[0].dosage, time: meds[0].time }); sendToGoogleSheet({ form_name: 'Лекарства', patient: profile.fullName, med_name: meds[0].name, dosage: meds[0].dosage, med_time: meds[0].time }); updatePatientStats(profile.fullName, 'medsCount'); };
            document.addEventListener('submit', (e) => { if (e.target.id === 'medsForm') { e.preventDefault(); const f = e.target; const meds = DB.getMeds(); meds.push({ name: f.name.value, dosage: f.dosage.value, time: f.time.value }); DB.saveMeds(meds); f.reset(); render(); notify('Лекарство добавлено'); } });

            async function renderNutrition() { const history = DB.getData('nutrition').slice(-10).reverse(); let histHtml = history.map(e => `<div class="history-item"><strong>${e.date}</strong> | Калории: ${e.calories} | Белки: ${e.protein}г | Жиры: ${e.fat}г | Углеводы: ${e.carbs}г</div>`).join(''); return `<h2>🍽️ Питание</h2><div class="card"><form id="nutrForm"><div class="row"><div class="col-md-3"><input type="number" name="calories" class="form-control" placeholder="Ккал"></div><div class="col-md-3"><input type="number" name="protein" class="form-control" placeholder="Белки (г)"></div><div class="col-md-3"><input type="number" name="fat" class="form-control" placeholder="Жиры (г)"></div><div class="col-md-3"><input type="number" name="carbs" class="form-control" placeholder="Углеводы (г)"></div></div><textarea name="notes" class="form-control mt-2" rows="2" placeholder="Заметки"></textarea><button type="button" class="btn btn-primary w-100 mt-2" onclick="saveNutritionLocally()">💾 Сохранить локально</button><button type="button" class="btn btn-success w-100 mt-2" onclick="sendNutrition()">📤 Отправить врачу</button></form></div><div class="card mt-3"><h5>📊 История записей (последние 10)</h5>${histHtml || '<p class="text-muted">Нет записей</p>'}</div>`; }
            window.saveNutritionLocally = function() { const f = document.getElementById('nutrForm'); if(!f) return; saveLocally('nutrition', { calories: f.calories.value, protein: f.protein.value, fat: f.fat.value, carbs: f.carbs.value, notes: f.notes.value }); updatePatientStats(profile.fullName, 'nutritionCount'); render(); };
            window.sendNutrition = function() { const f = document.getElementById('nutrForm'); if(!f) return; const d = { calories: f.calories.value, protein: f.protein.value, fat: f.fat.value, carbs: f.carbs.value, notes: f.notes.value }; saveLocally('nutrition', d); updatePatientStats(profile.fullName, 'nutritionCount'); openYandexForm('nutrition', d); sendToGoogleSheet({ form_name: 'Питание', patient: profile.fullName, ...d }); };

            async function renderPatients() { if (profile.role !== 'doctor') return '<p>Только для врачей</p>'; const myPatients = DB.getDoctorPatients(); const allPatients = DB.getAllPatients(); let list = myPatients.map(name => { const p = allPatients[name] || { diaryCount:0, palliativeCount:0, medsCount:0, nutritionCount:0, labCount:0, timelineCount:0, lastUpdate:'—' }; return `<div class="card mb-2 d-flex justify-content-between align-items-center"><span><strong>${esc(name)}</strong></span><div><span class="badge bg-primary me-1">📋${p.diaryCount||0}</span><span class="badge bg-danger me-1">❤️${p.palliativeCount||0}</span><span class="badge bg-info me-1">💊${p.medsCount||0}</span><span class="badge bg-success me-1">🍽️${p.nutritionCount||0}</span><span class="badge bg-warning me-1">🔬${p.labCount||0}</span><span class="badge bg-secondary me-1">📅${p.timelineCount||0}</span><button class="btn btn-sm btn-danger ms-2" onclick="removeDoctorPatient('${name}')">🗑️</button></div></div>`; }).join(''); let available = Object.keys(allPatients).filter(name => !myPatients.includes(name)); let availList = available.map(name => `<div class="card mb-2 d-flex justify-content-between align-items-center"><span>${esc(name)}</span><button class="btn btn-sm btn-primary" onclick="addDoctorPatient('${name}')">➕ Добавить</button></div>`).join(''); return `<h2>👥 Мои пациенты</h2><div class="card mb-3"><form id="addPatientForm"><input name="name" class="form-control" placeholder="ФИО пациента"><button type="submit" class="btn btn-primary w-100 mt-2">➕ Добавить вручную</button></form></div><h5>Добавленные</h5>${list || '<p class="text-muted">Нет добавленных пациентов</p>'}<h5 class="mt-4">Доступные пациенты</h5>${availList || '<p class="text-muted">Нет новых пациентов</p>'}`; }

                <input id="searchDisease" class="form-control mb-3" placeholder="🔍 Поиск по названию или гену..." oninput="window.filterDiseases()">
                <div class="row" id="diseaseList">
                    ${DISEASES.map(d => `
                    <div class="col-md-4 mb-3">
                        <div class="card disease-card" style="cursor:pointer;" data-id="${d.id}">
                            <div class="card-body">
                                <div style="font-size:2rem;">${d.icon}</div>
                                <h6>${esc(d.name)}</h6>
                                <span class="badge bg-primary">МКБ-10: ${d.icd}</span>
                                <p class="mt-2 small">${d.desc}</p>
                                <div class="disease-details mt-2">
                                    <p><strong>🔬 Диагностика:</strong> ${d.diag}</p>
                                    <p><strong>💊 Лечение:</strong> ${d.treat}</p>

            function setupReference() {
                document.querySelectorAll('.disease-card').forEach(card => {
                    card.addEventListener('click', function(e) {
                        this.classList.toggle('active');
                    });
                });
            }
            window.filterDiseases = () => {
                const q = document.getElementById('searchDisease')?.value.toLowerCase()||'';
                document.querySelectorAll('#diseaseList .col-md-4').forEach(card => {
                    card.style.display = card.textContent.toLowerCase().includes(q) ? '' : 'none';
                });
            };

            function renderGenetics() { return `<h2>🧬 Генетика</h2><div class="card mb-3"><h5>Калькулятор риска</h5><select id="inheritType" class="form-select mb-2"><option value="autosomal_recessive">Аутосомно-рецессивный</option><option value="autosomal_dominant">Аутосомно-доминантный</option><option value="x_linked">X-сцепленный</option></select><select id="fatherStatus" class="form-select mb-2"><option value="healthy">Здоров</option><option value="carrier">Носитель</option><option value="sick">Болен</option></select><select id="motherStatus" class="form-select mb-2"><option value="healthy">Здорова</option><option value="carrier">Носитель</option><option value="sick">Больна</option></select><button class="btn btn-primary w-100" onclick="calcRisk()">Рассчитать</button><div id="riskResult" class="mt-2 text-center fw-bold"></div></div><div class="card mb-3"><h5>📖 Типы наследования</h5><p><strong>Аутосомно-рецессивный:</strong> оба родителя — носители мутации. Риск рождения больного ребёнка — 25%.</p><p><strong>Аутосомно-доминантный:</strong> достаточно одной копии мутантного гена от одного из родителей. Риск — 50%.</p><p><strong>X-сцепленный:</strong> ген находится на X-хромосоме. Мужчины болеют чаще, женщины — носители.</p></div><div class="card mb-3"><h5>🔬 Молекулярно-генетическая экспертиза</h5><p>Для подтверждения диагноза необходимо секвенирование генов (NGS), анализ делеций/дупликаций (MLPA). Исследование проводится в специализированных лабораториях.</p></div><h5>Карточки заболеваний</h5><div class="row">${[{ gene:'CFTR', disease:'Муковисцидоз', desc:'Нарушение транспорта ионов хлора' },{ gene:'PAH', disease:'Фенилкетонурия', desc:'Дефицит фенилаланингидроксилазы' },{ gene:'ATP7B', disease:'Болезнь Вильсона', desc:'Накопление меди в организме' },{ gene:'SMN1', disease:'СМА', desc:'Дегенерация мотонейронов' }].map(d => `<div class="col-md-4 mb-3"><div class="card"><h6>${d.disease}</h6><p><strong>Ген:</strong> ${d.gene}</p><p>${d.desc}</p></div></div>`).join('')}</div>`; }
            function setupGenetics() { window.calcRisk = () => { const type = document.getElementById('inheritType')?.value; const f = document.getElementById('fatherStatus')?.value; const m = document.getElementById('motherStatus')?.value; if(!f||!m||!type) return; let risk = 0; if (type === 'autosomal_recessive') { if (f==='carrier'&&m==='carrier') risk=25; else if ((f==='sick'&&m==='carrier')||(f==='carrier'&&m==='sick')) risk=50; } else if (type === 'autosomal_dominant') { if (f==='sick'||m==='sick') risk=50; } else if (type === 'x_linked') { if (m==='carrier') risk=25; } document.getElementById('riskResult').textContent = `Вероятность: ${risk}%`; }; }

                    { q:'Где хранятся мои данные и как долго?', a:'Все данные сохраняются локально в вашем браузере (LocalStorage) и остаются доступными до тех пор, пока вы не очистите историю браузера. Полная история измерений, симптомов и заметок отображается в каждом модуле (давление, сахар, вес и т.д.). Для дополнительной безопасности рекомендуется регулярно экспортировать данные через кнопку «Выгрузить архив». При смене устройства данные можно перенести через экспорт/импорт.' },
                    { q:'Как восстановить удаленные данные?', a:'Если вы случайно удалили запись, перейдите в раздел «Корзина» (доступен в настройках) – там хранятся удаленные записи в течение 30 дней. Также вы можете восстановить данные из автоматической резервной копии, которая создается каждые 24 часа. Для восстановления нажмите «Восстановить из бэкапа» в разделе «Настройки → Резервное копирование».' },
                    { q:'Можно ли использовать приложение без интернета?', a:'Да, приложение полностью работает в офлайн-режиме. Все записи сохраняются локально и синхронизируются с сервером автоматически при появлении соединения. Однако для отправки данных врачу через Яндекс.Форму или Google Таблицу требуется активное интернет-соединение.' },
                    { q:'Что такое орфанные заболевания?', a:'Орфанные (редкие) заболевания — это патологии, которые встречаются у менее чем 10 человек на 100 000 населения. Всего в мире зарегистрировано более 7000 таких болезней. В России пациенты с орфанными диагнозами имеют право на льготное лекарственное обеспечение, бесплатное лечение и поддержку государства в рамках программы «7 высокозатратных нозологий».' },
                    { q:'Что такое Фенилкетонурия (ФКУ) и чем она опасна?', a:'Фенилкетонурия — это наследственное нарушение обмена аминокислот, при котором организм не может расщеплять фенилаланин. Его накопление вызывает необратимое поражение головного мозга и умственную отсталость. Единственное лечение — строгая диета с ограничением белка и специальные смеси без фенилаланина. Скрининг на ФКУ проводят всем новорожденным в роддоме на 4-5 день жизни.' },
                    { q:'Чем муковисцидоз отличается от других редких заболеваний?', a:'Муковисцидоз — системное заболевание, поражающее железы внешней секреции. В отличие от многих других орфанных болезней, при муковисцидозе страдают одновременно дыхательная система (густая мокрота, хронические инфекции), поджелудочная железа (нарушение пищеварения), потовые железы и репродуктивная система. Лечение включает ферменты, муколитики, антибиотики и кинезитерапию.' },
                    { q:'Какие еще редкие заболевания есть в программе «Круг добра»?', a:'В программу «Круг добра» включены: спинальная мышечная атрофия (СМА), миодистрофия Дюшенна, муковисцидоз, фенилкетонурия, болезнь Гоше, гемофилия, первичные иммунодефициты, наследственные дистрофии сетчатки, лизосомные болезни накопления и более 60 других орфанных патологий. Полный список доступен на сайте фонда.' },
                    { q:'Как получить дорогостоящие лекарства через фонд «Круг добра»?', a:'Для получения помощи необходимо: 1) Обратиться к вашему лечащему врачу-специалисту. 2) Врач собирает врачебную комиссию и готовит пакет документов (выписки, диагноз, подтверждающие обследования). 3) Документы направляются в региональный Минздрав, а затем в фонд «Круг добра». 4) После одобрения заявки (срок рассмотрения до 10 рабочих дней) лекарства передаются в клинику или выдаются на руки. Весь процесс курирует ваш лечащий врач.' },
                    { q:'Какие лекарства можно получать бесплатно при редких заболеваниях?', a:'Перечень зависит от диагноза. Например, при СМА доступны препараты «Спинраза» и «Золгенсма»; при муковисцидозе — «Трикафта», «Калидеко», «Оркамби»; при ФКУ — специализированные смеси без фенилаланина; при болезни Гоше — «Церезим» и «Вплив». Все лекарства предоставляются бесплатно по решению врачебной комиссии в рамках госпрограмм.' },
                    { q:'Как узнать, одобрена ли моя заявка на лекарства?', a:'Статус заявки можно отслеживать: 1) В личном кабинете на сайте фонда «Круг добра» (требуется подтвержденная учетная запись). 2) Через лечащего врача — он получает уведомление о решении комиссии. 3) В региональном отделе Минздрава. Обычно статус становится известен в течение 2-3 недель после подачи документов.' },
                    { q:'Что делать, если в аптеке нет моего препарата?', a:'1) Немедленно свяжитесь с вашим лечащим врачом. 2) Врач может инициировать экстренный запрос в фонд «Круг добра» или региональный департамент здравоохранения. 3) Имеет смысл подать обращение через портал Госуслуг или горячую линию Минздрава (8-800-200-03-89). 4) В крайнем случае, можно приобрести препарат за свой счет и потребовать компенсацию через страховую компанию (полис ОМС позволяет это сделать в законодательном порядке).' },
                    { q:'Как правильно вести дневник здоровья?', a:'В разделе «Дневник» рекомендуется ежедневно фиксировать: 1) Общее самочувствие (по шкале от 1 до 10). 2) Утренний и вечерний вес. 3) Артериальное давление и пульс (утром и вечером). 4) Уровень сахара крови (при диабете). 5) Сатурацию (уровень кислорода в крови). 6) Температуру тела. 7) Все принимаемые препараты с точной дозировкой. 8) Дополнительные симптомы (кашель, одышка, головная боль, тошнота, слабость, судороги). 9) Качество сна и уровень стресса. Чем подробнее записи — тем ценнее информация для врача.' },
                    { q:'Какие показатели обязательно измерять при редких заболеваниях?', a:'Обязательный минимум зависит от диагноза. При муковисцидозе: вес, рост, ОФВ1 (объем форсированного выдоха), сатурация, стул. При СМА: мышечная сила, амплитуда движений, дыхательная функция. При ФКУ: уровень фенилаланина в крови (1 раз в 2-4 недели), вес, когнитивные тесты. При болезни Гоше: размеры печени и селезенки, гемоглобин. Все специфические показатели уточняйте у своего врача.' },
                    { q:'Можно ли прикреплять фото или документы к записям?', a:'Да, вы можете прикреплять фотографии, снимки анализов, выписки из стационара, сканы направлений и другие документы в форматах .jpg, .png, .pdf до 10 МБ. Это особенно полезно для визуального мониторинга (сыпь, отеки, результаты ЭКГ). Все файлы сохраняются локально и передаются врачу вместе с данными.' },
                    { q:'Как настроить напоминания о приеме лекарств?', a:'В разделе «Напоминания» вы можете: 1) Добавить препарат с указанием дозировки и времени приема. 2) Установить периодичность (ежедневно, через день, по расписанию). 3) Выбрать тип уведомления (звук, вибрация, push-уведомление). 4) Настроить напоминания о визитах к врачу и сдаче анализов. Уведомления приходят даже в офлайн-режиме, если разрешены в настройках браузера.' },
                    { q:'Как задать вопрос врачу через приложение?', a:'В разделе «Сообщения» вы можете: 1) Написать новое сообщение с описанием симптомов или вопроса. 2) Прикрепить фото или результаты анализов. 3) Выбрать категорию вопроса (самочувствие, лечение, анализы). 4) Отправить — сообщение придет в личный кабинет врача. Врач отвечает в течение 24-48 часов (в рабочее время). Экстренные вопросы задавайте через колл-центр клиники по телефону.' },
                    { q:'Как часто врач просматривает мои данные?', a:'Ваш лечащий врач получает уведомления о: 1) Каждой новой записи в дневнике (автоматически). 2) Отклонениях показателей (критические значения). 3) Ваших сообщениях. Просмотр происходит не реже 1 раза в день в рабочие дни. При ухудшении состояния врач свяжется с вами в течение часа. Также ежемесячно проводятся онлайн-консультации для разбора динамики.' },
                    { q:'Что делать, если врач не отвечает на сообщения?', a:'1) Проверьте раздел «Сообщения» — возможно, ответ уже есть, но не поступило уведомление. 2) Свяжитесь с регистратурой клиники и сообщите о проблеме. 3) Используйте альтернативные каналы: e-mail врача (указан в карте) или телефон горячей линии. 4) В критической ситуации вызывайте скорую помощь (103) — медицинский протокол всегда первичен. Мы также рекомендуем направить жалобу на портал «Госуслуги» или в Росздравнадзор, если врач систематически игнорирует запросы.' },
                    { q:'Какие браузеры поддерживаются?', a:'Приложение корректно работает в актуальных версиях: Google Chrome (v90+), Mozilla Firefox (v88+), Яндекс.Браузер (v21+), Microsoft Edge (v90+), Safari (v14+), Opera (v76+). Рекомендуем использовать Google Chrome или Яндекс.Браузер для наилучшей производительности и поддержки всех функций.' },
                    { q:'Почему приложение тормозит или зависает?', a:'Возможные причины: 1) Слишком большой объем данных — проведите архивацию и очистку старых записей (старше 2 лет). 2) Устаревший браузер — обновите до последней версии. 3) Много открытых вкладок — закройте лишние. 4) Низкая скорость интернета. 5) Большое количество прикрепленных файлов — удалите ненужные. Если проблема сохраняется, попробуйте: очистить кэш браузера, перезагрузить страницу или использовать режим инкогнито.' },
                    { q:'Можно ли импортировать данные из других приложений (Apple Health, Google Fit)?', a:'На данный момент прямая интеграция с Apple Health и Google Fit находится в разработке (планируется к релизу в Q4 2026). Вы можете вручную перенести данные через Excel/CSV, используя функцию «Импорт» в разделе «Настройки». Поддерживаются форматы .csv и .xlsx. Для переноса скачайте шаблон импорта, заполните его по образцу и загрузите в приложение.' },
                    { q:'Как экспортировать все данные для самостоятельного анализа?', a:'Перейдите в раздел «Настройки» → «Экспорт данных». Выберите формат: 1) Excel (.xlsx) — для анализа в таблицах. 2) CSV — для импорта в статистические программы. 3) PDF — для печати и показа врачу. 4) JSON — полный бэкап всех данных. Вы также можете выбрать период экспорта (последний месяц, квартал, год или весь период). Экспортированный файл будет загружен автоматически.' },
                    { q:'Насколько безопасна передача моих медицинских данных?', a:'Мы используем многоуровневую защиту: 1) Все данные шифруются алгоритмом AES-256 при локальном хранении. 2) Передача осуществляется по защищенному протоколу HTTPS с SSL/TLS шифрованием. 3) Яндекс.Форма использует дополнительное сквозное шифрование. 4) Доступ к Google Таблице ограничен только вашим врачом и подтвержденными медицинскими сотрудниками. 5) Мы не передаем данные третьим лицам. 6) Серверы расположены в РФ с соблюдением 152-ФЗ о персональных данных.' },
                    { q:'Кто кроме врача имеет доступ к моей Google Таблице?', a:'Доступ имеют только: 1) Ваш лечащий врач. 2) Заведующий отделением (для клинического разбора). 3) Медицинские статистики клиники (в обезличенном виде). 4) Техническая поддержка (только в случае сбоев, с вашего письменного согласия). Все сотрудники подписывают соглашение о неразглашении (NDA). Сама таблица защищена двухфакторной аутентификацией и хранится на корпоративном аккаунте клиники с ограничением по IP-адресам.' },
                    { q:'Могу ли я удалить свои данные полностью?', a:'Да. Для полного удаления: 1) Перейдите в «Настройки» → «Безопасность» → «Удалить все данные». 2) Подтвердите действие через двухфакторную аутентификацию (код на e-mail или телефон). 3) Данные удаляются локально и отправляется запрос на удаление из Google Таблицы и Яндекс.Формы (обработка занимает до 48 часов). 4) После этого восстановление невозможно. Архивные копии, если они были созданы, также уничтожаются.' },
                    { q:'Как часто нужно обновлять приложение?', a:'Мы выпускаем обновления каждые 2-4 недели с новыми функциями, улучшениями и исправлением ошибок. Рекомендуем всегда использовать последнюю версию, т.к. в ней: 1) Добавляются новые модули мониторинга. 2) Улучшается производительность. 3) Исправляются найденные баги. 4) Обновляются медицинские протоколы. Проверить наличие обновлений можно в меню «О приложении» в нижней части экрана или просто перезагрузив страницу — обновления применяются автоматически.' },
                    { q:'Есть ли версия приложения для смартфонов (Android/iOS)?', a:'На данный момент приложение доступно как веб-сервис через браузер на любых устройствах (адаптивный дизайн). Мы оптимизировали его под мобильные экраны, поэтому вы можете пользоваться им со смартфона или планшета так же удобно, как с компьютера. Нативная версия для Android и iOS находится в разработке и будет выпущена в 2027 году. Следите за новостями в разделе «Анонсы».' },
                    { q:'Куда обращаться в случае технических проблем?', a:'Для решения технических вопросов: 1) Внутренний чат поддержки в разделе «Настройки» → «Помощь» (ответ в течение 1 часа). 2) Телефон горячей линии: 8-800-555-35-35 (ежедневно с 8:00 до 22:00 МСК). 3) E-mail: support@healthmonitor.ru (с пометкой «Техподдержка»). 4) Telegram-бот @HealthMonitorBot для быстрых вопросов. При обращении указывайте: вашу ОС, браузер и версию приложения (отображается внизу экрана).' }
                ];
                return `<h2>❓ Часто задаваемые вопросы</h2><div class="faq-search"><input type="text" id="faqSearch" class="form-control" placeholder="🔍 Поиск по вопросам..." oninput="window.searchFAQ()"><small class="text-muted" id="faqCount">Всего вопросов: ${FAQ.length}</small></div><div class="faq-grid" id="faqGrid">${FAQ.map((f, i) => `<div class="faq-item" data-index="${i}"><div class="faq-question" onclick="window.toggleFAQ(${i})"><span class="faq-icon">▶</span><h6>${f.q}</h6></div><div class="faq-answer" id="faqAnswer${i}"><p class="text-muted">${f.a}</p></div></div>`).join('')}</div>`;
            }
            window.toggleFAQ = function(index) {
                const allAnswers = document.querySelectorAll('.faq-answer');
                const allIcons = document.querySelectorAll('.faq-icon');
                const answer = document.getElementById(`faqAnswer${index}`);
                const icon = allIcons[index];
                const isOpen = answer.style.display === 'block';
                allAnswers.forEach(a => a.style.display = 'none');
                allIcons.forEach(i => { i.textContent = '▶'; i.parentElement.parentElement.classList.remove('active'); });
                if (!isOpen) { answer.style.display = 'block'; icon.textContent = '▼'; icon.parentElement.parentElement.classList.add('active'); }
            };
            window.searchFAQ = function() {
                const q = document.getElementById('faqSearch')?.value.toLowerCase()||'';
                let visible = 0;
                document.querySelectorAll('#faqGrid .faq-item').forEach(item => {
                    const text = item.textContent.toLowerCase();
                    if (text.includes(q)) { item.style.display = ''; visible++; }
                    else { item.style.display = 'none'; }
                });
                const countEl = document.getElementById('faqCount');
                if (countEl) countEl.textContent = q ? `Найдено: ${visible}` : `Всего вопросов: ${document.querySelectorAll('#faqGrid .faq-item').length}`;
            };

           function renderSupport() {
                return `<h2>❤️ Поддержка и фонды</h2>
                <div class="card mb-3">
                    <h5><i class="bi bi-heart-pulse"></i> Благотворительный фонд «Детский паллиатив»</h5>
                    <p>Фонд оказывает всестороннюю помощь детям с неизлечимыми заболеваниями и их семьям: медицинскую, психологическую, социальную и духовную поддержку.</p>
                    <ul>
                        <li><strong>Телефон горячей линии:</strong> 8 (800) 555-70-11</li>
                        <li><strong>Сайт:</strong>  <a href="https://rcpcf.ru/" target="_blank" class="btn btn-outline">rcpcf.ru</a>

                <div class="card mb-3">

                    <p><i class="bi bi-telephone"></i> 8 (800) 201-62-26</p>
                    <a href="https://фондкругдобра.рф/" target="_blank" class="btn btn-primary me-2">Перейти на сайт</a>
                </div>
                <div class="card mb-3">

                    <a href="https://cr.minzdrav.gov.ru/" target="_blank" class="btn btn-outline me-2">Рубрикатор КР</a>
                </div>`;
            }
            function initClock() { const update = () => { const now = new Date(); const c = document.getElementById('liveClock'), d = document.getElementById('liveDate'); if(c) c.textContent = now.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit',second:'2-digit'}); if(d) d.textContent = now.toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long',year:'numeric'}); }; update(); if(clockTimer)clearInterval(clockTimer); clockTimer = setInterval(update, 1000); }
            function initCalendar() { const cal = document.getElementById('miniCalendar'); if(!cal)return; const now = new Date(); const m = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь']; const fd = new Date(now.getFullYear(),now.getMonth(),1).getDay()||7; const days = new Date(now.getFullYear(),now.getMonth()+1,0).getDate(); const diary = DB.getData('diary'); const palliative = DB.getData('palliative'); const allDates = new Set([...diary.map(e=>e.date), ...palliative.map(e=>e.date)]); let h = `<div class="month-title">${m[now.getMonth()]} ${now.getFullYear()}</div><table><tr><th>Пн</th><th>Вт</th><th>Ср</th><th>Чт</th><th>Пт</th><th>Сб</th><th>Вс</th></tr><tr>`; for(let i=1;i<fd;i++)h+='<td></td>'; for(let d=1;d<=days;d++){if((fd+d-1)%7===1&&d>1)h+='</tr><tr>'; const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; h+=`<td class="${d===now.getDate()?'today':''} ${allDates.has(dateStr)?'has-entry':''}">${d}</td>`;} h+='</tr></table>'; cal.innerHTML = h; }

            window.onhashchange = () => { if(clockTimer)clearInterval(clockTimer); render(); };
            window.onload = render;
        })();
    </script>
</body>
