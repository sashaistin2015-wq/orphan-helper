                            month: 'long', year: 'numeric' });
                };
                u();
                if (clockTimer) clearInterval(clockTimer);
                clockTimer = setInterval(u, 1000);
            }

            function initCalendar() {
                const cal = document.getElementById('miniCalendar');
                if (!cal) return;
                const now = new Date();
                const m = ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь', 'Июль', 'Август', 'Сентябрь', 'Октябрь',
                    'Ноябрь', 'Декабрь'
                ];
                const fd = new Date(now.getFullYear(), now.getMonth(), 1).getDay() || 7;
                const days = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
                const diary = DB.getData('diary'),
                    pall = DB.getData('palliative');
                const allDates = new Set([...diary.map(e => e.date), ...pall.map(e => e.date)]);
                let h =
                    `<div class="month-title">${m[now.getMonth()]} ${now.getFullYear()}</div><table><tr><th>Пн</th><th>Вт</th><th>Ср</th><th>Чт</th><th>Пт</th><th>Сб</th><th>Вс</th></tr><tr>`;
                for (let i = 1; i < fd; i++) h += '<td></td>';
                for (let d = 1; d <= days; d++) {
                    if ((fd + d - 1) % 7 === 1 && d > 1) h += '</tr><tr>';
                    const ds =
                        `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    h += `<td class="${d===now.getDate()?'today':''} ${allDates.has(ds)?'has-entry':''}">${d}</td>`;
                }
                h += '</tr></table>';
                cal.innerHTML = h;
            }

            function toggleTheme() {
                document.body.classList.toggle('dark-theme');
                darkTheme = !darkTheme;
                localStorage.setItem('darkTheme', darkTheme);
            }
            window.toggleTheme = toggleTheme;

            // =====================================================================
            // 23. РЕНДЕР
            // =====================================================================
            async function render() {
                updateNav();
                const page = location.hash.slice(1) || '/';
                const app = document.getElementById('app');
                if (!app) return;
                if (!profile && !['/', '/login', '/reference', '/faq', '/genetics', '/support', '/surveys', '/pallcalc',
                        '/prognosis', '/symptom_search', '/decision_tree'
                    ].includes(page)) {
                    App.navigate('/login');
                    return;
                }
                try {
                    switch (page) {
                        case '/':
                            app.innerHTML =
                                `<div class="hero-section"><div style="font-size:5rem;">🧬</div><h1 class="hero-title">Орфанный помощник</h1><p class="hero-subtitle">Клиническая система мониторинга</p><button class="btn btn-primary hero-btn" onclick="App.navigate('/login')">Войти</button></div>`;
                            break;
                        case '/login':
                            app.innerHTML = renderLogin();
                            setupLogin();
                            break;
                        case '/dashboard':
                            app.innerHTML = renderDashboard();
                            initClock();
                            initCalendar();
                            break;
                        case '/diary':
                            app.innerHTML = renderDiary();
                            break;
                        case '/palliative':
                            app.innerHTML = renderPalliative();
                            break;
                        case '/medications':
                            app.innerHTML = renderMedications();
                            break;
                        case '/nutrition':
                            app.innerHTML = renderNutrition();
                            break;
                        case '/lab':
                            app.innerHTML = renderLab();
                            break;
                        case '/timeline':
                            app.innerHTML = renderTimeline();
                            break;
                        case '/patients':
                            app.innerHTML = renderPatients();
                            break;
                        case '/analytics':
                            app.innerHTML = renderAnalytics();
                            break;
                        case '/reference':
                            app.innerHTML = renderReference();
                            break;
                        case '/genetics':
                            app.innerHTML = renderGenetics();
                            break;
                        case '/faq':
                            app.innerHTML = renderFAQ();
                            break;
                        case '/support':
                            app.innerHTML = renderSupport();
                            break;
                        case '/surveys':
                            app.innerHTML = renderSurveys();
                            setupSurveys();
                            break;
                        case '/pallcalc':
                            app.innerHTML = renderPallcalc();
                            setupPallcalc();
                            break;
                        case '/decision_tree':
                            app.innerHTML = renderDecisionTree();
                            resetDecisionTree();
                            break;
                        case '/prognosis':
                            app.innerHTML = renderPrognosis();
                            break;
                        case '/symptom_search':
                            app.innerHTML = renderSymptomSearch();
                            break;
                        default:
                            app.innerHTML = '<h2 class="text-center mt-5">404</h2>';
                    }
                } catch (e) { app.innerHTML =
                        `<div class="alert alert-danger">Ошибка: ${esc(e.message)}</div>`;
                    console.error(e); }
            }

            // =====================================================================
            // 24. ОБРАБОТЧИКИ СОБЫТИЙ
            // =====================================================================
            document.addEventListener('submit', (e) => {
                if (e.target.id === 'medsForm') {
                    e.preventDefault();
                    const f = e.target;
                    const meds = DB.getMeds();
                    meds.push({ name: f.name.value, dosage: f.dosage.value, time: f.time.value });
                    DB.saveMeds(meds);
                    f.reset();
                    render();
                    notify('Лекарство добавлено');
                } else if (e.target.id === 'addPatientForm') {
                    e.preventDefault();
                    const f = e.target;
                    const name = f.name.value.trim();
                    if (!name) return notify('Введите ФИО', 'error');
                    window.addDoctorPatient(name);
                    registerPatientIfNeeded(name);
                    f.reset();
                    render();
                    notify('Пациент добавлен');
                }
            });

            // =====================================================================
            // 25. ЗАПУСК
            // =====================================================================
            setInterval(() => SyncManager.processQueue(), 30000);
            window.onhashchange = () => { if (clockTimer) clearInterval(clockTimer);
                render(); };
            window.onload = render;

        })();
    </script>
</body>
</html>
