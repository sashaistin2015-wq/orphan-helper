    <style>
        :root { --primary: #0d7377; --primary-light: #14a3a8; --accent: #00b4d8; --danger: #ef4444; --success: #10b981; --warning: #f59e0b; --text: #1e293b; --text-light: #64748b; --bg: #f0f4f8; --card: #ffffff; --radius: 24px; --radius-sm: 16px; --shadow: 0 10px 30px rgba(0,0,0,0.06); }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; transition: all 0.3s; }

        .navbar-brand { font-weight: 800; font-size: 1.35rem; background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; display: flex; align-items: center; gap: 8px; }

        .faq-question { display: flex; align-items: center; gap: 10px; }
        .faq-icon { font-size: 14px; color: var(--primary); min-width: 20px; transition: transform 0.3s; }
        .faq-item.active .faq-icon { transform: rotate(90deg); }

        @keyframes fadeInUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }

        .history-item { font-size: 0.85rem; padding: 8px 12px; border-bottom: 1px solid rgba(0,0,0,0.05); }
        footer { background: var(--card); border-top: 1px solid rgba(128,128,128,0.1); padding: 1.5rem 0; text-align: center; }
        .offcanvas { background: var(--card); color: var(--text); }
        .disease-details { display: none; padding-top: 10px; margin-top: 10px; border-top: 1px solid rgba(128,128,128,0.2); }
        .disease-card.active .disease-details { display: block; }
        .password-wrapper { position: relative; }
        .password-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-light); z-index: 10; background: none; border: none; font-size: 1.1rem; }
        .risk-indicator { padding: 6px 12px; border-radius: 20px; font-weight: 600; }
        .risk-low { background: #d1fae5; color: #065f46; }
        .risk-medium { background: #fef3c7; color: #92400e; }
        .risk-high { background: #fee2e2; color: #991b1b; }
        .sync-badge { position: relative; display: inline-flex; align-items: center; gap: 4px; }
        .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #10b981; animation: pulse 2s infinite; }

        @media (max-width: 768px) { .hero-title { font-size: 2.5rem; } .hero-section { padding: 3rem 1rem; } .btn { padding: 6px 14px; font-size: 0.8rem; } .navbar-brand { font-size: 1.1rem; } .card { padding: 1rem; } }

RiskPredictor.getRulesForDiagnosis = function(diagnosis) {
    const disease = DISEASE_DATABASE.find(d => d.name === diagnosis);
    if (disease && disease.riskRules) {
        return disease.riskRules;
    }
    return this.rules[diagnosis] || this.rules.default;
};

RiskPredictor.predict = function(data, diagnosis = '', history = []) {
    let totalScore = 0;
    const rules = this.getRulesForDiagnosis(diagnosis);
    rules.forEach(rule => {
        const value = data[rule.param];
        if (value !== undefined && rule.condition(value)) totalScore += rule.score;
    });
    // Дополнительный учёт тренда
    if (history.length >= 3) {
        const temps = history.map(e => parseFloat(e.temperature)).filter(v => !isNaN(v));
        if (temps.length >= 3) {
            const last3 = temps.slice(-3);
            if (last3[2] > last3[1] && last3[1] > last3[0]) totalScore += 3;
        }
    }
    return Math.round(Math.min(100, (totalScore / 20) * 100));
};

                        { name: 'description', label: 'Описание', type: 'textarea' }
                    ]
                }
            };
            function getFields(module, diagnosis) { const config = FieldConfig[module]; if (!config) return []; return config[diagnosis] || config.default || []; }

            const SyncManager = {
                STORAGE_KEY: 'sync_queue',
                getQueue() { try { return JSON.parse(localStorage.getItem(this.STORAGE_KEY)) || []; } catch(e) { return []; } },
                saveQueue(queue) { localStorage.setItem(this.STORAGE_KEY, JSON.stringify(queue)); },
                enqueue(entry) {
                    const queue = this.getQueue();
                    const priority = entry.priority || 1;
                    queue.push({ ...entry, id: Date.now().toString(36) + Math.random().toString(36).substr(2, 5), deviceId, version: nextVersion(), timestamp: new Date().toISOString(), retries: 0, status: 'pending', priority });
                    this.saveQueue(queue);
                    this.processQueue();
                },
                async processQueue() {
                    const queue = this.getQueue().filter(e => e.status !== 'sent');
                    if (queue.length === 0) { this.updateSyncIndicator(); return; }
                    queue.sort((a, b) => (b.priority || 0) - (a.priority || 0));
                    for (let i = queue.length - 1; i >= 0; i--) {
                        const entry = queue[i];
                        if (entry.retries >= 5) { entry.status = 'failed'; queue[i] = entry; continue; }
                        try {
                            const config = YANDEX_FORMS[entry.module];
                            if (config && entry.status !== 'form_sent') {
                                const params = new URLSearchParams();
                                params.append(config.fields.patient, entry.data.patient || (profile ? profile.fullName : ''));
                                params.append(config.fields.date, new Date().toISOString().split('T')[0]);
                                for (const [key, value] of Object.entries(entry.data)) {
                                    if (config.fields[key] && value !== undefined && value !== null) params.append(config.fields[key], value);
                                }
                                const baseUrl = config.url.split('?')[0];
                                window.open(`${baseUrl}?${params.toString()}`, '_blank');
                                entry.form_opened = true;
                            }
                            await sendToGoogleSheet(entry.data);
                            entry.status = 'sent';
                            entry.retries = 0;
                        } catch (e) {
                            entry.retries++;
                            entry.lastError = e.message;
                        }
                        queue[i] = entry;
                    }
                    this.saveQueue(queue.filter(e => e.status !== 'sent'));
                    this.updateSyncIndicator();
                },
                getStatus() {
                    const queue = this.getQueue();
                    return { pending: queue.filter(e => e.status === 'pending').length, failed: queue.filter(e => e.status === 'failed').length, total: queue.length };
                },
                updateSyncIndicator() {
                    const status = this.getStatus();
                    const badge = document.getElementById('syncBadge');
                    if (!badge) return;
                    if (status.total === 0) { badge.innerHTML = '<span class="sync-dot"></span> Синхронизировано'; badge.querySelector('.sync-dot').classList.remove('error'); }
                    else if (status.failed > 0) { badge.innerHTML = `<span class="sync-dot error"></span> Ошибок: ${status.failed} <button class="btn btn-sm btn-outline-danger ms-1" onclick="SyncManager.retryFailed()">↻</button>`; }
                    else { badge.innerHTML = `<span class="sync-dot"></span> В очереди: ${status.pending}`; }
                },
                retryFailed() {
                    const queue = this.getQueue();
                    queue.forEach(e => { if (e.status === 'failed') { e.status = 'pending'; e.retries = 0; } });
                    this.saveQueue(queue);
                    this.processQueue();
                },
                mergeData(externalEntries) {
                    const localQueue = this.getQueue();
                    externalEntries.forEach(ext => {
                        const localIdx = localQueue.findIndex(l => l.id === ext.id);
                        if (localIdx === -1) localQueue.push(ext);
                        else {
                            const local = localQueue[localIdx];
                            if (ext.version > local.version) localQueue[localIdx] = ext;
                            else if (ext.version === local.version && new Date(ext.timestamp) > new Date(local.timestamp)) localQueue[localIdx] = ext;
                        }
                    });
                    this.saveQueue(localQueue);
                    notify('Данные объединены', 'info');
                    this.updateSyncIndicator();
                }

                        if (imported.syncQueue && Array.isArray(imported.syncQueue)) {
                            SyncManager.mergeData(imported.syncQueue);

                        if (imported.diary) DB.saveData('diary', imported.diary);

            function renderFAQ() {
                const FAQ = [
                    { q:'Как передать данные врачу?', a:'Нажмите кнопку «Отправить врачу» в правом верхнем углу экрана – откроется защищенная Яндекс.Форма для заполнения. Ваши данные также автоматически дублируются в Google Таблицу, доступ к которой имеет только ваш лечащий врач. Вы можете отправить как текущие показатели, так и архив за выбранный период.' },
                    { q:'Где хранятся мои данные и как долго?', a:'Все данные сохраняются локально в вашем браузере (LocalStorage) и остаются доступными до тех пор, пока вы не очистите историю браузера. Полная история измерений, симптомов и заметок отображается в каждом модуле (давление, сахар, вес и т.д.). Для дополнительной безопасности рекомендуется регулярно экспортировать данные через кнопку «Выгрузить архив». При смене устройства данные можно перенести через экспорт/импорт.' },
                    { q:'Как восстановить удаленные данные?', a:'Если вы случайно удалили запись, перейдите в раздел «Корзина» (доступен в настройках) – там хранятся удаленные записи в течение 30 дней. Также вы можете восстановить данные из автоматической резервной копии, которая создается каждые 24 часа. Для восстановления нажмите «Восстановить из бэкапа» в разделе «Настройки → Резервное копирование».' },
                    { q:'Можно ли использовать приложение без интернета?', a:'Да, приложение полностью работает в офлайн-режиме. Все записи сохраняются локально и синхронизируются с сервером автоматически при появлении соединения. Однако для отправки данных врачу через Яндекс.Форму или Google Таблицу требуется активное интернет-соединение.' },
                    { q:'Что такое орфанные заболевания?', a:'Орфанные (редкие) заболевания — это патологии, которые встречаются у менее чем 10 человек на 100 000 населения. Всего в мире зарегистрировано более 7000 таких болезней. В России пациенты с орфанными диагнозами имеют право на льготное лекарственное обеспечение, бесплатное лечение и поддержку государства в рамках программы «7 высокозатратных нозологий».' },
                    { q:'Что такое Фенилкетонурия (ФКУ) и чем она опасна?', a:'Фенилкетонурия — это наследственное нарушение обмена аминокислот, при котором организм не может расщеплять фенилаланин. Его накопление вызывает необратимое поражение головного мозга и умственную отсталость. Единственное лечение — строгая диета с ограничением белка и специальные смеси без фенилаланина. Скрининг на ФКУ проводят всем новорожденным в роддоме на 4-5 день жизни.' },
                    { q:'Чем муковисцидоз отличается от других редких заболеваний?', a:'Муковисцидоз — системное заболевание, поражающее железы внешней секреции. В отличие от многих других орфанных болезней, при муковисцидозе страдают одновременно дыхательная система (густая мокрота, хронические инфекции), поджелудочная железа (нарушение пищеварения), потовые железы и репродуктивная система. Лечение включает ферменты, муколитики, антибиотики и кинезитерапию.' },
                    { q:'Какие еще редкие заболевания есть в программе «Круг добра»?', a:'В программу «Круг добра» включены: спинальная мышечная атрофия (СМА), миодистрофия Дюшенна, муковисцидоз, фенилкетонурия, болезнь Гоше, гемофилия, первичные иммунодефициты, наследственные дистрофии сетчатки, лизосомные болезни накопления и более 60 других орфанных патологий. Полный список доступен на сайте фонда.' },
                    { q:'Как получить дорогостоящие лекарства через фонд «Круг добра»?', a:'Для получения помощи необходимо: 1) Обратиться к вашему лечащему врачу-специалисту. 2) Врач собирает врачебную комиссию и готовит пакет документов (выписки, диагноз, подтверждающие обследования). 3) Документы направляются в региональный Минздрав, а затем в фонд «Круг добра». 4) После одобрения заявки (срок рассмотрения до 10 рабочих дней) лекарства передаются в клинику или выдаются на руки. Весь процесс курирует ваш лечащий врач.' },
                    { q:'Какие лекарства можно получать бесплатно при редких заболеваниях?', a:'Перечень зависит от диагноза. Например, при СМА доступны препараты «Спинраза» и «Золгенсма»; при муковисцидозе — «Трикафта», «Калидеко», «Оркамби»; при ФКУ — специализированные смеси без фенилаланина; при болезни Гоше — «Церезим» и «Вплив». Все лекарства предоставляются бесплатно по решению врачебной комиссии в рамках госпрограмм.' },
                    { q:'Как узнать, одобрена ли моя заявка на лекарства?', a:'Статус заявки можно отслеживать: 1) В личном кабинете на сайте фонда «Круг добра» (требуется подтвержденная учетная запись). 2) Через лечащего врача — он получает уведомление о решении комиссии. 3) В региональном отделе Минздрава. Обычно статус становится известен в течение 2-3 недель после подачи документов.' },
                    { q:'Что делать, если в аптеке нет моего препарата?', a:'1) Немедленно свяжитесь с вашим лечащим врачом. 2) Врач может инициировать экстренный запрос в фонд «Круг добра» или региональный департамент здравоохранения. 3) Имеет смысл подать обращение через портал Госуслуг или горячую линию Минздрава (8-800-200-03-89). 4) В крайнем случае, можно приобрести препарат за свой счет и потребовать компенсацию через страховую компанию (полис ОМС позволяет это сделать в законодательном порядке).' },
                    { q:'Как правильно вести дневник здоровья?', a:'В разделе «Дневник» рекомендуется ежедневно фиксировать: 1) Общее самочувствие (по шкале от 1 до 10). 2) Утренний и вечерний вес. 3) Артериальное давление и пульс (утром и вечером). 4) Уровень сахара крови (при диабете). 5) Сатурацию (уровень кислорода в крови). 6) Температуру тела. 7) Все принимаемые препараты с точной дозировкой. 8) Дополнительные симптомы (кашель, одышка, головная боль, тошнота, слабость, судороги). 9) Качество сна и уровень стресса. Чем подробнее записи — тем ценнее информация для врача.' },
                    { q:'Какие показатели обязательно измерять при редких заболеваниях?', a:'Обязательный минимум зависит от диагноза. При муковисцидозе: вес, рост, ОФВ1 (объем форсированного выдоха), сатурация, стул. При СМА: мышечная сила, амплитуда движений, дыхательная функция. При ФКУ: уровень фенилаланина в крови (1 раз в 2-4 недели), вес, когнитивные тесты. При болезни Гоше: размеры печени и селезенки, гемоглобин. Все специфические показатели уточняйте у своего врача.' },
                    { q:'Можно ли прикреплять фото или документы к записям?', a:'Да, вы можете прикреплять фотографии, снимки анализов, выписки из стационара, сканы направлений и другие документы в форматах .jpg, .png, .pdf до 10 МБ. Это особенно полезно для визуального мониторинга (сыпь, отеки, результаты ЭКГ). Все файлы сохраняются локально и передаются врачу вместе с данными.' },
                    { q:'Как настроить напоминания о приеме лекарств?', a:'В разделе «Напоминания» вы можете: 1) Добавить препарат с указанием дозировки и времени приема. 2) Установить периодичность (ежедневно, через день, по расписанию). 3) Выбрать тип уведомления (звук, вибрация, push-уведомление). 4) Настроить напоминания о визитах к врачу и сдаче анализов. Уведомления приходят даже в офлайн-режиме, если разрешены в настройках браузера.' },
                    { q:'Как задать вопрос врачу через приложение?', a:'В разделе «Сообщения» вы можете: 1) Написать новое сообщение с описанием симптомов или вопроса. 2) Прикрепить фото или результаты анализов. 3) Выбрать категорию вопроса (самочувствие, лечение, анализы). 4) Отправить — сообщение придет в личный кабинет врача. Врач отвечает в течение 24-48 часов (в рабочее время). Экстренные вопросы задавайте через колл-центр клиники по телефону.' },
                    { q:'Как часто врач просматривает мои данные?', a:'Ваш лечащий врач получает уведомления о: 1) Каждой новой записи в дневнике (автоматически). 2) Отклонениях показателей (критические значения). 3) Ваших сообщениях. Просмотр происходит не реже 1 раза в день в рабочие дни. При ухудшении состояния врач свяжется с вами в течение часа. Также ежемесячно проводятся онлайн-консультации для разбора динамики.' },
                    { q:'Что делать, если врач не отвечает на сообщения?', a:'1) Проверьте раздел «Сообщения» — возможно, ответ уже есть, но не поступило уведомление. 2) Свяжитесь с регистратурой клиники и сообщите о проблеме. 3) Используйте альтернативные каналы: e-mail врача (указан в карте) или телефон горячей линии. 4) В критической ситуации вызывайте скорую помощь (103) — медицинский протокол всегда первичен. Мы также рекомендуем направить жалобу на портал «Госуслуги» или в Росздравнадзор, если врач систематически игнорирует запросы.' },
                    { q:'Какие браузеры поддерживаются?', a:'Приложение корректно работает в актуальных версиях: Google Chrome (v90+), Mozilla Firefox (v88+), Яндекс.Браузер (v21+), Microsoft Edge (v90+), Safari (v14+), Opera (v76+). Рекомендуем использовать Google Chrome или Яндекс.Браузер для наилучшей производительности и поддержки всех функций.' },
                    { q:'Почему приложение тормозит или зависает?', a:'Возможные причины: 1) Слишком большой объем данных — проведите архивацию и очистку старых записей (старше 2 лет). 2) Устаревший браузер — обновите до последней версии. 3) Много открытых вкладок — закройте лишние. 4) Низкая скорость интернета. 5) Большое количество прикрепленных файлов — удалите ненужные. Если проблема сохраняется, попробуйте: очистить кэш браузера, перезагрузить страницу или использовать режим инкогнито.' },
                    { q:'Можно ли импортировать данные из других приложений (Apple Health, Google Fit)?', a:'На данный момент прямая интеграция с Apple Health и Google Fit находится в разработке (планируется к релизу в Q4 2026). Вы можете вручную перенести данные через Excel/CSV, используя функцию «Импорт» в разделе «Настройки». Поддерживаются форматы .csv и .xlsx. Для переноса скачайте шаблон импорта, заполните его по образцу и загрузите в приложение.' },
                    { q:'Как экспортировать все данные для самостоятельного анализа?', a:'Перейдите в раздел «Настройки» → «Экспорт данных». Выберите формат: 1) Excel (.xlsx) — для анализа в таблицах. 2) CSV — для импорта в статистические программы. 3) PDF — для печати и показа врачу. 4) JSON — полный бэкап всех данных. Вы также можете выбрать период экспорта (последний месяц, квартал, год или весь период). Экспортированный файл будет загружен автоматически.' },
                    { q:'Насколько безопасна передача моих медицинских данных?', a:'Мы используем многоуровневую защиту: 1) Все данные шифруются алгоритмом AES-256 при локальном хранении. 2) Передача осуществляется по защищенному протоколу HTTPS с SSL/TLS шифрованием. 3) Яндекс.Форма использует дополнительное сквозное шифрование. 4) Доступ к Google Таблице ограничен только вашим врачом и подтвержденными медицинскими сотрудниками. 5) Мы не передаем данные третьим лицам. 6) Серверы расположены в РФ с соблюдением 152-ФЗ о персональных данных.' },
                    { q:'Кто кроме врача имеет доступ к моей Google Таблице?', a:'Доступ имеют только: 1) Ваш лечащий врач. 2) Заведующий отделением (для клинического разбора). 3) Медицинские статистики клиники (в обезличенном виде). 4) Техническая поддержка (только в случае сбоев, с вашего письменного согласия). Все сотрудники подписывают соглашение о неразглашении (NDA). Сама таблица защищена двухфакторной аутентификацией и хранится на корпоративном аккаунте клиники с ограничением по IP-адресам.' },
                    { q:'Могу ли я удалить свои данные полностью?', a:'Да. Для полного удаления: 1) Перейдите в «Настройки» → «Безопасность» → «Удалить все данные». 2) Подтвердите действие через двухфакторную аутентификацию (код на e-mail или телефон). 3) Данные удаляются локально и отправляется запрос на удаление из Google Таблицы и Яндекс.Формы (обработка занимает до 48 часов). 4) После этого восстановление невозможно. Архивные копии, если они были созданы, также уничтожаются.' },
                    { q:'Как часто нужно обновлять приложение?', a:'Мы выпускаем обновления каждые 2-4 недели с новыми функциями, улучшениями и исправлением ошибок. Рекомендуем всегда использовать последнюю версию, т.к. в ней: 1) Добавляются новые модули мониторинга. 2) Улучшается производительность. 3) Исправляются найденные баги. 4) Обновляются медицинские протоколы. Проверить наличие обновлений можно в меню «О приложении» в нижней части экрана или просто перезагрузив страницу — обновления применяются автоматически.' },
                    { q:'Есть ли версия приложения для смартфонов (Android/iOS)?', a:'На данный момент приложение доступно как веб-сервис через браузер на любых устройствах (адаптивный дизайн). Мы оптимизировали его под мобильные экраны, поэтому вы можете пользоваться им со смартфона или планшета так же удобно, как с компьютера. Нативная версия для Android и iOS находится в разработке и будет выпущена в 2027 году. Следите за новостями в разделе «Анонсы».' },
                    { q:'Куда обращаться в случае технических проблем?', a:'Для решения технических вопросов: 1) Внутренний чат поддержки в разделе «Настройки» → «Помощь» (ответ в течение 1 часа). 2) Телефон горячей линии: 8-800-555-35-35 (ежедневно с 8:00 до 22:00 МСК). 3) E-mail: support@healthmonitor.ru (с пометкой «Техподдержка»). 4) Telegram-бот @HealthMonitorBot для быстрых вопросов. При обращении указывайте: вашу ОС, браузер и версию приложения (отображается внизу экрана).' }
                ];
                return `<h2>❓ Часто задаваемые вопросы</h2><div class="faq-search"><input type="text" id="faqSearch" class="form-control" placeholder="🔍 Поиск по вопросам..." oninput="window.searchFAQ()"><small class="text-muted" id="faqCount">Всего вопросов: ${FAQ.length}</small></div><div class="faq-grid" id="faqGrid">${FAQ.map((f, i) => `<div class="faq-item" data-index="${i}"><div class="faq-question" onclick="window.toggleFAQ(${i})"><span class="faq-icon">▶</span><h6>${f.q}</h6></div><div class="faq-answer" id="faqAnswer${i}"><p class="text-muted">${f.a}</p></div></div>`).join('')}</div>`;
            }
            window.toggleFAQ = function(index) { const allAnswers = document.querySelectorAll('.faq-answer'); const allIcons = document.querySelectorAll('.faq-icon'); const answer = document.getElementById(`faqAnswer${index}`); const icon = allIcons[index]; const isOpen = answer.style.display === 'block'; allAnswers.forEach(a => a.style.display = 'none'); allIcons.forEach(i => { i.textContent = '▶'; i.parentElement.parentElement.classList.remove('active'); }); if (!isOpen) { answer.style.display = 'block'; icon.textContent = '▼'; icon.parentElement.parentElement.classList.add('active'); } };
            window.searchFAQ = function() { const q = document.getElementById('faqSearch')?.value.toLowerCase()||''; let visible = 0; document.querySelectorAll('#faqGrid .faq-item').forEach(item => { const text = item.textContent.toLowerCase(); if (text.includes(q)) { item.style.display = ''; visible++; } else { item.style.display = 'none'; } }); const countEl = document.getElementById('faqCount'); if (countEl) countEl.textContent = q ? `Найдено: ${visible}` : `Всего вопросов: ${document.querySelectorAll('#faqGrid .faq-item').length}`; };

            function renderSupport() {
                return `<h2>❤️ Поддержка и фонды</h2>
                <div class="card mb-3">
                    <h5><i class="bi bi-heart-pulse"></i> Благотворительный фонд «Детский паллиатив»</h5>
                    <p>Фонд оказывает всестороннюю помощь детям с неизлечимыми заболеваниями и их семьям: медицинскую, психологическую, социальную и духовную поддержку.</p>
                    <ul><li><strong>Телефон:</strong> 8 (800) 555-70-11</li><li><strong>Сайт:</strong> <a href="https://детскийпаллиатив.рф" target="_blank">детскийпаллиатив.рф</a></li></ul>
                    <a href="https://детскийпаллиатив.рф" target="_blank" class="btn btn-primary me-2">Перейти на сайт</a>
                </div>
                <div class="card mb-3">
                    <h5><i class="bi bi-hospital"></i> Фонд «Круг добра»</h5>
                    <p>Обеспечивает лекарствами детей с орфанными заболеваниями по всей России.</p>
                    <p><i class="bi bi-telephone"></i> 8 (800) 201-62-26</p>
                    <a href="https://фондкругдобра.рф/" target="_blank" class="btn btn-primary me-2">Перейти на сайт</a>
                </div>
                <div class="card mb-3"><h5>Полезные ресурсы</h5><a href="https://cr.minzdrav.gov.ru/" target="_blank" class="btn btn-outline me-2">Рубрикатор КР</a><a href="https://rcpcf.ru/" target="_blank" class="btn btn-outline">Фонд "Детский паллиатив"</a></div>`;
            }

            function initClock() { const update = () => { const now = new Date(); const c = document.getElementById('liveClock'), d = document.getElementById('liveDate'); if(c) c.textContent = now.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit',second:'2-digit'}); if(d) d.textContent = now.toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long',year:'numeric'}); }; update(); if(clockTimer)clearInterval(clockTimer); clockTimer = setInterval(update, 1000); }
            function initCalendar() { const cal = document.getElementById('miniCalendar'); if(!cal)return; const now = new Date(); const m = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь']; const fd = new Date(now.getFullYear(),now.getMonth(),1).getDay()||7; const days = new Date(now.getFullYear(),now.getMonth()+1,0).getDate(); const diary = DB.getData('diary'); const palliative = DB.getData('palliative'); const allDates = new Set([...diary.map(e=>e.date), ...palliative.map(e=>e.date)]); let h = `<div class="month-title">${m[now.getMonth()]} ${now.getFullYear()}</div><table><tr><th>Пн</th><th>Вт</th><th>Ср</th><th>Чт</th><th>Пт</th><th>Сб</th><th>Вс</th></tr><tr>`; for(let i=1;i<fd;i++)h+='<td></td>'; for(let d=1;d<=days;d++){if((fd+d-1)%7===1&&d>1)h+='</tr><tr>'; const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; h+=`<td class="${d===now.getDate()?'today':''} ${allDates.has(dateStr)?'has-entry':''}">${d}</td>`;} h+='</tr></table>'; cal.innerHTML = h; }

            window.onhashchange = () => { if(clockTimer)clearInterval(clockTimer); render(); };
            window.onload = render;
        })();
    </script>
</body>
</html>
