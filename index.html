function renderDecisionTree() {
    return `
    <h2>🌳 Усовершенствованное дерево решений</h2>
    <div class="card">
        <div class="card-body" id="decisionContainer">
            <div id="decisionQuestion" class="decision-question"></div>
            <div id="decisionOptions" class="mt-3"></div>
            <div id="decisionResult" class="mt-4"></div>
            <button class="btn btn-secondary mt-3" onclick="resetDecisionTree()">Начать заново</button>
        </div>
    </div>
    `;
}

function resetDecisionTree() { decisionState = { step: 0, answers: {} }; showDecisionStep(); }

function showDecisionStep() {
    const step = decisionState.step;
    if (step >= decisionSteps.length) { computeDecisionResult(); return; }
    const s = decisionSteps[step];
    document.getElementById('decisionQuestion').textContent = s.question;
    const optDiv = document.getElementById('decisionOptions');
    document.getElementById('decisionResult').innerHTML = '';
    let html = '';
    if (s.type === 'single') {
        s.options.forEach(opt => {
            html += `<div class="decision-option" onclick="selectDecisionOption('${s.key}','${opt}')">${opt}</div>`;
        });
    } else if (s.type === 'number') {
        html += `<input type="number" id="decisionNumberInput" class="form-control" min="${s.min||0}" max="${s.max||120}" placeholder="Введите число">`;
        html += `<button class="btn btn-primary mt-2" onclick="submitDecisionNumber('${s.key}')">Подтвердить</button>`;
    } else if (s.type === 'multi') {
        s.options.forEach(opt => {
            const checked = (decisionState.answers[s.key] && decisionState.answers[s.key].includes(opt)) ? 'checked' : '';
            html += `<div class="form-check"><input class="form-check-input" type="checkbox" id="dec_${s.key}_${opt}" value="${opt}" ${checked} onchange="toggleDecisionOption('${s.key}','${opt}')"><label class="form-check-label" for="dec_${s.key}_${opt}">${opt}</label></div>`;
        });
        html += `<button class="btn btn-primary mt-2" onclick="nextDecisionStep()">Далее</button>`;
    }
    optDiv.innerHTML = html;
}

window.selectDecisionOption = function(key, value) { decisionState.answers[key] = value; nextDecisionStep(); };
window.submitDecisionNumber = function(key) {
    const val = document.getElementById('decisionNumberInput').value;
    if (val === '') return;
    decisionState.answers[key] = parseFloat(val);
    nextDecisionStep();
};
window.toggleDecisionOption = function(key, value) {
    if (!decisionState.answers[key]) decisionState.answers[key] = [];
    const idx = decisionState.answers[key].indexOf(value);
    if (idx > -1) decisionState.answers[key].splice(idx, 1);
    else decisionState.answers[key].push(value);
};
window.nextDecisionStep = function() { decisionState.step++; showDecisionStep(); };

function computeDecisionResult() {
    const answers = decisionState.answers;
    const diseases = getDiseaseList();
    const userSymptoms = [];
    if (answers.fever === 'Да') userSymptoms.push('лихорадка');
    if (answers.respiratory === 'Кашель') userSymptoms.push('кашель');
    if (answers.respiratory === 'Одышка' || answers.respiratory === 'И то, и другое') userSymptoms.push('одышка');
    if (answers.pain !== 'Нет') userSymptoms.push('боль');
    if (answers.gi) userSymptoms.push(...answers.gi.map(s => s.toLowerCase()));
    if (answers.neuro) userSymptoms.push(...answers.neuro.map(s => s.toLowerCase()));
    if (answers.skin) userSymptoms.push(...answers.skin.map(s => s.toLowerCase()));
    if (answers.hepatosplenomegaly === 'Гепатомегалия' || answers.hepatosplenomegaly === 'И то, и другое') userSymptoms.push('гепатомегалия');
    if (answers.hepatosplenomegaly === 'Спленомегалия' || answers.hepatosplenomegaly === 'И то, и другое') userSymptoms.push('спленомегалия');
    if (answers.development === 'Задержка развития') userSymptoms.push('задержка развития');
    if (answers.development === 'Регресс') userSymptoms.push('регресс');
    if (answers.muscle === 'Да') userSymptoms.push('мышечная слабость', 'мышечная атрофия');
    if (answers.malformations === 'Да') userSymptoms.push('пороки развития');
    if (answers.cardiac === 'Да') userSymptoms.push('кардиальные проявления');

    const scored = diseases.map(d => {
        const diseaseSymptoms = (d.symptoms || []).map(s => s.toLowerCase());
        let totalWeight = 0, matchedWeight = 0;
        userSymptoms.forEach(us => {
            let found = false;
            for (let ds of diseaseSymptoms) {
                if (ds.includes(us) || us.includes(ds)) {
                    const weight = symptomWeights[us] || 1;
                    totalWeight += weight;
                    matchedWeight += weight;
                    found = true;
                    break;
                }
            }
            if (!found) totalWeight += (symptomWeights[us] || 1);
        });
        if (totalWeight === 0) return { disease: d, score: 0, matchPercent: 0 };
        const percent = Math.round((matchedWeight / totalWeight) * 100);
        return { disease: d, score: matchedWeight, matchPercent: percent };
    });

    scored.sort((a, b) => b.score - a.score);
    const top = scored.filter(s => s.score > 0).slice(0, 5);

    const resDiv = document.getElementById('decisionResult');
    if (top.length === 0) {
        resDiv.innerHTML = '<div class="alert alert-warning">Не удалось сопоставить. Попробуйте уточнить симптомы.</div>';
        return;
    }
    let html = '<h5>🎯 Топ-5 вероятных диагнозов (взвешенное совпадение):</h5><div class="list-group">';
    top.forEach(item => {
        const d = item.disease;
        html += `
        <div class="list-group-item">
            <div class="d-flex w-100 justify-content-between">
                <h6>${d.icon} ${d.name}</h6>
                <span class="badge bg-primary">${item.matchPercent}%</span>
            </div>
            <p class="mb-1 small">${d.desc}</p>
            <small><strong>Ген:</strong> ${d.gene || '—'} | <strong>Лечение:</strong> ${d.treat}</small>
        </div>
        `;
    });
    html += '</div>';
    resDiv.innerHTML = html;
}

// Утилита для отправки анкеты в облачную Google Таблицу
function syncSurveyToCloud(surveyType, data) {
  // Если профиль ещё не загружен – тихо выходим
  if (!profile || !profile.patientId) return;
  const payload = {
    patientId: profile.patientId,
    patientName: profile.fullName || '',
    type: surveyType,           // 'pedsql' или 'papascale'
    timestamp: new Date().toISOString(),
    data: data
  };
  fetch(SURVEY_SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify(payload),
    headers: { 'Content-Type': 'application/json' },
    mode: 'no-cors' // Google Apps Script сам обработает, нам не нужен ответ
  }).catch(e => console.warn('Не удалось отправить анкету в облако:', e));
}

                    const result = [{ date: dates[0], value: points[0] }];
                    for (let i = 1; i < points.length - 1; i++) {
                        const prev = points[i-1], curr = points[i], next = points[i+1];
                        if ((curr > prev && curr > next) || (curr < prev && curr < next)) result.push({ date: dates[i], value: curr });
                    }
                    result.push({ date: dates[dates.length-1], value: points[points.length-1] });

                }
            };

                predict(data, diagnosis = '', history = []) {

            async function renderAnalytics() { if (profile.role !== 'doctor') return '<p>Только для врачей</p>'; return `<h2>📈 Аналитика</h2><div class="card mb-3"><h5>📊 Единая таблица ответов</h5><a href="https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/edit" target="_blank" class="btn btn-outline me-2">📂 Открыть таблицу</a><a href="https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=xlsx" target="_blank" class="btn btn-success">📥 Скачать Excel</a></div><div class="card"><h5>📤 Загрузить локальный Excel</h5><input type="file" id="localExcel" accept=".xlsx,.xls" class="form-control mb-2"><button class="btn btn-primary" onclick="loadLocalExcel()">Показать данные</button><div id="excelPreview" class="mt-3"></div></div>`; }

function startVoiceInput(fieldId) {
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    if (!recognition) {
        notify('Голосовой ввод не поддерживается вашим браузером', 'error');
        return;
    }
    recognition.lang = 'ru-RU';
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;
    recognition.onresult = function(event) {
        const transcript = event.results[0][0].transcript;
        document.getElementById(fieldId).value = transcript;
        notify('Распознано: ' + transcript, 'info');
    };
    recognition.onerror = function(event) {
        notify('Ошибка распознавания: ' + event.error, 'error');
    };
    recognition.start();
}

function setupReference() { document.querySelectorAll('.disease-card').forEach(card => { card.addEventListener('click', function(e) { this.classList.toggle('active'); }); }); }
window.filterDiseases = () => {

            function renderGenetics() { return `<h2>🧬 Генетика</h2><div class="card mb-3"><h5>Калькулятор риска</h5><select id="inheritType" class="form-select mb-2"><option value="autosomal_recessive">Аутосомно-рецессивный</option><option value="autosomal_dominant">Аутосомно-доминантный</option><option value="x_linked">X-сцепленный</option></select><select id="fatherStatus" class="form-select mb-2"><option value="healthy">Здоров</option><option value="carrier">Носитель</option><option value="sick">Болен</option></select><select id="motherStatus" class="form-select mb-2"><option value="healthy">Здорова</option><option value="carrier">Носитель</option><option value="sick">Больна</option></select><button class="btn btn-primary w-100" onclick="calcRisk()">Рассчитать</button><div id="riskResult" class="mt-2 text-center fw-bold"></div></div><div class="card mb-3"><h5>📖 Типы наследования</h5><p><strong>Аутосомно-рецессивный:</strong> оба родителя — носители мутации. Риск рождения больного ребёнка — 25%.</p><p><strong>Аутосомно-доминантный:</strong> достаточно одной копии мутантного гена от одного из родителей. Риск — 50%.</p><p><strong>X-сцепленный:</strong> ген находится на X-хромосоме. Мужчины болеют чаще, женщины — носители.</p></div><div class="card mb-3"><h5>🔬 Молекулярно-генетическая экспертиза</h5><p>Для подтверждения диагноза необходимо секвенирование генов (NGS), анализ делеций/дупликаций (MLPA). Исследование проводится в специализированных лабораториях.</p></div><h5>Карточки заболеваний</h5><div class="row">${[{ gene:'CFTR', disease:'Муковисцидоз', desc:'Нарушение транспорта ионов хлора' },{ gene:'PAH', disease:'Фенилкетонурия', desc:'Дефицит фенилаланингидроксилазы' },{ gene:'ATP7B', disease:'Болезнь Вильсона', desc:'Накопление меди в организме' },{ gene:'SMN1', disease:'СМА', desc:'Дегенерация мотонейронов' }].map(d => `<div class="col-md-4 mb-3"><div class="card"><h6>${d.disease}</h6><p><strong>Ген:</strong> ${d.gene}</p><p>${d.desc}</p></div></div>`).join('')}</div>`; }
            function setupGenetics() { window.calcRisk = () => { const type = document.getElementById('inheritType')?.value; const f = document.getElementById('fatherStatus')?.value; const m = document.getElementById('motherStatus')?.value; if(!f||!m||!type) return; let risk = 0; if (type === 'autosomal_recessive') { if (f==='carrier'&&m==='carrier') risk=25; else if ((f==='sick'&&m==='carrier')||(f==='carrier'&&m==='sick')) risk=50; } else if (type === 'autosomal_dominant') { if (f==='sick'||m==='sick') risk=50; } else if (type === 'x_linked') { if (m==='carrier') risk=25; } document.getElementById('riskResult').textContent = `Вероятность: ${risk}%`; }; }

            function renderFAQ() {

                    { q:'Где хранятся мои данные и как долго?', a:'Все данные сохраняются локально в вашем браузере (LocalStorage) и остаются доступными до тех пор, пока вы не очистите историю браузера. Полная история измерений, симптомов и заметок отображается в каждом модуле (давление, сахар, вес и т.д.). Для дополнительной безопасности рекомендуется регулярно экспортировать данные через кнопку «Выгрузить архив». При смене устройства данные можно перенести через экспорт/импорт.' },
                    { q:'Как восстановить удаленные данные?', a:'Если вы случайно удалили запись, перейдите в раздел «Корзина» (доступен в настройках) – там хранятся удаленные записи в течение 30 дней. Также вы можете восстановить данные из автоматической резервной копии, которая создается каждые 24 часа. Для восстановления нажмите «Восстановить из бэкапа» в разделе «Настройки → Резервное копирование».' },
                    { q:'Можно ли использовать приложение без интернета?', a:'Да, приложение полностью работает в офлайн-режиме. Все записи сохраняются локально и синхронизируются с сервером автоматически при появлении соединения. Однако для отправки данных врачу через Яндекс.Форму или Google Таблицу требуется активное интернет-соединение.' },
                    { q:'Что такое орфанные заболевания?', a:'Орфанные (редкие) заболевания — это патологии, которые встречаются у менее чем 10 человек на 100 000 населения. Всего в мире зарегистрировано более 7000 таких болезней. В России пациенты с орфанными диагнозами имеют право на льготное лекарственное обеспечение, бесплатное лечение и поддержку государства в рамках программы «7 высокозатратных нозологий».' },
                    { q:'Что такое Фенилкетонурия (ФКУ) и чем она опасна?', a:'Фенилкетонурия — это наследственное нарушение обмена аминокислот, при котором организм не может расщеплять фенилаланин. Его накопление вызывает необратимое поражение головного мозга и умственную отсталость. Единственное лечение — строгая диета с ограничением белка и специальные смеси без фенилаланина. Скрининг на ФКУ проводят всем новорожденным в роддоме на 4-5 день жизни.' },
                    { q:'Чем муковисцидоз отличается от других редких заболеваний?', a:'Муковисцидоз — системное заболевание, поражающее железы внешней секреции. В отличие от многих других орфанных болезней, при муковисцидозе страдают одновременно дыхательная система (густая мокрота, хронические инфекции), поджелудочная железа (нарушение пищеварения), потовые железы и репродуктивная система. Лечение включает ферменты, муколитики, антибиотики и кинезитерапию.' },
                    { q:'Какие еще редкие заболевания есть в программе «Круг добра»?', a:'В программу «Круг добра» включены: спинальная мышечная атрофия (СМА), миодистрофия Дюшенна, муковисцидоз, фенилкетонурия, болезнь Гоше, гемофилия, первичные иммунодефициты, наследственные дистрофии сетчатки, лизосомные болезни накопления и более 60 других орфанных патологий. Полный список доступен на сайте фонда.' },
                    { q:'Как получить дорогостоящие лекарства через фонд «Круг добра»?', a:'Для получения помощи необходимо: 1) Обратиться к вашему лечащему врачу-специалисту. 2) Врач собирает врачебную комиссию и готовит пакет документов (выписки, диагноз, подтверждающие обследования). 3) Документы направляются в региональный Минздрав, а затем в фонд «Круг добра». 4) После одобрения заявки (срок рассмотрения до 10 рабочих дней) лекарства передаются в клинику или выдаются на руки. Весь процесс курирует ваш лечащий врач.' },
                    { q:'Какие лекарства можно получать бесплатно при редких заболеваниях?', a:'Перечень зависит от диагноза. Например, при СМА доступны препараты «Спинраза» и «Золгенсма»; при муковисцидозе — «Трикафта», «Калидеко», «Оркамби»; при ФКУ — специализированные смеси без фенилаланина; при болезни Гоше — «Церезим» и «Вплив». Все лекарства предоставляются бесплатно по решению врачебной комиссии в рамках госпрограмм.' },
                    { q:'Как узнать, одобрена ли моя заявка на лекарства?', a:'Статус заявки можно отслеживать: 1) В личном кабинете на сайте фонда «Круг добра» (требуется подтвержденная учетная запись). 2) Через лечащего врача — он получает уведомление о решении комиссии. 3) В региональном отделе Минздрава. Обычно статус становится известен в течение 2-3 недель после подачи документов.' },
                    { q:'Что делать, если в аптеке нет моего препарата?', a:'1) Немедленно свяжитесь с вашим лечащим врачом. 2) Врач может инициировать экстренный запрос в фонд «Круг добра» или региональный департамент здравоохранения. 3) Имеет смысл подать обращение через портал Госуслуг или горячую линию Минздрава (8-800-200-03-89). 4) В крайнем случае, можно приобрести препарат за свой счет и потребовать компенсацию через страховую компанию (полис ОМС позволяет это сделать в законодательном порядке).' },
                    { q:'Как правильно вести дневник здоровья?', a:'В разделе «Дневник» рекомендуется ежедневно фиксировать: 1) Общее самочувствие (по шкале от 1 до 10). 2) Утренний и вечерний вес. 3) Артериальное давление и пульс (утром и вечером). 4) Уровень сахара крови (при диабете). 5) Сатурацию (уровень кислорода в крови). 6) Температуру тела. 7) Все принимаемые препараты с точной дозировкой. 8) Дополнительные симптомы (кашель, одышка, головная боль, тошнота, слабость, судороги). 9) Качество сна и уровень стресса. Чем подробнее записи — тем ценнее информация для врача.' },
                    { q:'Какие показатели обязательно измерять при редких заболеваниях?', a:'Обязательный минимум зависит от диагноза. При муковисцидозе: вес, рост, ОФВ1 (объем форсированного выдоха), сатурация, стул. При СМА: мышечная сила, амплитуда движений, дыхательная функция. При ФКУ: уровень фенилаланина в крови (1 раз в 2-4 недели), вес, когнитивные тесты. При болезни Гоше: размеры печени и селезенки, гемоглобин. Все специфические показатели уточняйте у своего врача.' },
                    { q:'Можно ли прикреплять фото или документы к записям?', a:'Да, вы можете прикреплять фотографии, снимки анализов, выписки из стационара, сканы направлений и другие документы в форматах .jpg, .png, .pdf до 10 МБ. Это особенно полезно для визуального мониторинга (сыпь, отеки, результаты ЭКГ). Все файлы сохраняются локально и передаются врачу вместе с данными.' },
                    { q:'Как настроить напоминания о приеме лекарств?', a:'В разделе «Напоминания» вы можете: 1) Добавить препарат с указанием дозировки и времени приема. 2) Установить периодичность (ежедневно, через день, по расписанию). 3) Выбрать тип уведомления (звук, вибрация, push-уведомление). 4) Настроить напоминания о визитах к врачу и сдаче анализов. Уведомления приходят даже в офлайн-режиме, если разрешены в настройках браузера.' },
                    { q:'Как задать вопрос врачу через приложение?', a:'В разделе «Сообщения» вы можете: 1) Написать новое сообщение с описанием симптомов или вопроса. 2) Прикрепить фото или результаты анализов. 3) Выбрать категорию вопроса (самочувствие, лечение, анализы). 4) Отправить — сообщение придет в личный кабинет врача. Врач отвечает в течение 24-48 часов (в рабочее время). Экстренные вопросы задавайте через колл-центр клиники по телефону.' },
                    { q:'Как часто врач просматривает мои данные?', a:'Ваш лечащий врач получает уведомления о: 1) Каждой новой записи в дневнике (автоматически). 2) Отклонениях показателей (критические значения). 3) Ваших сообщениях. Просмотр происходит не реже 1 раза в день в рабочие дни. При ухудшении состояния врач свяжется с вами в течение часа. Также ежемесячно проводятся онлайн-консультации для разбора динамики.' },
                    { q:'Что делать, если врач не отвечает на сообщения?', a:'1) Проверьте раздел «Сообщения» — возможно, ответ уже есть, но не поступило уведомление. 2) Свяжитесь с регистратурой клиники и сообщите о проблеме. 3) Используйте альтернативные каналы: e-mail врача (указан в карте) или телефон горячей линии. 4) В критической ситуации вызывайте скорую помощь (103) — медицинский протокол всегда первичен. Мы также рекомендуем направить жалобу на портал «Госуслуги» или в Росздравнадзор, если врач систематически игнорирует запросы.' },
                    { q:'Какие браузеры поддерживаются?', a:'Приложение корректно работает в актуальных версиях: Google Chrome (v90+), Mozilla Firefox (v88+), Яндекс.Браузер (v21+), Microsoft Edge (v90+), Safari (v14+), Opera (v76+). Рекомендуем использовать Google Chrome или Яндекс.Браузер для наилучшей производительности и поддержки всех функций.' },
                    { q:'Почему приложение тормозит или зависает?', a:'Возможные причины: 1) Слишком большой объем данных — проведите архивацию и очистку старых записей (старше 2 лет). 2) Устаревший браузер — обновите до последней версии. 3) Много открытых вкладок — закройте лишние. 4) Низкая скорость интернета. 5) Большое количество прикрепленных файлов — удалите ненужные. Если проблема сохраняется, попробуйте: очистить кэш браузера, перезагрузить страницу или использовать режим инкогнито.' },
                    { q:'Можно ли импортировать данные из других приложений (Apple Health, Google Fit)?', a:'На данный момент прямая интеграция с Apple Health и Google Fit находится в разработке (планируется к релизу в Q4 2026). Вы можете вручную перенести данные через Excel/CSV, используя функцию «Импорт» в разделе «Настройки». Поддерживаются форматы .csv и .xlsx. Для переноса скачайте шаблон импорта, заполните его по образцу и загрузите в приложение.' },
                    { q:'Как экспортировать все данные для самостоятельного анализа?', a:'Перейдите в раздел «Настройки» → «Экспорт данных». Выберите формат: 1) Excel (.xlsx) — для анализа в таблицах. 2) CSV — для импорта в статистические программы. 3) PDF — для печати и показа врачу. 4) JSON — полный бэкап всех данных. Вы также можете выбрать период экспорта (последний месяц, квартал, год или весь период). Экспортированный файл будет загружен автоматически.' },
                    { q:'Насколько безопасна передача моих медицинских данных?', a:'Мы используем многоуровневую защиту: 1) Все данные шифруются алгоритмом AES-256 при локальном хранении. 2) Передача осуществляется по защищенному протоколу HTTPS с SSL/TLS шифрованием. 3) Яндекс.Форма использует дополнительное сквозное шифрование. 4) Доступ к Google Таблице ограничен только вашим врачом и подтвержденными медицинскими сотрудниками. 5) Мы не передаем данные третьим лицам. 6) Серверы расположены в РФ с соблюдением 152-ФЗ о персональных данных.' },
                    { q:'Кто кроме врача имеет доступ к моей Google Таблице?', a:'Доступ имеют только: 1) Ваш лечащий врач. 2) Заведующий отделением (для клинического разбора). 3) Медицинские статистики клиники (в обезличенном виде). 4) Техническая поддержка (только в случае сбоев, с вашего письменного согласия). Все сотрудники подписывают соглашение о неразглашении (NDA). Сама таблица защищена двухфакторной аутентификацией и хранится на корпоративном аккаунте клиники с ограничением по IP-адресам.' },
                    { q:'Могу ли я удалить свои данные полностью?', a:'Да. Для полного удаления: 1) Перейдите в «Настройки» → «Безопасность» → «Удалить все данные». 2) Подтвердите действие через двухфакторную аутентификацию (код на e-mail или телефон). 3) Данные удаляются локально и отправляется запрос на удаление из Google Таблицы и Яндекс.Формы (обработка занимает до 48 часов). 4) После этого восстановление невозможно. Архивные копии, если они были созданы, также уничтожаются.' },
                    { q:'Как часто нужно обновлять приложение?', a:'Мы выпускаем обновления каждые 2-4 недели с новыми функциями, улучшениями и исправлением ошибок. Рекомендуем всегда использовать последнюю версию, т.к. в ней: 1) Добавляются новые модули мониторинга. 2) Улучшается производительность. 3) Исправляются найденные баги. 4) Обновляются медицинские протоколы. Проверить наличие обновлений можно в меню «О приложении» в нижней части экрана или просто перезагрузив страницу — обновления применяются автоматически.' },
                    { q:'Есть ли версия приложения для смартфонов (Android/iOS)?', a:'На данный момент приложение доступно как веб-сервис через браузер на любых устройствах (адаптивный дизайн). Мы оптимизировали его под мобильные экраны, поэтому вы можете пользоваться им со смартфона или планшета так же удобно, как с компьютера. Нативная версия для Android и iOS находится в разработке и будет выпущена в 2027 году. Следите за новостями в разделе «Анонсы».' },
                    { q:'Куда обращаться в случае технических проблем?', a:'Для решения технических вопросов: 1) Внутренний чат поддержки в разделе «Настройки» → «Помощь» (ответ в течение 1 часа). 2) Телефон горячей линии: 8-800-555-35-35 (ежедневно с 8:00 до 22:00 МСК). 3) E-mail: support@healthmonitor.ru (с пометкой «Техподдержка»). 4) Telegram-бот @HealthMonitorBot для быстрых вопросов. При обращении указывайте: вашу ОС, браузер и версию приложения (отображается внизу экрана).' }

function setupPallcalc() {
    // ======= ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ =======
    function getBMIRef(gender, age) {
        const a = Math.min(18, Math.max(2, age));
        if (gender === 'male') {
            if (a < 5) return { median: 15.8 + (a-2)*0.4, sd: 1.9 };
            if (a < 10) return { median: 16.2 + (a-5)*0.8, sd: 2.2 };
            if (a < 15) return { median: 18.0 + (a-10)*1.2, sd: 2.8 };
            return { median: 21.5 + (a-15)*0.5, sd: 3.0 };
        } else {
            if (a < 5) return { median: 15.5 + (a-2)*0.3, sd: 1.8 };
            if (a < 10) return { median: 15.8 + (a-5)*0.9, sd: 2.3 };
            if (a < 15) return { median: 18.3 + (a-10)*1.1, sd: 2.9 };
            return { median: 21.8 + (a-15)*0.4, sd: 3.1 };
        }
    }

    function zScoreToPercentile(z) {
        const sign = z < 0 ? -1 : 1;
        const absZ = Math.abs(z);
        const t = 1 / (1 + 0.278393*absZ + 0.230389*absZ*absZ + 0.000972*absZ*absZ*absZ + 0.078108*absZ*absZ*absZ*absZ);
        const erf = 1 - t * Math.exp(-absZ*absZ - 1.26551223 + t*(1.00002368 + t*(0.37409196 + t*(0.09678418 + t*(-0.18628806 + t*(0.27886807 + t*(-1.13520398 + t*(1.48851587 + t*(-0.82215223 + t*0.17087277)))))))));
        return 50 + sign * (erf * 50 - 50);
    }

    function getBMICategory(p) {
        if (p < 3) return 'Тяжёлый дефицит массы тела';
        if (p < 10) return 'Умеренный дефицит';

        if (p < 75) return 'Норма';
        if (p < 90) return 'Избыточная масса';
        if (p < 97) return 'Ожирение';
        return 'Тяжёлое ожирение';
    }

    function getHRRef(age) {
        if (age<1) return {median:130, sd:25};

        if (age<10) return {median:90, sd:16};

    function getRRRef(age) {

    calculateBMI: function() {
        const diagnosis = document.getElementById('calcDiagnosis')?.value || '';
        const gender = document.getElementById('calcGender')?.value || 'male';
        const age = parseFloat(document.getElementById('calcAgeYears')?.value);
        const height = parseFloat(document.getElementById('calcHeightCm')?.value);
        const weight = parseFloat(document.getElementById('calcWeightKg')?.value);
        const container = document.getElementById('bmi-result-container');
        if (!container) return;

        if (isNaN(age) || isNaN(height) || isNaN(weight) || age < 2 || age > 18 || height < 40 || weight < 2) {
            container.innerHTML = '<div class="alert alert-warning">Заполните все поля корректно (возраст 2–18 лет, рост >40 см, вес >2 кг).</div>';
            return;
        }
        const heightM = height / 100;
        const bmi = weight / (heightM * heightM);
        const ref = getBMIRef(gender, age);
        const zScore = ref.sd > 0 ? (bmi - ref.median) / ref.sd : 0;
        const percentile = zScoreToPercentile(zScore);
        const category = getBMICategory(percentile);

        window._pallData = window._pallData || {};
        window._pallData.bmi = { bmi, percentile, zScore, category, age, gender, height, weight, diagnosis };

        container.innerHTML =
            '<div class="alert alert-info">' +
            '<strong>ИМТ:</strong> ' + bmi.toFixed(1) + ' кг/м²<br>' +
            '<strong>Перцентиль:</strong> ' + percentile.toFixed(1) + '% (Z-score: ' + zScore.toFixed(2) + ')<br>' +
            '<strong>Категория:</strong> ' + category +
            '</div>';
        document.getElementById('vital-signs-section').style.display = 'block';
    },

        }

        }
        html += '<small>Референсы: NHLBI 2011, ВОЗ. SDS > |2| – повод для дообследования.</small></div>';

        window._pallData = window._pallData || {};

    calculateEfficiency: function() {
        const patFields = ['effPatClinical','effPatPsycho','effPatQuality','effPatOrganizational','effPatAdditional'];
        const docFields = ['effDocTimeliness','effDocDocumentation','effDocCoordination','effDocInteraction'];
        let valid = true;
        const vals = {};
        [...patFields, ...docFields].forEach(id => {
            const el = document.getElementById(id);
            if (!el) { valid = false; return; }
            const v = parseInt(el.value);
            if (isNaN(v) || v < 1 || v > 5) { el.classList.add('invalid'); valid = false; }
            else { el.classList.remove('invalid'); vals[id] = v; }
        });
        if (!valid) {
            notify('Все поля должны быть целыми числами от 1 до 5.', 'error');
            return;
        }

        const pat = (vals.effPatClinical + vals.effPatPsycho + vals.effPatQuality + vals.effPatOrganizational + vals.effPatAdditional) / 5;
        const doc = (vals.effDocTimeliness + vals.effDocDocumentation + vals.effDocCoordination + vals.effDocInteraction) / 4;
        const total = ((pat + doc) / 2) * 20;

        let level, color, interp;
        if (total >= 85) { level = 'Высокая'; color = '#28a745'; interp = 'Отличная работа. Поддерживайте стандарты.'; }
        else if (total >= 70) { level = 'Хорошая'; color = '#ffc107'; interp = 'Есть потенциал улучшения.'; }
        else if (total >= 55) { level = 'Удовлетворительная'; color = '#fd7e14'; interp = 'Требуется корректировка процессов.'; }
        else { level = 'Требует улучшения'; color = '#dc3545'; interp = 'Критично – аудит и обучение персонала.'; }

        window._pallData = window._pallData || {};
        window._pallData.efficiency = { total, level, pat, doc, vals, color, interp };

        const container = document.getElementById('efficiency-result');
        if (!container) return;
        container.innerHTML =
            '<div style="border-left:5px solid ' + color + '; padding-left:1rem;">' +
            '<h5 style="color:' + color + '">Интегральная эффективность: ' + total.toFixed(1) + '% (' + level + ')</h5>' +
            '<p>' + interp + '</p>' +
            '<div class="row">' +
            '<div class="col-md-4"><strong>Пациенты:</strong> ' + pat.toFixed(1) + '/5</div>' +
            '<div class="col-md-4"><strong>Врачи:</strong> ' + doc.toFixed(1) + '/5</div>' +

        this.drawEfficiencyCharts(pat, doc, vals, color);

    clusterPatient: function() {
        const fields = {
            pain: 'clustPain',
            nutrition: 'clustNutrition',
            phys_func: 'clustPhysFunc',
            emo_func: 'clustEmoFunc',
            soc_func: 'clustSocFunc',
            role_func: 'clustRoleFunc'
        };
        const limits = { pain:[0,10], nutrition:[0,5], phys_func:[0,100], emo_func:[0,100], soc_func:[0,100], role_func:[0,100] };
        let valid = true;
        const vals = {};
        for (const [key, id] of Object.entries(fields)) {
            const el = document.getElementById(id);
            if (!el) { valid = false; continue; }
            const v = parseFloat(el.value);
            if (isNaN(v) || v < limits[key][0] || v > limits[key][1]) { el.classList.add('invalid'); valid = false; }
            else { el.classList.remove('invalid'); vals[key] = v; }
        }
        if (!valid) {
            notify('Введите корректные значения для всех полей.', 'error');
            return;
        }

        let best = null, minDist = Infinity;
        for (const [name, cfg] of Object.entries(profiles)) {
            const c = cfg.center;
            const dist = Math.hypot(vals.pain - c.боль, vals.nutrition - c.нутр,
                vals.phys_func - c.физ, vals.emo_func - c.эмо,
                vals.soc_func - c.соц, vals.role_func - c.рол);
            if (dist < minDist) { minDist = dist; best = name; }
        }
        const p = profiles[best];
        const deltaQoL = 4.87 - 0.41*vals.nutrition - 0.52*vals.pain - 0.09*vals.phys_func;
        const orMapping = { "Болевой":6.1, "Нутритивный":3.5, "Двигательный":1.4, "Относительно компенсированный":1.0, "Социально-депривированный":2.8 };
        const orVal = orMapping[best] || 1.0;

        window._pallData = window._pallData || {};
        window._pallData.clustering = { best, deltaQoL, orVal, recs: p.recs, desc: p.desc, center: p.center };

        const container = document.getElementById('clustering-result');
        if (!container) return;
        container.innerHTML =
            '<div class="alert alert-primary">' +
            '<h5>Профиль: «' + best + '»</h5>' +
            '<p>' + p.desc + '</p>' +
            '<p><strong>Рекомендации:</strong> ' + p.recs + '</p>' +
            '<p><strong>Прогнозируемый прирост КЖ (Δ):</strong> ' + deltaQoL.toFixed(2) + ' балла</p>' +
            '<p><strong>OR выраженного улучшения:</strong> ' + orVal + ' (p<0.05)</p>' +
            '</div>';
        this.drawClusterCharts(vals, p.center, best, deltaQoL, orVal);
    },

// ======= НОВЫЙ МЕТОД ЗАГРУЗКИ ИЗ АНКЕТ (С ОБЛАКОМ) =======
loadFromSurveys: function(target) {
    // 1. Сначала пробуем загрузить из локального хранилища
    const local = JSON.parse(localStorage.getItem('surveyData') || '{}');
    if (local.pedsql || local.papascale) {
        this.applySurveyData(target, local.pedsql, local.papascale);
        return;
    }

    // 2. Если локально пусто – запрашиваем из облака
    const patientId = prompt('Введите ID пациента, чьи анкеты загрузить:');
    if (!patientId) return;

    // Показываем индикатор загрузки
    notify('Загрузка анкет из облака...', 'info');

    fetch(SURVEY_SCRIPT_URL + '?action=getSurvey&patientId=' + encodeURIComponent(patientId))
      .then(function(response) { return response.json(); })
      .then(function(result) {
        if (result.success && result.data) {
          // Кешируем полученные данные локально, чтобы не ходить в облако каждый раз
          localStorage.setItem('surveyData', JSON.stringify(result.data));
          this.applySurveyData(target, result.data.pedsql, result.data.papascale);
        } else {
          notify('Анкеты для этого пациента не найдены в облаке.', 'error');
        }
      }.bind(this))
      .catch(function(e) {
        console.error(e);
        notify('Ошибка загрузки из облака. Проверьте интернет и ID.', 'error');
      });
},

// Вспомогательная функция: подстановка значений анкет в поля калькулятора
applySurveyData: function(target, pedsql, papascale) {
    if (target === 'efficiency') {
        if (pedsql && pedsql.total !== undefined) {
            document.getElementById('effPatQuality').value = Math.round(1 + (pedsql.total / 100) * 4);
            document.getElementById('effPatPsycho').value = Math.round(1 + ((pedsql.emotional || 0) / 100) * 4);
            const clinical = ((pedsql.physical || 0) + (pedsql.emotional || 0) + (pedsql.social || 0) + (pedsql.school || 0)) / 4;
            document.getElementById('effPatClinical').value = Math.round(1 + (clinical / 100) * 4);
            notify('Данные PedsQL загружены в поля эффективности.', 'info');
        } else {
            notify('Нет данных PedsQL. Заполните анкету или проверьте ID.', 'error');
        }
    } else if (target === 'clustering') {
        if (pedsql) {
            document.getElementById('clustPhysFunc').value = Math.round(pedsql.physical || 0);
            document.getElementById('clustEmoFunc').value = Math.round(pedsql.emotional || 0);
            document.getElementById('clustSocFunc').value = Math.round(pedsql.social || 0);
            document.getElementById('clustRoleFunc').value = Math.round(pedsql.school || 0);

        if (papascale && papascale.total !== undefined) {

        } else {

    }

                </div>

window.calculatePrognosis = function() {
    const age = parseFloat(document.getElementById('progAge').value) || 10;
    const bmi = parseFloat(document.getElementById('progBMI').value) || 18.5;
    const hr = parseFloat(document.getElementById('progHR').value) || 90;
    const rr = parseFloat(document.getElementById('progRR').value) || 22;
    const spo2 = parseFloat(document.getElementById('progSpO2').value) || 95;
    const sbp = parseFloat(document.getElementById('progSBP').value) || 110;
    const dbp = parseFloat(document.getElementById('progDBP').value) || 70;
    const pain = parseFloat(document.getElementById('progPain').value) || 0;
    const qol = parseFloat(document.getElementById('progQoL').value) || 5;
    const trend = document.getElementById('progTempTrend').value;
    const hosp = parseFloat(document.getElementById('progHospitalizations').value) || 0;

    let score = 0;
    // Возраст
    if (age < 2) score += 0.8;
    else if (age > 65) score += 0.6;
    else if (age > 50) score += 0.2;
    // ИМТ
    if (bmi < 16) score += 0.7;
    else if (bmi < 18.5) score += 0.3;
    else if (bmi > 30) score += 0.5;
    else if (bmi > 25) score += 0.2;
    // ЧСС
    if (hr > 120) score += 0.7;
    else if (hr > 100) score += 0.3;
    else if (hr < 50) score += 0.6;
    // ЧДД
    if (rr > 30) score += 0.6;
    else if (rr > 24) score += 0.3;
    // SpO₂
    if (spo2 < 88) score += 1.0;
    else if (spo2 < 92) score += 0.6;
    else if (spo2 < 95) score += 0.2;
    // АД
    if (sbp < 90 || dbp < 50) score += 0.8;
    else if (sbp > 180 || dbp > 120) score += 0.6;
    else if (sbp > 140) score += 0.2;
    // Боль
    if (pain > 8) score += 0.8;
    else if (pain > 6) score += 0.4;
    else if (pain > 4) score += 0.2;
    // Качество жизни
    if (qol < 3) score += 0.9;
    else if (qol < 5) score += 0.4;
    else if (qol < 7) score += 0.2;
    // Температурный тренд
    if (trend === 'rising') score += 0.5;
    else if (trend === 'falling') score += 0.2;
    // Госпитализации
    if (hosp >= 3) score += 0.8;
    else if (hosp >= 2) score += 0.4;
    else if (hosp >= 1) score += 0.2;

    const logit = -2.0 + score * 2.2;
    let risk = 100 / (1 + Math.exp(-logit));
    risk = Math.min(95, Math.max(5, Math.round(risk)));

    let level, color, recommendation;
    if (risk >= 70) {
        level = 'Высокий';
        color = '#d32f2f';
        recommendation = '🚨 Немедленно связаться с паллиативной бригадой, рассмотреть госпитализацию, усилить обезболивание и симптоматическую терапию.';
    } else if (risk >= 40) {
        level = 'Средний';
        color = '#f57c00';
        recommendation = '⚠️ Усилить амбулаторное наблюдение, проконсультировать диетолога, скорректировать режим обезболивания, рассмотреть вопрос о психологической поддержке.';
    } else {
        level = 'Низкий';
        color = '#2e7d32';
        recommendation = '✅ Продолжить текущее наблюдение, поддерживать качество жизни, плановые визиты.';
    }

    document.getElementById('prognosisResult').innerHTML = `
    <div class="alert" style="border-left: 6px solid ${color}; background: #f8f9fa;">
        <h5>Вероятность госпитализации в ближайшие 30 дней: <strong style="color:${color};">${risk}%</strong></h5>
        <p><strong>Уровень тревоги:</strong> <span style="color:${color};">${level}</span></p>
        <p><strong>Рекомендации:</strong> ${recommendation}</p>
        <hr>
        <small class="text-muted">Расчёт основан на клинических коэффициентах (адаптировано из PaPaScale, PALLIA-10, экспертных данных).</small>
    </div>
    `;
};

    const query = document.getElementById('symptomInput').value.trim().toLowerCase();

    if (!query) { container.innerHTML = ''; return; }
    const diseases = getDiseaseList();
    const matches = diseases.filter(d => {
        const text = (d.name + ' ' + d.desc + ' ' + d.gene + ' ' + (d.symptoms || []).join(' ')).toLowerCase();
        return text.includes(query);

function exportStatisticalSyntax() {
    const diary = DB.getData('diary');
    const palliative = DB.getData('palliative');

    let rows = [];
    const allDates = new Set([...diary.map(e => e.date), ...palliative.map(e => e.date)]);
    allDates.forEach(date => {
        const d = diary.find(e => e.date === date) || {};
        const p = palliative.find(e => e.date === date) || {};
        rows.push({
            date,
            temperature: d.temperature || '',
            weight: d.weight || '',
            wellbeing: d.wellbeing || '',
            pain: p.pain || '',
            quality: p.quality || '',
            dyspnea: p.dyspnea || '',
            fatigue: p.fatigue || ''
        });
    });

    const headers = ['date', 'temperature', 'weight', 'wellbeing', 'pain', 'quality', 'dyspnea', 'fatigue'];
    let csv = headers.join(',') + '\n';
    rows.forEach(r => {
        csv += headers.map(h => r[h] || '').join(',') + '\n';
    });

    const rSyntax =
        '# Импорт данных\n' +
        'data <- read.csv("data.csv", stringsAsFactors = FALSE)\n' +
        'data$date <- as.Date(data$date)\n' +
        'summary(data)\n' +
        'cor(data[, sapply(data, is.numeric)], use = "complete.obs")\n' +
        'plot(data$date, data$temperature, type="l", xlab="Дата", ylab="Температура")\n';

    const spssSyntax =
        '* Импорт данных.\n' +
        'GET DATA /TYPE=TXT\n' +
        '  /FILE="data.csv"\n' +
        '  /DELCASE=LINE\n' +
        '  /DELIMITERS=","\n' +
        '  /ARRANGEMENT=DELIMITED\n' +
        '  /FIRSTCASE=2\n' +
        '  /VARIABLES= date A10 temperature F8.2 weight F8.2 wellbeing F8.0 pain F8.0 quality F8.0 dyspnea F8.0 fatigue F8.0.\n' +
        'CACHE.\nEXECUTE.\n' +
        'DESCRIPTIVES VARIABLES=temperature weight wellbeing pain quality dyspnea fatigue\n' +
        '  /STATISTICS=MEAN STDDEV MIN MAX.\n' +
        'CORRELATIONS /VARIABLES=temperature weight wellbeing pain quality dyspnea fatigue.\n';

    function download(content, filename, mime) {
        const blob = new Blob([content], { type: mime });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.click();
        URL.revokeObjectURL(url);
    }

    download(csv, 'data.csv', 'text/csv');
    download(rSyntax, 'analysis.R', 'text/plain');
    download(spssSyntax, 'analysis.sps', 'text/plain');

    notify('Экспорт статистических файлов выполнен', 'info');
}

    };

    window.calculatePedsQL = function() {
        const allItems = [...Array(8)].map((_, i) => parseInt(document.getElementById('pedsql_a' + (i+1))?.value) || 0)
            .concat([...Array(5)].map((_, i) => parseInt(document.getElementById('pedsql_b' + (i+1))?.value) || 0))
            .concat([...Array(5)].map((_, i) => parseInt(document.getElementById('pedsql_c' + (i+1))?.value) || 0))
            .concat([...Array(5)].map((_, i) => parseInt(document.getElementById('pedsql_d' + (i+1))?.value) || 0));
        const sum = allItems.reduce((a, b) => a + b, 0);
        const total = 100 - (sum / (allItems.length * 4) * 100);
        const cat = total >= 80 ? 'Хорошее КЖ' : total >= 60 ? 'Среднее КЖ' : 'Низкое КЖ';
        document.getElementById('pedsql-result').innerHTML = '<div class="alert alert-info">Общий балл PedsQL: <strong>' + total.toFixed(1) + '</strong> – ' + cat + '</div>';

        const surveyData = {
            pedsql: {
                total: total,
                physical: (allItems.slice(0, 8).reduce((a, b) => a + b, 0) / 8) * 100 / 4,
                emotional: (allItems.slice(8, 13).reduce((a, b) => a + b, 0) / 5) * 100 / 4,
                social: (allItems.slice(13, 18).reduce((a, b) => a + b, 0) / 5) * 100 / 4,
                school: (allItems.slice(18, 23).reduce((a, b) => a + b, 0) / 5) * 100 / 4,
                category: cat
            }
        };
       const existing = JSON.parse(localStorage.getItem('surveyData') || '{}');
localStorage.setItem('surveyData', JSON.stringify({ ...existing, ...surveyData }));
notify('Данные PedsQL сохранены локально.', 'info');
    };

    window.calculatePaPaScale = function() {
        const vals = ['1_1','1_2','2_1','2_2','3_1','3_2','3_3','4_1','4_2','5_1','5_2'];
        const total = vals.reduce((s, id) => {
            const el = document.getElementById('papa_' + id);
            return s + (el ? parseInt(el.value) || 0 : 0);
        }, 0);
        const cat = total > 25 ? 'Показана ПП (вынести на ВК)' : total > 15 ? 'Скорее всего нуждается в ПП' : total > 10 ? 'Может нуждаться в ПП' : 'Не нуждается в ПП';
        document.getElementById('papascale-result').innerHTML = '<div class="alert alert-info">Суммарный балл PaPaScale: <strong>' + total + '</strong> – ' + cat + '</div>';

        const surveyData = JSON.parse(localStorage.getItem('surveyData') || '{}');
        surveyData.papascale = { total, category: cat };
        localStorage.setItem('surveyData', JSON.stringify(surveyData));
        notify('Данные PaPaScale сохранены для использования в калькуляторе.', 'info');
    };

    document.getElementById('papa_4_1')?.addEventListener('change', function() {
        const wrapper = document.getElementById('papa_4_2_wrapper');
        if (this.value === '4') wrapper.style.display = 'none';
        else wrapper.style.display = '';
    });
    document.getElementById('papa_5_1')?.addEventListener('change', function() {
        const wrapper = document.getElementById('papa_5_2_wrapper');
        if (this.value === '3' || this.value === '4') wrapper.style.display = 'none';
        else wrapper.style.display = '';
    });
}

            function initClock() { const update = () => { const now = new Date(); const c = document.getElementById('liveClock'), d = document.getElementById('liveDate'); if(c) c.textContent = now.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit',second:'2-digit'}); if(d) d.textContent = now.toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long',year:'numeric'}); }; update(); if(clockTimer)clearInterval(clockTimer); clockTimer = setInterval(update, 1000); }
            function initCalendar() { const cal = document.getElementById('miniCalendar'); if(!cal)return; const now = new Date(); const m = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь']; const fd = new Date(now.getFullYear(),now.getMonth(),1).getDay()||7; const days = new Date(now.getFullYear(),now.getMonth()+1,0).getDate(); const diary = DB.getData('diary'); const palliative = DB.getData('palliative'); const allDates = new Set([...diary.map(e=>e.date), ...palliative.map(e=>e.date)]); let h = `<div class="month-title">${m[now.getMonth()]} ${now.getFullYear()}</div><table><tr><th>Пн</th><th>Вт</th><th>Ср</th><th>Чт</th><th>Пт</th><th>Сб</th><th>Вс</th></tr><tr>`; for(let i=1;i<fd;i++)h+='<td></td>'; for(let d=1;d<=days;d++){if((fd+d-1)%7===1&&d>1)h+='</tr><tr>'; const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; h+=`<td class="${d===now.getDate()?'today':''} ${allDates.has(dateStr)?'has-entry':''}">${d}</td>`;} h+='</tr></table>'; cal.innerHTML = h; }
    
       window.onhashchange = () => { if (clockTimer) clearInterval(clockTimer); render(); };
    window.onload = render;
})();
