<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Орфанный помощник – полная версия</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🧬</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ===== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ И СБРОС ===== */
        :root {
            --primary: #0d7377;
            --primary-light: #14a3a8;
            --accent: #00b4d8;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --text: #1e293b;
            --text-light: #64748b;
            --bg: #f0f4f8;
            --card: #ffffff;
            --radius: 24px;
            --radius-sm: 16px;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
        }
        .dark-theme {
            --primary: #14a3a8;
            --text: #f1f5f9;
            --text-light: #94a3b8;
            --bg: #0f172a;
            --card: #1e293b;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            font-size: 0.85rem;
            transition: background 0.3s, color 0.3s;
        }

        /* ===== НАВИГАЦИЯ ===== */
        .navbar {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            padding: 6px 0;
        }
        .dark-theme .navbar {
            background: rgba(30, 41, 59, 0.8);
        }
        .navbar-brand {
            font-weight: 800;
            font-size: 1.1rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .brand-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: white;
            -webkit-text-fill-color: white;
        }

        /* ===== КАРТОЧКИ ===== */
        .card,
        .dashboard-card {
            background: var(--card);
            border-radius: 12px;
            border: 1px solid #e9ecef;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04);
            padding: 1rem;
            margin-bottom: 1rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover,
        .dashboard-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
        }

        /* ===== КНОПКИ ===== */
        .btn {
            border-radius: 8px;
            font-weight: 500;
            padding: 4px 12px;
            font-size: 0.75rem;
            border: none;
            transition: all 0.25s;
            cursor: pointer;
        }
        .btn-primary {
            background: #2563eb;
            color: white;
        }
        .btn-primary:hover {
            background: #1d4ed8;
        }
        .btn-success {
            background: #059669;
            color: white;
        }
        .btn-success:hover {
            background: #047857;
        }
        .btn-danger {
            background: #dc2626;
            color: white;
        }
        .btn-danger:hover {
            background: #b91c1c;
        }
        .btn-outline {
            border: 1px solid #d1d5db;
            color: #374151;
            background: transparent;
        }
        .btn-outline:hover {
            background: #f3f4f6;
        }
        .btn-accent {
            background: #6f42c1;
            color: #fff;
        }
        .btn-accent:hover {
            background: #5a32a3;
        }

        /* ===== ФОРМЫ ===== */
        .form-control,
        .form-select {
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            padding: 6px 12px;
            background: var(--card);
            color: var(--text);
            width: 100%;
            margin-bottom: 6px;
            font-size: 0.8rem;
        }
        .form-control:focus,
        .form-select:focus {
            border-color: var(--primary-light);
            outline: none;
            box-shadow: 0 0 0 3px rgba(13, 115, 119, 0.1);
        }
        .form-range {
            height: 6px;
        }
        .form-range::-webkit-slider-thumb {
            width: 18px;
            height: 18px;
            background: var(--primary);
            cursor: pointer;
        }

        /* ===== WIDGETS ===== */
        .clock-widget {
            background: linear-gradient(135deg, #1e293b, #334155);
            color: white;
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
            margin-bottom: 1rem;
        }
        .clock-widget .time {
            font-size: 1.8rem;
            font-weight: 800;
        }
        .calendar-widget {
            background: var(--card);
            border-radius: 12px;
            padding: 0.8rem;
            margin-bottom: 1rem;
        }
        .calendar-widget table {
            width: 100%;
            border-collapse: collapse;
        }
        .calendar-widget td {
            text-align: center;
            padding: 4px;
            cursor: pointer;
            border-radius: 8px;
            font-size: 0.75rem;
        }
        .calendar-widget td.today {
            background: var(--primary);
            color: white;
        }
        .calendar-widget td.has-entry {
            background: var(--success);
            color: white;
            opacity: 0.7;
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            padding: 12px 18px;
            border-radius: 10px;
            color: white;
            animation: fadeInUp 0.5s ease;
            font-size: 0.8rem;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== HERO ===== */
        .hero-section {
            text-align: center;
            padding: 3rem 1rem;
        }
        .hero-title {
            font-size: 2.2rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        .hero-subtitle {
            font-size: 1rem;
            color: var(--text-light);
            max-width: 500px;
            margin: 0 auto 1.5rem;
        }
        .hero-btn {
            padding: 10px 28px;
            font-size: 0.9rem;
        }

        /* ===== ДЕТАЛИ ЗАБОЛЕВАНИЙ ===== */
        .disease-details {
            display: none;
            padding-top: 8px;
            margin-top: 8px;
            border-top: 1px solid rgba(128, 128, 128, 0.2);
            font-size: 0.8rem;
        }
        .disease-card.active .disease-details {
            display: block;
        }

        /* ===== ГЕНЕТИЧЕСКИЕ КАРТОЧКИ ===== */
        .gene-card {
            border-left: 4px solid #3b82f6;
            padding: 0.6rem;
            margin-bottom: 0.6rem;
            background: var(--card);
            border-radius: 0 8px 8px 0;
        }

        /* ===== FAQ ===== */
        .faq-item {
            border-left: 3px solid var(--primary);
            padding: 0.8rem;
            margin-bottom: 0.8rem;
            background: var(--card);
            cursor: pointer;
            border-radius: 0 12px 12px 0;
            transition: all 0.3s;
        }
        .faq-item:hover {
            background: rgba(13, 115, 119, 0.05);
            transform: translateX(3px);
        }
        .faq-item.active {
            border-left-color: var(--accent);
            background: rgba(0, 180, 216, 0.08);
        }
        .faq-question {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .faq-icon {
            font-size: 12px;
            color: var(--primary);
            min-width: 16px;
            transition: transform 0.3s;
        }
        .faq-item.active .faq-icon {
            transform: rotate(90deg);
        }
        .faq-answer {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 2px dashed rgba(128, 128, 128, 0.2);
            display: none;
            font-size: 0.8rem;
        }

        /* ===== ПАЛЛИАТИВНЫЙ КАЛЬКУЛЯТОР ===== */
        .pallcalc-tab,
        .survey-tab {
            display: none;
        }
        .pallcalc-tab.active,
        .survey-tab.active {
            display: block;
        }
        .tab-btn {
            border-radius: 16px;
            font-size: 0.75rem;
            padding: 4px 12px;
        }
        .tab-btn.active {
            background: var(--primary);
            color: white;
        }
        .pallcalc-card {
            background: #fff;
            border-radius: 12px;
            padding: 1.2rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            margin-bottom: 1rem;
            border: 1px solid #f0f2f5;
        }
        .dark-theme .pallcalc-card {
            background: #1e293b;
            border-color: #334155;
        }

        /* ===== ПАРАМЕТРЫ ===== */
        .params-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.8rem;
        }
        @media (max-width: 768px) {
            .params-grid {
                grid-template-columns: 1fr;
            }
            .hero-title {
                font-size: 1.8rem;
            }
        }
        .section-title {
            font-size: 1rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        /* ===== ДЕРЕВО РЕШЕНИЙ ===== */
        .decision-option {
            display: inline-block;
            padding: 8px 16px;
            margin: 4px 6px 4px 0;
            background: var(--card);
            border: 2px solid var(--primary);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text);
        }
        .decision-option:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(13, 115, 119, 0.3);
        }
        .decision-option.selected {
            background: var(--primary);
            color: white;
        }
        .decision-question {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 12px;
            padding: 12px;
            background: rgba(13, 115, 119, 0.08);
            border-radius: 12px;
            border-left: 4px solid var(--primary);
        }

        /* ===== РИСК-ИНДИКАТОРЫ ===== */
        .clinical-risk-badge {
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 20px;
            display: inline-block;
        }
        .clinical-risk-high {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
        .clinical-risk-medium {
            background: #fef3c7;
            color: #92400e;
            border: 1px solid #fde68a;
        }
        .clinical-risk-low {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        /* ===== СИНХРОНИЗАЦИЯ ===== */
        .sync-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            margin-right: 4px;
        }
        .sync-dot.error {
            background: #ef4444;
        }

        /* ===== ПРОЧЕЕ ===== */
        .history-item {
            background: #fff;
            border-radius: 6px;
            padding: 4px 10px;
            margin-bottom: 4px;
            border: 1px solid #e2e8f0;
            font-size: 0.75rem;
        }
        .dark-theme .history-item {
            background: #1e293b;
            color: var(--text);
        }
        .password-wrapper {
            position: relative;
        }
        .password-toggle {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-light);
            z-index: 10;
            background: none;
            border: none;
            font-size: 1rem;
        }
        .offcanvas {
            background: var(--card);
            color: var(--text);
        }
        footer {
            background: var(--card);
            border-top: 1px solid rgba(128, 128, 128, 0.1);
            padding: 1rem 0;
            text-align: center;
            font-size: 0.75rem;
            margin-top: 2rem;
        }
        .chart-box {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 1rem;
        }
        .chart-wrapper {
            flex: 1 1 240px;
            min-height: 200px;
            background: #fafbfc;
            border-radius: 10px;
            padding: 0.6rem;
        }
        .dark-theme .chart-wrapper {
            background: #0f172a;
        }
        .reminder-badge {
            background: #c7d2fe;
            color: #3730a3;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 0.6rem;
        }
        .risk-indicator {
            padding: 4px 10px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 0.8rem;
        }
        .risk-low {
            background: #d1fae5;
            color: #065f46;
        }
        .risk-medium {
            background: #fef3c7;
            color: #92400e;
        }
        .risk-high {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>

            const DEVICE_ID_KEY = 'deviceId';

            function getDeviceId() {

                const el = document.createElement('div');

                else if (type === 'info') el.style.background = '#3b82f6';

                el.innerHTML = msg;
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 4000);

            window.notify = notify;
            const esc = s => { const d = document.createElement('div');

            function getBMIRef(gender, age) {
                const a = Math.min(18, Math.max(2, age));
                if (gender === 'male') {
                    if (a < 5) return { median: 15.8 + (a - 2) * 0.4, sd: 1.9 };
                    if (a < 10) return { median: 16.2 + (a - 5) * 0.8, sd: 2.2 };
                    if (a < 15) return { median: 18.0 + (a - 10) * 1.2, sd: 2.8 };
                    return { median: 21.5 + (a - 15) * 0.5, sd: 3.0 };
                } else {
                    if (a < 5) return { median: 15.5 + (a - 2) * 0.3, sd: 1.8 };
                    if (a < 10) return { median: 15.8 + (a - 5) * 0.9, sd: 2.3 };
                    if (a < 15) return { median: 18.3 + (a - 10) * 1.1, sd: 2.9 };
                    return { median: 21.8 + (a - 15) * 0.4, sd: 3.1 };
                }
            }

            function zScoreToPercentile(z) {
                const sign = z < 0 ? -1 : 1;
                const absZ = Math.abs(z);
                const t = 1 / (1 + 0.278393 * absZ + 0.230389 * absZ * absZ + 0.000972 * absZ * absZ * absZ + 0.078108 *
                    absZ * absZ * absZ * absZ);
                const erf = 1 - t * Math.exp(-absZ * absZ - 1.26551223 + t * (1.00002368 + t * (0.37409196 + t * (0.09678418 +
                    t * (-0.18628806 + t * (0.27886807 + t * (-1.13520398 + t * (1.48851587 + t * (-0.82215223 + t *
                        0.17087277)))))))));
                return 50 + sign * (erf * 50 - 50);
            }

            function getBMICategory(p) {
                if (p < 3) return 'Тяжёлый дефицит массы тела';
                if (p < 10) return 'Умеренный дефицит';
                if (p < 25) return 'Пониженная масса';
                if (p < 75) return 'Норма';
                if (p < 90) return 'Избыточная масса';
                if (p < 97) return 'Ожирение';
                return 'Тяжёлое ожирение';
            }

            function getHRRef(age) { if (age < 1) return { median: 130, sd: 25 }; if (age < 3) return { median: 115,
                sd: 20 }; if (age < 6) return { median: 100, sd: 18 }; if (age < 10) return { median: 90,
                    sd: 16 }; if (age < 15) return { median: 80, sd: 14 }; return { median: 75, sd: 12 }; }

            function getRRRef(age) { if (age < 1) return { min: 30, max: 40 }; if (age < 3) return { min: 24,
                max: 30 }; if (age < 6) return { min: 22, max: 24 }; if (age < 12) return { min: 18,
                max: 22 }; return { min: 12, max: 18 }; }

            function getBPRef(age) { if (age < 1) return { median_sys: 85, median_dia: 50, sd_sys: 12,
                sd_dia: 10 }; if (age < 3) return { median_sys: 90, median_dia: 55, sd_sys: 11,
                sd_dia: 9 }; if (age < 6) return { median_sys: 95, median_dia: 58, sd_sys: 10,
                sd_dia: 8 }; if (age < 10) return { median_sys: 100, median_dia: 62, sd_sys: 10,
                sd_dia: 8 }; if (age < 14) return { median_sys: 108, median_dia: 66, sd_sys: 11,
                sd_dia: 9 }; return { median_sys: 115, median_dia: 70, sd_sys: 12, sd_dia: 10 }; }

            function syncSurveyToCloud(surveyType, data) {
                if (!profile || !profile.patientId) return;
                const payload = { patientId: profile.patientId, patientName: profile.fullName || '', type: surveyType,
                    timestamp: new Date().toISOString(), data: data };
                fetch(SURVEY_SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload), headers: { 'Content-Type': 'application/json' },
                        mode: 'no-cors' }).catch(e => console.warn('Ошибка отправки анкеты:', e));
            }

            const SyncManager = {
                STORAGE_KEY: 'sync_queue',
                getQueue() { try { return JSON.parse(localStorage.getItem(this.STORAGE_KEY)) || []; } catch (e) { return []; } },
                saveQueue(queue) { localStorage.setItem(this.STORAGE_KEY, JSON.stringify(queue)); },
                enqueue(entry) {
                    const queue = this.getQueue();
                    queue.push({ ...entry, id: Date.now().toString(36) + Math.random().toString(36).substr(2, 5), deviceId,
                        version: nextVersion(), timestamp: new Date().toISOString(), retries: 0, status: 'pending',
                        priority: entry.priority || 1 });
                    this.saveQueue(queue);
                    this.processQueue();
                },
                async processQueue() {
                    const queue = this.getQueue().filter(e => e.status !== 'sent');
                    if (queue.length === 0) { this.updateSyncIndicator(); return; }
                    for (const entry of queue) {
                        if (entry.retries >= 5) { entry.status = 'failed'; continue; }
                        try {
                            await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(entry.data), headers: { 'Content-Type': 'application/json' },
                                    mode: 'no-cors' });
                            entry.status = 'sent';
                            entry.retries = 0;
                        } catch (e) { entry.retries++;
                            entry.lastError = e.message; }
                    }
                    this.saveQueue(queue.filter(e => e.status !== 'sent'));
                    this.updateSyncIndicator();
                },
                getStatus() { const q = this.getQueue(); return { pending: q.filter(e => e.status === 'pending').length,
                        failed: q.filter(e => e.status === 'failed').length, total: q.length }; },
                updateSyncIndicator() {
                    const s = this.getStatus();
                    const b = document.getElementById('syncBadge');
                    if (!b) return;
                    if (s.total === 0) b.innerHTML = '<span class="sync-dot"></span> Синхронизировано';
                    else if (s.failed > 0) b.innerHTML =
                        `<span class="sync-dot error"></span> Ошибок: ${s.failed} <button class="btn btn-sm btn-outline-danger ms-1" onclick="SyncManager.retryFailed()">⏎</button>`;
                    else b.innerHTML = `<span class="sync-dot"></span> В очереди: ${s.pending}`;
                },
                retryFailed() {
                    const queue = this.getQueue();
                    queue.forEach(e => { if (e.status === 'failed') { e.status = 'pending';
                            e.retries = 0; } });
                    this.saveQueue(queue);
                    this.processQueue();
                }
            };

            window.importData = function(input) {
                const file = input.files[0];

                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const imported = JSON.parse(e.target.result);
                        if (imported.syncQueue && Array.isArray(imported.syncQueue)) {
                            SyncManager.mergeData(imported.syncQueue);
                        }
                        if (imported.diary) DB.saveData('diary', imported.diary);
                        if (imported.palliative) DB.saveData('palliative', imported.palliative);
                        if (imported.medications) DB.saveMeds(imported.medications);
                        if (imported.nutrition) DB.saveData('nutrition', imported.nutrition);
                        if (imported.lab) DB.saveData('lab', imported.lab);
                        if (imported.timeline) DB.saveData('timeline', imported.timeline);
                        if (imported.allPatients) DB.saveAllPatients(imported.allPatients);
                        if (imported.doctorPatients) DB.saveDoctorPatients(imported.doctorPatients);
                        if (imported.versionCounter) { versionCounter = imported.versionCounter;
                            localStorage.setItem('versionCounter', String(versionCounter)); }
                        notify('Импорт завершён. Данные обновлены.', 'info');
                        render();
                    } catch (err) { notify('Ошибка при импорте файла. Проверьте формат JSON.', 'error'); }

                reader.readAsText(file);
                input.value = '';

                    if (f.type === 'range') return `<label>${f.label}</label><input type="range" name="${f.name}" class="form-range" min="${f.min||0}" max="${f.max||10}" value="${Math.floor(((f.min||0)+(f.max||10))/2)}">`;
                    else if (f.type === 'textarea') return `<textarea name="${f.name}" class="form-control" rows="2" placeholder="${f.placeholder||''}"></textarea>`;
                    else if (f.type === 'date') return `<input type="date" name="${f.name}" class="form-control" value="${new Date().toISOString().split('T')[0]}">`;
                    else return `<input type="${f.type}" name="${f.name}" class="form-control" placeholder="${f.placeholder||f.label}" ${f.step?'step="'+f.step+'"':''} ${f.min!==undefined?'min="'+f.min+'"':''} ${f.max!==undefined?'max="'+f.max+'"':''}>`;

            window.calculatePedsQL = function() {
                const all = [];
                for (let i = 1; i <= 8; i++) all.push(parseInt(document.getElementById('pedsql_a' + i)?.value) || 0);
                for (let i = 1; i <= 5; i++) all.push(parseInt(document.getElementById('pedsql_b' + i)?.value) || 0);
                for (let i = 1; i <= 5; i++) all.push(parseInt(document.getElementById('pedsql_c' + i)?.value) || 0);
                for (let i = 1; i <= 5; i++) all.push(parseInt(document.getElementById('pedsql_d' + i)?.value) || 0);
                const sum = all.reduce((a, b) => a + b, 0);
                const total = 100 - (sum / (all.length * 4) * 100);
                const cat = total >= 80 ? 'Хорошее КЖ' : total >= 60 ? 'Среднее КЖ' : 'Низкое КЖ';
                document.getElementById('pedsql-result').innerHTML =
                    `<div class="alert alert-info">Общий балл PedsQL: <strong>${total.toFixed(1)}</strong> – ${cat}</div>`;
                const data = { total, physical: (all.slice(0, 8).reduce((a, b) => a + b, 0) / 8) * 100 / 4,
                    emotional: (all.slice(8, 13).reduce((a, b) => a + b, 0) / 5) * 100 / 4, social: (all.slice(13, 18)
                        .reduce((a, b) => a + b, 0) / 5) * 100 / 4, school: (all.slice(18, 23).reduce((a, b) => a + b,
                        0) / 5) * 100 / 4, category: cat };
                localStorage.setItem('surveyData', JSON.stringify({ ...JSON.parse(localStorage.getItem('surveyData') || '{}'),
                    pedsql: data }));
                syncSurveyToCloud('pedsql', data);
                notify('📤 Данные PedsQL отправлены врачу', 'info');
            };

            function setupPallcalc() {
                window.switchPallcalcTab = function(tab) {
                    document.querySelectorAll('.pallcalc-tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.getElementById('tab-' + tab)?.classList.add('active');
                    document.querySelector(`[onclick="switchPallcalcTab('${tab}')"]`)?.classList.add('active');
                    if (tab === 'report') {
                        const content = document.getElementById('report-content');
                        if (content) content.textContent = PalliativeCalc.generateFullReport();
                    }
                    // Сброс при переключении
                    if (tab === 'clinical') {
                        const bmi = document.getElementById('bmi-result-container');
                        const vit = document.getElementById('vital-result-container');
                        const sec = document.getElementById('vital-signs-section');

                        if (vit) vit.innerHTML = '';

                        if (window._pallData) delete window._pallData.vitals;
                    }

                        const effRes = document.getElementById('efficiency-result');

                        const radar = document.getElementById('radar-container');
                        const gain = document.getElementById('gain-chart-container');
                        if (clustRes) clustRes.innerHTML = '';
                        if (radar) radar.innerHTML = '';
                        if (gain) gain.innerHTML = '';
                        if (window._pallData) delete window._pallData.clustering;
                    }
                };
            }

            // Объект PalliativeCalc с методами
            window.PalliativeCalc = {
                calculateBMI: function() {
                    const age = parseFloat(document.getElementById('calcAgeYears')?.value) || 10;
                    const gender = document.getElementById('calcGender')?.value || 'male';
                    const height = parseFloat(document.getElementById('calcHeightCm')?.value) || 140;
                    const weight = parseFloat(document.getElementById('calcWeightKg')?.value) || 35;
                    const container = document.getElementById('bmi-result-container');
                    if (!container) return;
                    if (isNaN(age) || isNaN(height) || isNaN(weight) || age < 2 || age > 18 || height < 40 || weight < 2) {
                        container.innerHTML =
                        '<div class="alert alert-warning">Заполните все поля корректно (возраст 2-18 лет, рост >40 см, вес >2 кг).</div>';
                        return;
                    }
                    const bmi = weight / Math.pow(height / 100, 2);
                    const ref = getBMIRef(gender, age);
                    const z = (bmi - ref.median) / ref.sd;
                    const pct = zScoreToPercentile(z);
                    const cat = getBMICategory(pct);
                    window._pallData = window._pallData || {};
                    window._pallData.bmi = { bmi, pct, z, cat, age, gender, height, weight };
                    container.innerHTML =
                        `<div class="alert alert-info">ИМТ: ${bmi.toFixed(1)} кг/м², перцентиль: ${pct.toFixed(1)}% (Z=${z.toFixed(2)}), категория: <strong>${cat}</strong></div>`;
                    document.getElementById('vital-signs-section').style.display = 'block';
                },

                assessVitalSigns: function() {
                    const age = parseFloat(document.getElementById('calcAgeYears')?.value) || 10;
                    const hr = parseFloat(document.getElementById('calcHR')?.value) || 0;
                    const rr = parseFloat(document.getElementById('calcRR')?.value) || 0;
                    const spo2 = parseFloat(document.getElementById('calcSpO2')?.value) || 0;
                    const sys = parseFloat(document.getElementById('calcSBP')?.value) || 0;
                    const dia = parseFloat(document.getElementById('calcDBP')?.value) || 0;
                    const container = document.getElementById('vital-result-container');
                    if (!container) return;
                    if (isNaN(age) || age < 2) {
                        container.innerHTML = '<div class="alert alert-warning">Сначала укажите возраст (≥2 лет).</div>';
                        return;
                    }
                    let html = '<div class="alert alert-secondary"><strong>Оценка жизненных показателей:</strong><br>';
                    if (hr > 0) { const ref = getHRRef(age);
                        html +=
                            `• ЧСС: ${hr} уд/мин (норма ~${ref.median}±${ref.sd.toFixed(0)}) → SDS = ${ref.sd?((hr-ref.median)/ref.sd).toFixed(2):'—'}<br>`;
                    }
                    if (rr > 0) { const ref = getRRRef(age);
                        html += `• ЧДД: ${rr} в мин (норма ${ref.min}–${ref.max})<br>`; }
                    if (sys > 0 && dia > 0) { const ref = getBPRef(age);
                        html +=
                            `• АД: ${sys}/${dia} мм рт.ст. (норма ~${ref.median_sys}/${ref.median_dia}) → SDS сист.=${ref.sd_sys?((sys-ref.median_sys)/ref.sd_sys).toFixed(2):'—'}, диаст.=${ref.sd_dia?((dia-ref.median_dia)/ref.sd_dia).toFixed(2):'—'}<br>`;
                    }
                    if (spo2 > 0) html += `• SpO₂: ${spo2}% (норма ≥94%; гипоксемия при <90%)<br>`;
                    html += '<small>Референсы: NHLBI 2011, ВОЗ. SDS > |2| – повод для дообследования.</small></div>';
                    container.innerHTML = html;
                    window._pallData = window._pallData || {};
                    window._pallData.vitals = { hr, rr, spo2, sys, dia };
                },

                calculateEfficiency: function() {
                    const patFields = ['effPatClinical', 'effPatPsycho', 'effPatQuality', 'effPatOrganizational',
                        'effPatAdditional'
                    ];
                    const docFields = ['effDocTimeliness', 'effDocDocumentation', 'effDocCoordination',
                        'effDocInteraction'
                    ];
                    const vals = {};
                    let valid = true;
                    [...patFields, ...docFields].forEach(id => {
                        const el = document.getElementById(id);
                        if (!el) { valid = false; return; }
                        const v = parseInt(el.value);
                        if (isNaN(v) || v < 1 || v > 5) { el.classList.add('invalid');
                            valid = false; } else { el.classList.remove('invalid');
                            vals[id] = v; }
                    });
                    if (!valid) { notify('Все поля должны быть целыми числами от 1 до 5.', 'error'); return; }
                    const pat = (vals.effPatClinical + vals.effPatPsycho + vals.effPatQuality + vals.effPatOrganizational +
                        vals.effPatAdditional) / 5;
                    const doc = (vals.effDocTimeliness + vals.effDocDocumentation + vals.effDocCoordination + vals
                        .effDocInteraction) / 4;
                    const total = ((pat + doc) / 2) * 20;
                    let level, color, interp;
                    if (total >= 85) { level = 'Высокая';
                        color = '#28a745';
                        interp = 'Отличная работа. Поддерживайте стандарты.'; } else if (total >= 70) { level = 'Хорошая';
                        color = '#ffc107';
                        interp = 'Есть потенциал улучшения.'; } else if (total >= 55) { level = 'Удовлетворительная';
                        color = '#fd7e14';
                        interp = 'Требуется корректировка процессов.'; } else { level = 'Требует улучшения';
                        color = '#dc3545';
                        interp = 'Критично – аудит и обучение персонала.'; }
                    window._pallData = window._pallData || {};
                    window._pallData.efficiency = { total, level, pat, doc, vals, color, interp };
                    document.getElementById('efficiency-result').innerHTML =
                        `<div style="border-left:5px solid ${color};padding-left:1rem;"><h5 style="color:${color}">Интегральная эффективность: ${total.toFixed(1)}% (${level})</h5><p>${interp}</p><div class="row"><div class="col-md-4"><strong>Пациенты:</strong> ${pat.toFixed(1)}/5</div><div class="col-md-4"><strong>Врачи:</strong> ${doc.toFixed(1)}/5</div><div class="col-md-4"><strong>Общая:</strong> ${total.toFixed(1)}%</div></div></div>`;
                    this.drawEfficiencyCharts(pat, doc, vals, color);
                },

                drawEfficiencyCharts: function(pat, doc, vals, color) {
                    const container = document.getElementById('efficiency-chart');
                    if (!container) return;
                    if (typeof Chart === 'undefined') { container.innerHTML =
                            '<p class="text-danger">Chart.js не загружен.</p>'; return; }
                    container.innerHTML =
                        `<div class="chart-wrapper"><h6>Профиль компонентов (1–5)</h6><canvas id="effBar"></canvas></div><div class="chart-wrapper"><h6>Вклад пациентов и врачей</h6><canvas id="effPie"></canvas></div>`;
                    new Chart(document.getElementById('effBar').getContext('2d'), {
                        type: 'bar',
                        data: {
                            labels: ['Клин.', 'Психо', 'КЖ', 'Орг.', 'Доп.', 'Своевр.', 'Докум.', 'Согл.', 'Взаим.'],
                            datasets: [{ data: [vals.effPatClinical, vals.effPatPsycho, vals.effPatQuality,
                                    vals.effPatOrganizational, vals.effPatAdditional, vals
                                    .effDocTimeliness, vals.effDocDocumentation, vals
                                    .effDocCoordination, vals.effDocInteraction
                                ], backgroundColor: ['#007bff', '#6f42c1', '#17a2b8', '#ffc107', '#fd7e14',
                                    '#28a745', '#20c997', '#e83e8c', '#6c757d'
                                ] }]
                        },
                        options: { responsive: true, scales: { y: { min: 1, max: 5, ticks: { stepSize: 1 } } },
                            plugins: { legend: { display: false } } }
                    });
                    new Chart(document.getElementById('effPie').getContext('2d'), {
                        type: 'doughnut',
                        data: { labels: ['Пациенты', 'Врачи'], datasets: [{ data: [pat * 20, doc * 20],
                                backgroundColor: ['#007bff', '#28a745'] }] },
                        options: { responsive: true }
                    });
                },

                clusterPatient: function() {
                    const vals = {
                        pain: parseFloat(document.getElementById('clustPain')?.value) || 0,
                        nutrition: parseFloat(document.getElementById('clustNutrition')?.value) || 0,
                        phys_func: parseFloat(document.getElementById('clustPhysFunc')?.value) || 0,
                        emo_func: parseFloat(document.getElementById('clustEmoFunc')?.value) || 0,
                        soc_func: parseFloat(document.getElementById('clustSocFunc')?.value) || 0,
                        role_func: parseFloat(document.getElementById('clustRoleFunc')?.value) || 0
                    };
                    let best = null,
                        minDist = Infinity;
                    for (const [name, cfg] of Object.entries(profiles)) {
                        const c = cfg.center;
                        const dist = Math.hypot(vals.pain - c.боль, vals.nutrition - c.нутр, vals.phys_func - c.физ,
                            vals.emo_func - c.эмо, vals.soc_func - c.соц, vals.role_func - c.рол);
                        if (dist < minDist) { minDist = dist;
                            best = name; }
                    }
                    const p = profiles[best];
                    const deltaQoL = 4.87 - 0.41 * vals.nutrition - 0.52 * vals.pain - 0.09 * vals.phys_func;
                    const orMapping = { "Болевой": 6.1, "Нутритивный": 3.5, "Двигательный": 1.4,
                        "Относительно компенсированный": 1.0, "Социально-депривированный": 2.8 };
                    const orVal = orMapping[best] || 1.0;
                    window._pallData = window._pallData || {};
                    window._pallData.clustering = { best, deltaQoL, orVal, recs: p.recs, desc: p.desc, center: p
                        .center };
                    document.getElementById('clustering-result').innerHTML =
                        `<div class="alert alert-primary"><h5>Профиль: «${best}»</h5><p>${p.desc}</p><p><strong>Рекомендации:</strong> ${p.recs}</p><p><strong>Прогнозируемый прирост КЖ (Δ):</strong> ${deltaQoL.toFixed(2)} балла</p><p><strong>OR выраженного улучшения:</strong> ${orVal} (p<0.05)</p></div>`;
                    this.drawClusterCharts(vals, p.center, best, deltaQoL, orVal);
                },

                drawClusterCharts: function(patient, center, profileName, deltaQoL, orVal) {
                    if (typeof Chart === 'undefined') return;
                    const radarDiv = document.getElementById('radar-container');
                    const gainDiv = document.getElementById('gain-chart-container');
                    if (radarDiv) radarDiv.innerHTML = '<h6>Радар</h6><canvas id="radarChart"></canvas>';
                    if (gainDiv) gainDiv.innerHTML = '<h6>Прогноз</h6><canvas id="gainChart"></canvas>';
                    const rctx = document.getElementById('radarChart')?.getContext('2d');
                    if (rctx) new Chart(rctx, {
                        type: 'radar',
                        data: {
                            labels: ['Боль', 'Нутр.риск', 'Физ.', 'Эмоц.', 'Соц.', 'Рол.'],
                            datasets: [
                                { label: 'Пациент', data: [patient.pain, patient.nutrition, patient
                                        .phys_func, patient.emo_func, patient.soc_func,
                                        patient.role_func
                                    ], borderColor: '#dc3545' },
                                { label: 'Центроид «' + profileName + '»', data: [center.боль, center
                                        .нутр, center.физ, center.эмо, center.соц, center.рол
                                    ], borderColor: '#007bff', borderDash: [5, 5] }
                            ]
                        },
                        options: { responsive: true, scales: { r: { min: 0, max: 100 } } }
                    });
                    const gctx = document.getElementById('gainChart')?.getContext('2d');
                    if (gctx) new Chart(gctx, {
                        type: 'bar',
                        data: { labels: ['Δ КЖ (баллы)', 'OR улучшения'], datasets: [{ data: [
                                    deltaQoL.toFixed(2), orVal
                                ], backgroundColor: ['#17a2b8', '#ffc107'] }] },
                        options: { responsive: true, scales: { y: { beginAtZero: true } } }
                    });
                },

                generateFullReport: function() {
                    const data = window._pallData || {};
                    let r = 'СВОДНЫЙ ОТЧЁТ ПО ПАЛЛИАТИВНОМУ ПАЦИЕНТУ\nДиссертация Истин А.А., ВГМУ, 2026\n========================================\n';
                    r += 'Дата: ' + new Date().toLocaleString() + '\n\n';
                    if (data.bmi) {
                        r += '▶ АНТРОПОМЕТРИЯ:\n  ИМТ: ' + data.bmi.bmi.toFixed(1) + ' кг/м² (' + data.bmi.pct.toFixed(
                            1) + '%, Z=' + data.bmi.z.toFixed(2) + ')\n  Категория: ' + data.bmi.cat + '\n\n';
                    }
                    if (data.vitals) {
                        r += '▶ ВИТАЛЬНЫЕ ПОКАЗАТЕЛИ:\n';
                        if (data.vitals.hr) r += '  ЧСС: ' + data.vitals.hr + ' уд/мин\n';
                        if (data.vitals.rr) r += '  ЧДД: ' + data.vitals.rr + ' в мин\n';
                        if (data.vitals.sys) r += '  АД: ' + data.vitals.sys + '/' + data.vitals.dia +
                            ' мм рт.ст.\n';
                        if (data.vitals.spo2) r += '  SpO₂: ' + data.vitals.spo2 + '%\n';
                        r += '\n';
                    }
                    if (data.efficiency) {
                        r += '▶ ЭФФЕКТИВНОСТЬ:\n  Интегральная: ' + data.efficiency.total.toFixed(1) + '% (' + data
                            .efficiency.level + ')\n  Оценка пациентов: ' + data.efficiency.pat.toFixed(1) +
                            '/5\n  Оценка врачей: ' + data.efficiency.doc.toFixed(1) + '/5\n  Интерпретация: ' +
                            data.efficiency.interp + '\n\n';
                    }
                    if (data.clustering) {
                        r += '▶ КЛАСТЕРНЫЙ ПРОФИЛЬ:\n  Профиль: ' + data.clustering.best + '\n  ' + data.clustering
                            .desc + '\n  Рекомендации: ' + data.clustering.recs + '\n  Δ КЖ: ' + data.clustering
                            .deltaQoL.toFixed(2) + ' балла\n  OR: ' + data.clustering.orVal + '\n\n';
                    }
                    r += '========================================\nОтчёт сгенерирован автоматически.\n';
                    return r;
                },

                copyReport: function() {
                    const report = this.generateFullReport();
                    navigator.clipboard.writeText(report).then(() => notify('Отчёт скопирован', 'info')).catch(() => {
                        const ta = document.createElement('textarea');
                        ta.value = report;
                        document.body.appendChild(ta);
                        ta.select();

                        ta.remove();
                        notify('Отчёт скопирован', 'info');
                    });
                },

                loadFromSurveys: function(target) {
                    const local = JSON.parse(localStorage.getItem('surveyData') || '{}');
                    if (local.pedsql) {
                        const p = local.pedsql;
                        if (target === 'efficiency') {
                            const qualityEl = document.getElementById('effPatQuality');
                            const psychoEl = document.getElementById('effPatPsycho');
                            const clinicalEl = document.getElementById('effPatClinical');
                            if (qualityEl) qualityEl.value = Math.round(1 + (p.total / 100) * 4);
                            if (psychoEl) psychoEl.value = Math.round(1 + ((p.emotional || 0) / 100) * 4);
                            const clinical = ((p.physical || 0) + (p.emotional || 0) + (p.social || 0) + (p
                            .school || 0)) / 4;
                            if (clinicalEl) clinicalEl.value = Math.round(1 + (clinical / 100) * 4);
                            notify('Данные PedsQL загружены в поля эффективности.', 'info');
                        } else if (target === 'clustering') {
                            const physEl = document.getElementById('clustPhysFunc');
                            const emoEl = document.getElementById('clustEmoFunc');
                            const socEl = document.getElementById('clustSocFunc');
                            const roleEl = document.getElementById('clustRoleFunc');
                            if (physEl) physEl.value = Math.round(p.physical || 0);
                            if (emoEl) emoEl.value = Math.round(p.emotional || 0);
                            if (socEl) socEl.value = Math.round(p.social || 0);
                            if (roleEl) roleEl.value = Math.round(p.school || 0);

                    } else {
                        notify('Сначала заполните анкету PedsQL.', 'error');

                    if (local.papascale && target === 'clustering') {

                        }

                }
            };

            // =====================================================================
            // 12. ДЕРЕВО РЕШЕНИЙ
            // =====================================================================
            const symptomWeights = {
                'кашель': 2,
                'одышка': 3,
                'боль': 3,
                'лихорадка': 2,
                'тошнота': 1,
                'рвота': 2,
                'диарея': 1,
                'судороги': 3,
                'атаксия': 3,
                'слабость': 2,
                'сыпь': 2,
                'ихтиоз': 3,
                'пигментация': 1,
                'гепатомегалия': 3,
                'спленомегалия': 3,
                'задержка развития': 3,
                'регресс': 3,
                'мышечная атрофия': 3,
                'пороки развития': 2,
                'кардиальные проявления': 3
            };
            let decisionState = { step: 0, answers: {} };
            const decisionSteps = [
                { question: 'Пол пациента:', type: 'single', options: ['Мужской', 'Женский'], key: 'gender' },
                { question: 'Возраст (лет):', type: 'number', key: 'age', min: 0, max: 120 },
                { question: 'Лихорадка (>38°C)?', type: 'single', options: ['Да', 'Нет'], key: 'fever' },
                { question: 'Кашель или одышка?', type: 'single', options: ['Нет', 'Кашель', 'Одышка', 'И то, и другое'],
                    key: 'respiratory' },
                { question: 'Наличие болей?', type: 'single', options: ['Нет', 'Лёгкие', 'Умеренные', 'Сильные'],
                    key: 'pain' },
                { question: 'Желудочно-кишечные нарушения?', type: 'multi', options: ['Тошнота', 'Рвота', 'Диарея'],
                    key: 'gi' },
                { question: 'Неврологические симптомы?', type: 'multi', options: ['Судороги', 'Атаксия',
                        'Мышечная слабость'
                    ], key: 'neuro' },
                { question: 'Кожные проявления?', type: 'multi', options: ['Сыпь', 'Ихтиоз', 'Нарушение пигментации'],
                    key: 'skin' },
                { question: 'Увеличение печени/селезёнки?', type: 'single', options: ['Нет', 'Гепатомегалия',
                        'Спленомегалия', 'И то, и другое'
                    ], key: 'hepatosplenomegaly' },
                { question: 'Задержка развития или регресс?', type: 'single', options: ['Нет', 'Задержка развития',
                        'Регресс'
                    ], key: 'development' },
                { question: 'Мышечная атрофия/слабость?', type: 'single', options: ['Нет', 'Да'], key: 'muscle' },
                { question: 'Пороки развития?', type: 'single', options: ['Нет', 'Да'], key: 'malformations' },
                { question: 'Кардиальные проявления?', type: 'single', options: ['Нет', 'Да'], key: 'cardiac' }
            ];

            function renderDecisionTree() {
                return `<h2>🌳 Дерево решений</h2><p class="text-muted small">Ответьте на вопросы для получения вероятных диагнозов</p><div class="card"><div class="card-body" id="decisionContainer"><div id="decisionQuestion" class="decision-question"></div><div id="decisionOptions" class="mt-3 d-flex flex-wrap"></div><div id="decisionResult" class="mt-4"></div><button class="btn btn-secondary mt-3" onclick="resetDecisionTree()">🔄 Начать заново</button></div></div>`;
            }

            function resetDecisionTree() { decisionState = { step: 0, answers: {} };
                showDecisionStep(); }

            function showDecisionStep() {
                const step = decisionState.step;
                if (step >= decisionSteps.length) { computeDecisionResult(); return; }
                const s = decisionSteps[step];
                document.getElementById('decisionQuestion').textContent = s.question;
                const optDiv = document.getElementById('decisionOptions');
                document.getElementById('decisionResult').innerHTML = '';
                let html = '';
                if (s.type === 'single') s.options.forEach(opt => { html +=
                        `<div class="decision-option" onclick="selectDecisionOption('${s.key}','${opt}')">${opt}</div>`; });
                else if (s.type === 'number') { html +=
                        `<input type="number" id="decisionNumberInput" class="form-control" min="${s.min||0}" max="${s.max||120}"><button class="btn btn-primary mt-2" onclick="submitDecisionNumber('${s.key}')">Подтвердить</button>`; } else if (s
                    .type === 'multi') {
                    s.options.forEach(opt => {
                        const checked = (decisionState.answers[s.key] && decisionState.answers[s.key].includes(
                        opt)) ? 'checked' : '';
                        html +=
                            `<div class="form-check"><input class="form-check-input" type="checkbox" id="dec_${s.key}_${opt}" value="${opt}" ${checked} onchange="toggleDecisionOption('${s.key}','${opt}')"><label class="form-check-label" for="dec_${s.key}_${opt}">${opt}</label></div>`;
                    });
                    html += `<button class="btn btn-primary mt-2" onclick="nextDecisionStep()">Далее</button>`;
                }
                optDiv.innerHTML = html;
            }

            window.selectDecisionOption = function(key, value) { decisionState.answers[key] = value;
                nextDecisionStep(); };
            window.submitDecisionNumber = function(key) { const val = document.getElementById('decisionNumberInput')
                    .value; if (val === '') return;
                decisionState.answers[key] = parseFloat(val);
                nextDecisionStep(); };
            window.toggleDecisionOption = function(key, value) { if (!decisionState.answers[key]) decisionState
                    .answers[key] = [];
                const idx = decisionState.answers[key].indexOf(value); if (idx > -1) decisionState.answers[key].splice(
                    idx, 1);
                else decisionState.answers[key].push(value); };
            window.nextDecisionStep = function() { decisionState.step++;
                showDecisionStep(); };

            function computeDecisionResult() {
                const answers = decisionState.answers;
                const diseases = getDiseaseList();
                const userSymptoms = [];
                if (answers.fever === 'Да') userSymptoms.push('лихорадка');
                if (answers.respiratory === 'Кашель') userSymptoms.push('кашель');
                if (answers.respiratory === 'Одышка' || answers.respiratory === 'И то, и другое') userSymptoms.push(
                'одышка');
                if (answers.pain !== 'Нет') userSymptoms.push('боль');
                if (answers.gi) userSymptoms.push(...answers.gi.map(s => s.toLowerCase()));
                if (answers.neuro) userSymptoms.push(...answers.neuro.map(s => s.toLowerCase()));
                if (answers.skin) userSymptoms.push(...answers.skin.map(s => s.toLowerCase()));
                if (answers.hepatosplenomegaly === 'Гепатомегалия' || answers.hepatosplenomegaly === 'И то, и другое')
                    userSymptoms.push('гепатомегалия');
                if (answers.hepatosplenomegaly === 'Спленомегалия' || answers.hepatosplenomegaly === 'И то, и другое')
                    userSymptoms.push('спленомегалия');
                if (answers.development === 'Задержка развития') userSymptoms.push('задержка развития');
                if (answers.development === 'Регресс') userSymptoms.push('регресс');
                if (answers.muscle === 'Да') userSymptoms.push('мышечная слабость', 'мышечная атрофия');
                if (answers.malformations === 'Да') userSymptoms.push('пороки развития');
                if (answers.cardiac === 'Да') userSymptoms.push('кардиальные проявления');

                const scored = diseases.map(d => {
                    const ds = (d.symptoms || []).map(s => s.toLowerCase());
                    let tw = 0,
                        mw = 0;
                    userSymptoms.forEach(us => {
                        let found = false;
                        for (let s of ds) {
                            if (s.includes(us) || us.includes(s)) {
                                const w = symptomWeights[us] || 1;
                                tw += w;
                                mw += w;
                                found = true;
                                break;
                            }
                        }
                        if (!found) tw += (symptomWeights[us] || 1);
                    });
                    if (tw === 0) return { disease: d, score: 0, matchPercent: 0 };
                    return { disease: d, score: mw, matchPercent: Math.round((mw / tw) * 100) };
                });
                scored.sort((a, b) => b.score - a.score);
                const top = scored.filter(s => s.score > 0).slice(0, 5);
                const resDiv = document.getElementById('decisionResult');
                if (top.length === 0) { resDiv.innerHTML =
                        '<div class="alert alert-warning">Не удалось сопоставить. Попробуйте уточнить симптомы.</div>'; return; }
                let html = '<h5>🎯 Топ-5 вероятных диагнозов:</h5><div class="list-group">';
                top.forEach(item => {
                    const d = item.disease;
                    html +=
                        `<div class="list-group-item"><div class="d-flex w-100 justify-content-between"><h6>${d.icon} ${d.name}</h6><span class="badge bg-primary">${item.matchPercent}%</span></div><p class="mb-1 small">${d.desc}</p><small><strong>Ген:</strong> ${d.gene||'—'} | <strong>Лечение:</strong> ${d.treat}</small></div>`;
                });
                html += '</div>';
                resDiv.innerHTML = html;
            }

            // =====================================================================
            // 13. ПРОГНОЗ РИСКА
            // =====================================================================
            const RiskPredictor = {
                rules: {
                    'Муковисцидоз': [
                        { param: 'temperature', condition: (v) => parseFloat(v) > 37.5, score: 2 },
                        { param: 'pain', condition: (v) => parseInt(v) >= 5, score: 1 },
                        { param: 'dyspnea', condition: (v) => parseInt(v) >= 5, score: 3 },
                        { param: 'fatigue', condition: (v) => parseInt(v) >= 7, score: 2 },
                        { param: 'symptoms', condition: (v) => /кашель|одышка|кашель/i.test(v || ""), score: 4 }
                    ],
                    'Фенилкетонурия': [
                        { param: 'temperature', condition: (v) => parseFloat(v) > 37.0, score: 1 },
                        { param: 'wellbeing', condition: (v) => parseInt(v) <= 3, score: 3 },
                        { param: 'symptoms', condition: (v) => /головная боль|тошнота|рвота/i.test(v || ""), score: 4 }
                    ],
                    'default': [
                        { param: 'temperature', condition: (v) => parseFloat(v) >= 38, score: 5 },
                        { param: 'pain', condition: (v) => parseInt(v) >= 8, score: 5 },
                        { param: 'pressure', condition: (v) => { if (!v) return false;
                                const parts = v.split('/');
                                if (parts.length !== 2) return false;
                                const sys = parseFloat(parts[0]),
                                    dia = parseFloat(parts[1]);
                                return (sys > 180 || dia > 120 || sys < 80 || dia < 50); }, score: 5 }
                    ]
                },
                predict: function(data, diagnosis = "", history = []) {
                    let totalScore = 0;
                    const rules = this.rules[diagnosis] || this.rules.default;
                    rules.forEach(rule => {
                        const value = data[rule.param];
                        if (value !== undefined && rule.condition(value)) totalScore += rule.score;
                    });
                    if (history.length >= 3) {
                        const temps = history.map(e => parseFloat(e.temperature)).filter(v => !isNaN(v));
                        if (temps.length >= 3) {
                            const last3 = temps.slice(-3);
                            if (last3[2] > last3[1] && last3[1] > last3[0]) totalScore += 3;
                        }
                    }
                    return Math.round(Math.min(100, (totalScore / 20) * 100));
                },
                getPriority: function(data, diagnosis = "") {
                    const risk = this.predict(data, diagnosis);
                    if (risk >= 80) return 3;
                    if (risk >= 50) return 2;
                    return 1;
                }
            };

            function renderPrognosis() {
                return `<h2>📈 Прогноз риска госпитализации</h2><div class="card"><div class="card-body"><div class="row g-3"><div class="col-md-4"><label>Возраст</label><input type="number" id="progAge" class="form-control" value="10"></div><div class="col-md-4"><label>ИМТ</label><input type="number" id="progBMI" class="form-control" step="0.1" value="18.5"></div><div class="col-md-4"><label>ЧСС</label><input type="number" id="progHR" class="form-control" value="90"></div><div class="col-md-4"><label>ЧДД</label><input type="number" id="progRR" class="form-control" value="22"></div><div class="col-md-4"><label>SpO₂</label><input type="number" id="progSpO2" class="form-control" value="95"></div><div class="col-md-4"><label>АД сист.</label><input type="number" id="progSBP" class="form-control" value="110"></div><div class="col-md-4"><label>АД диаст.</label><input type="number" id="progDBP" class="form-control" value="70"></div><div class="col-md-4"><label>Боль (0-10)</label><input type="number" id="progPain" class="form-control" min="0" max="10" value="5"></div><div class="col-md-4"><label>КЖ (0-10)</label><input type="number" id="progQoL" class="form-control" min="0" max="10" value="4"></div><div class="col-md-4"><label>Тренд t°</label><select id="progTempTrend" class="form-select"><option value="stable">Стабильна</option><option value="rising">Растёт</option><option value="falling">Падает</option></select></div><div class="col-md-4"><label>Госпитализаций</label><input type="number" id="progHospitalizations" class="form-control" min="0" value="1"></div></div><button class="btn btn-primary mt-3" onclick="calculatePrognosis()">Рассчитать</button><div id="prognosisResult" class="mt-4"></div></div></div>`;
            }

            function calculateRiskScore(data) {
                let s = 0;
                const a = parseFloat(data.age) || 0,
                    b = parseFloat(data.bmi) || 0,
                    h = parseFloat(data.hr) || 0,
                    r = parseFloat(data.rr) || 0,
                    o = parseFloat(data.spo2) || 0,
                    sb = parseFloat(data.sbp) || 0,
                    db = parseFloat(data.dbp) || 0,
                    p = parseFloat(data.pain) || 0,
                    q = parseFloat(data.qol) || 0,
                    tt = data.tempTrend || 'stable',
                    ho = parseFloat(data.hospitalizations) || 0;
                if (a < 2) s += 0.8;
                else if (a > 65) s += 0.6;
                if (b < 16) s += 0.7;
                else if (b < 18.5) s += 0.3;
                else if (b > 30) s += 0.5;
                else if (b > 25) s += 0.2;
                if (h > 120) s += 0.7;
                else if (h > 100) s += 0.3;
                else if (h < 50) s += 0.6;
                if (r > 30) s += 0.6;
                else if (r > 24) s += 0.3;
                if (o < 88) s += 1.0;
                else if (o < 92) s += 0.6;
                else if (o < 95) s += 0.2;
                if (sb < 90 || db < 50) s += 0.8;
                else if (sb > 180 || db > 120) s += 0.6;
                else if (sb > 140) s += 0.2;
                if (p > 8) s += 0.8;
                else if (p > 6) s += 0.4;
                else if (p > 4) s += 0.2;
                if (q < 3) s += 0.9;
                else if (q < 5) s += 0.4;
                else if (q < 7) s += 0.2;
                if (tt === 'rising') s += 0.5;
                else if (tt === 'falling') s += 0.2;
                if (ho >= 3) s += 0.8;
                else if (ho >= 2) s += 0.4;
                else if (ho >= 1) s += 0.2;
                return s;
            }

            function predictRisk(s) {
                const l = -2.0 + s * 2.2;
                let p = 100 / (1 + Math.exp(-l));
                p = Math.min(95, Math.max(5, Math.round(p)));
                return p;
            }

            function getRiskLevel(p) {
                if (p >= 70) return { level: 'Высокий', cls: 'clinical-risk-high',
                    rec: '🚨 Немедленная госпитализация.' };
                if (p >= 40) return { level: 'Средний', cls: 'clinical-risk-medium', rec: '⚠️ Усилить контроль.' };
                return { level: 'Низкий', cls: 'clinical-risk-low', rec: '✅ Плановое наблюдение.' };
            }

            window.calculatePrognosis = function() {
                const data = {
                    age: document.getElementById('progAge').value,
                    bmi: document.getElementById('progBMI').value,
                    hr: document.getElementById('progHR').value,
                    rr: document.getElementById('progRR').value,
                    spo2: document.getElementById('progSpO2').value,
                    sbp: document.getElementById('progSBP').value,
                    dbp: document.getElementById('progDBP').value,
                    pain: document.getElementById('progPain').value,
                    qol: document.getElementById('progQoL').value,
                    tempTrend: document.getElementById('progTempTrend').value,
                    hospitalizations: document.getElementById('progHospitalizations').value
                };
                const s = calculateRiskScore(data);
                const p = predictRisk(s);
                const rl = getRiskLevel(p);
                document.getElementById('prognosisResult').innerHTML =
                    `<div class="alert" style="border-left:6px solid ${p>=70?'#d32f2f':p>=40?'#f57c00':'#2e7d32'};background:#f8f9fa;"><h5>Вероятность госпитализации: <strong style="color:${p>=70?'#d32f2f':p>=40?'#f57c00':'#2e7d32'};">${p}%</strong></h5><p><span class="clinical-risk-badge ${rl.cls}">${rl.level}</span></p><p>${rl.rec}</p></div>`;
            };

            // =====================================================================
            // 14. ПОИСК СИМПТОМОВ
            // =====================================================================
            function renderSymptomSearch() {
                return `<h2>🔍 Поиск симптомов</h2><div class="card"><div class="card-body"><input type="text" id="symptomInput" class="form-control" placeholder="Введите симптом..." oninput="filterBySymptom()"><div id="symptomResults" class="mt-3"></div></div></div>`;
            }

            window.filterBySymptom = function() {
                const q = document.getElementById('symptomInput')?.value.trim().toLowerCase() || '';
                const container = document.getElementById('symptomResults');
                if (!container) return;
                if (!q) { container.innerHTML = ''; return; }
                const matches = getDiseaseList().filter(d => (d.name + ' ' + d.desc + ' ' + (d.symptoms || []).join(' '))
                    .toLowerCase().includes(q));

                        '<div class="alert alert-warning">Ничего не найдено.</div>'; return; }
                container.innerHTML =
                    `<div class="alert alert-info">Найдено ${matches.length}:</div>` + matches.map(d =>
                        `<div class="card mb-2" onclick="this.querySelector('.disease-details').style.display='block'"><div class="card-body"><h6>${d.icon} ${d.name}</h6><p class="small">${d.desc}</p><div class="disease-details" style="display:none;"><p>${d.diag}</p><p>${d.treat}</p></div></div></div>`
                        ).join('');
            };

            // =====================================================================
            // 15. СПРАВОЧНИК
            // =====================================================================
            function renderReference() {
                const diseases = getDiseaseList();
                return `<h2>📚 Справочник (${diseases.length})</h2><input id="searchDisease" class="form-control mb-3" placeholder="🔍 Поиск..." oninput="filterDiseases()"><select id="categoryFilter" class="form-control mb-2" onchange="filterDiseases()"><option value="">Все категории</option>${[...new Set(diseases.map(d=>d.cat))].map(c=>`<option value="${c}">${c}</option>`).join('')}</select><div class="row" id="diseaseList">${diseases.map(d=>`<div class="col-md-4 mb-3" data-id="${d.id}" data-category="${d.cat}"><div class="card disease-card" style="cursor:pointer;" onclick="this.classList.toggle('active')"><div class="card-body"><div style="font-size:2rem;">${d.icon}</div><h6>${esc(d.name)}</h6><span class="badge bg-primary">${d.icd}</span><span class="badge bg-secondary">${d.cat}</span><p class="mt-2 small">${d.desc}</p><div class="disease-details mt-2"><p><strong>🔬 Диагностика:</strong> ${d.diag}</p><p><strong>💊 Лечение:</strong> ${d.treat}</p><p><strong>🧬 Ген:</strong> ${d.gene||'—'}<br><strong>Мутации:</strong> ${d.mutations||'—'}</p></div><small class="text-primary">Нажмите для деталей</small></div></div></div>`).join('')}</div>`;
            }

            window.filterDiseases = function() {
                const q = document.getElementById('searchDisease')?.value.toLowerCase() || '';
                const cat = document.getElementById('categoryFilter')?.value || '';
                document.querySelectorAll('#diseaseList .col-md-4').forEach(card => {
                    card.style.display = (q && !card.textContent.toLowerCase().includes(q)) || (cat && card.dataset
                        .category !== cat) ? 'none' : '';
                });
            };

            // =====================================================================
            // 16. ГЕНЕТИКА
            // =====================================================================
            function renderGenetics() {
                const diseases = getDiseaseList().filter(d => d.gene && d.gene !== '—');
                const cards = diseases.map(d =>
                    `<div class="gene-card"><strong>${d.icon} ${d.name}</strong> (${d.icd})<div><span class="badge bg-primary">Ген:${d.gene}</span> <span class="badge bg-secondary">Мутации:${d.mutations}</span></div><div class="small">${d.desc}</div><div><strong>Диагностика:</strong> ${d.diag}</div><div><strong>Лечение:</strong> ${d.treat}</div></div>`
                    ).join('');

            }

            window.calcGeneticRisk = function() {
                const t = document.getElementById('inheritType')?.value,
                    f = document.getElementById('fatherStatus')?.value,
                    m = document.getElementById('motherStatus')?.value;
                let r = 0;
                if (t === 'autosomal_recessive') { if (f === 'carrier' && m === 'carrier') r = 25;
                    else if ((f === 'sick' && m === 'carrier') || (f === 'carrier' && m === 'sick')) r = 50;
                    else if (f === 'sick' && m === 'sick') r = 100; } else if (t === 'autosomal_dominant') { if (f ===
                        'sick' || m === 'sick') r = 50; } else if (t === 'x_linked') { if (m === 'carrier') r = 25; if (
                        m === 'sick') r = 100; if (f === 'sick' && m === 'carrier') r = 50; }
                document.getElementById('geneticRiskResult').innerHTML = `Вероятность: <strong>${r}%</strong>`;
            };

            // =====================================================================
            // 21. ЭКСПОРТ СТАТИСТИЧЕСКИХ ДАННЫХ
            // =====================================================================
            window.exportStatisticalSyntax = function() {
                const diary = DB.getData('diary'),
                    palliative = DB.getData('palliative');
                let rows = [];
                const allDates = new Set([...diary.map(e => e.date), ...palliative.map(e => e.date)]);
                const headers = ['date', 'temperature', 'weight', 'wellbeing', 'pain', 'quality', 'dyspnea', 'fatigue'];
                allDates.forEach(date => {
                    const d = diary.find(e => e.date === date) || {},
                        p = palliative.find(e => e.date === date) || {};
                    rows.push({ date, temperature: d.temperature || '', weight: d.weight || '',
                        wellbeing: d.wellbeing || '', pain: p.pain || '', quality: p.quality || '',
                        dyspnea: p.dyspnea || '', fatigue: p.fatigue || '' });
                });
                let csv = headers.join(',') + '\n';
                rows.forEach(r => { csv += headers.map(h => r[h] || '').join(',') + '\n'; });
                const rSyntax =
                    '# Импорт данных\n' +
                    'data <- read.csv("data.csv", stringsAsFactors = FALSE)\n' +
                    'data$date <- as.Date(data$date)\n' +
                    'summary(data)\n' +
                    'cor(data[, sapply(data, is.numeric)], use = "complete.obs")\n' +
                    'plot(data$date, data$temperature, type="l", xlab="Дата", ylab="Температура")\n';
                const spssSyntax =
                    '* Импорт данных.\n' +
                    'GET DATA /TYPE=TXT\n' +
                    ' /FILE="data.csv"\n' +
                    ' /DELCASE=LINE\n' +
                    ' /DELIMITERS=","\n' +
                    ' /ARRANGEMENT=DELIMITED\n' +
                    ' /FIRSTCASE=2\n' +
                    ' /VARIABLES=date A10 temperature F8.2 weight F8.2 wellbeing F8.0 pain F8.0 quality F8.0 dyspnea F8.0 fatigue F8.0.\n' +
                    'CACHE.\nEXECUTE.\n' +
                    'DESCRIPTIVES VARIABLES=temperature weight wellbeing pain quality dyspnea fatigue\n' +
                    ' /STATISTICS=MEAN STDDEV MIN MAX.\n' +
                    'CORRELATIONS /VARIABLES=temperature weight wellbeing pain quality dyspnea fatigue.\n';
                const download = (c, n, m) => { const b = new Blob([c], { type: m }),
                        u = URL.createObjectURL(b),
                        a = document.createElement('a');
                    a.href = u;
                    a.download = n;
                    a.click();
                    URL.revokeObjectURL(u); };
                download(csv, 'data.csv', 'text/csv');
                download(rSyntax, 'analysis.R', 'text/plain');
                download(spssSyntax, 'analysis.sps', 'text/plain');
                notify('Экспорт выполнен', 'info');
            };
