<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Орфанный помощник</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.1/dist/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* === ВСЕ СТИЛИ ИЗ ОРИГИНАЛА (без изменений) === */
        :root {
            --primary: #0d7377; --primary-light: #14a3a8; --primary-dark: #0a5c5f;
            --accent: #f59e0b; --danger: #ef4444; --success: #10b981;
            --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --text-light: #64748b;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow: 0 4px 6px rgba(0,0,0,0.04), 0 2px 4px rgba(0,0,0,0.02);
            --shadow-lg: 0 20px 40px rgba(0,0,0,0.08);
            --shadow-xl: 0 25px 50px rgba(0,0,0,0.12);
            --radius: 20px; --radius-sm: 14px; --radius-xs: 10px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #f0fdf4 30%, #fefce8 60%, #fdf2f8 100%);
            background-attachment: fixed;
            min-height: 100vh; color: var(--text); line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        .navbar {
            background: rgba(255,255,255,0.8); backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border-bottom: 1px solid rgba(0,0,0,0.05); padding: 12px 0;
        }
        .navbar-brand {
            font-weight: 800; font-size: 1.35rem; letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--primary), #0ea5e9);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            display: flex; align-items: center; gap: 8px;
        }
        .navbar-brand .brand-icon {
            width: 38px; height: 38px; background: linear-gradient(135deg, var(--primary), #0ea5e9);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; color: white; -webkit-text-fill-color: white;
            box-shadow: 0 4px 12px rgba(13,115,119,0.3);
        }
        .nav-link {
            font-weight: 500; color: var(--text) !important; padding: 8px 16px !important;
            border-radius: 10px; transition: all 0.2s ease; margin: 0 2px;
        }
        .nav-link:hover { background: rgba(13,115,119,0.08); color: var(--primary) !important; }
        .btn {
            border-radius: 12px; padding: 10px 22px; font-weight: 600; border: none;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: -0.2px; position: relative; overflow: hidden;
        }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; box-shadow: 0 4px 15px rgba(13,115,119,0.25); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(13,115,119,0.35); }
        .btn-success { background: linear-gradient(135deg, #10b981, #34d399); color: white; box-shadow: 0 4px 15px rgba(16,185,129,0.25); }
        .btn-danger { background: linear-gradient(135deg, #ef4444, #f87171); color: white; box-shadow: 0 4px 15px rgba(239,68,68,0.25); }
        .btn-outline-primary { border: 2px solid var(--primary); color: var(--primary); background: transparent; }
        .btn-outline-primary:hover { background: var(--primary); color: white; }
        .btn-back {
            background: white; color: var(--text); border: 1px solid #e2e8f0;
            border-radius: 30px; padding: 8px 18px; font-weight: 500;
            display: flex; align-items: center; gap: 6px; cursor: pointer;
        }
        .btn-back:hover { background: #f1f5f9; transform: translateX(-3px); }
        .card {
            border: none; border-radius: var(--radius); background: var(--card);
            box-shadow: var(--shadow); transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(0,0,0,0.04); overflow: hidden;
        }
        .card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
        .card-body { padding: 1.75rem; }
        .dashboard-card {
            cursor: pointer; text-align: center; padding: 2rem 1.5rem;
            background: white; border-radius: var(--radius); transition: all 0.35s;
            border: 1px solid rgba(0,0,0,0.04); box-shadow: var(--shadow-sm);
            position: relative; overflow: hidden;
        }
        .dashboard-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: var(--card-color, var(--primary)); transition: height 0.3s ease;
        }
        .dashboard-card:hover::before { height: 6px; }
        .dashboard-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-xl); }
        .dashboard-card .icon { font-size: 3rem; margin-bottom: 1rem; transition: all 0.3s ease; }
        .dashboard-card:hover .icon { transform: scale(1.15) rotate(-5deg); }
        .dashboard-card h5 { font-weight: 700; margin-bottom: 0.25rem; }
        .dashboard-card .desc { color: var(--text-light); font-size: 0.85rem; }
        .dashboard-card.palliative { background: linear-gradient(135deg, #fff1f2, #ffe4e6); border-color: #fecdd3; }
        .dashboard-card.palliative::before { background: var(--danger); }
        .form-control, .form-select {
            border-radius: var(--radius-xs); border: 2px solid #e2e8f0;
            padding: 11px 16px; font-size: 0.95rem; background: #f8fafc;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--primary-light); box-shadow: 0 0 0 4px rgba(13,115,119,0.1);
            background: white; outline: none;
        }
        .form-range { height: 8px; }
        .form-range::-webkit-slider-thumb { width: 24px; height: 24px; background: var(--primary); box-shadow: 0 4px 12px rgba(13,115,119,0.3); cursor: pointer; }
        .clock-widget {
            background: linear-gradient(135deg, #1e293b, #334155);
            color: white; border-radius: var(--radius); padding: 2rem;
            text-align: center; box-shadow: var(--shadow-lg);
        }
        .clock-widget .time { font-size: 3rem; font-weight: 800; background: linear-gradient(135deg, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .clock-widget .date { color: #94a3b8; font-size: 0.95rem; font-weight: 500; }
        .calendar-widget {
            background: white; border-radius: var(--radius); padding: 1.25rem;
            box-shadow: var(--shadow); border: 1px solid rgba(0,0,0,0.04);
        }
        .calendar-widget .month-title { font-weight: 700; color: var(--primary); text-align: center; margin-bottom: 0.75rem; }
        .calendar-widget table { width: 100%; border-collapse: collapse; }
        .calendar-widget th { color: var(--text-light); font-weight: 600; font-size: 0.75rem; padding: 0.4rem; text-transform: uppercase; }
        .calendar-widget td { text-align: center; padding: 0.35rem; font-size: 0.85rem; border-radius: 8px; cursor: pointer; font-weight: 500; }
        .calendar-widget td:hover { background: #f1f5f9; }
        .calendar-widget td.today { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; font-weight: 700; box-shadow: 0 4px 12px rgba(13,115,119,0.3); }
        .badge-icd { background: linear-gradient(135deg, #e0f2fe, #bae6fd); color: #0369a1; font-weight: 600; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; }
        .palliative-badge { background: linear-gradient(135deg, #fecaca, #fca5a5); color: #991b1b; padding: 5px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.4)} 50%{box-shadow:0 0 0 8px rgba(239,68,68,0)} }
        .tmk-badge { background: linear-gradient(135deg, #c7d2fe, #a5b4fc); color: #3730a3; padding: 5px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; }
        .stat-card { text-align: center; padding: 1.75rem; background: white; border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid rgba(0,0,0,0.04); }
        .stat-card .stat-value { font-size: 2.5rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), #0ea5e9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-card .stat-label { color: var(--text-light); font-weight: 500; font-size: 0.9rem; }
        @keyframes fadeInUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
        .animate-fade-in-up { animation: fadeInUp 0.6s ease forwards; }
        .chat-bubble { max-width: 80%; padding: 12px 18px; border-radius: 18px; margin-bottom: 8px; animation: fadeInUp 0.3s ease; }
        .chat-bubble.doctor { background: #f1f5f9; margin-right: auto; border-bottom-left-radius: 4px; }
        .chat-bubble.parent { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; margin-left: auto; border-bottom-right-radius: 4px; }
        .faq-item { border-left: 3px solid var(--primary); padding: 1rem; margin-bottom: 1rem; background: white; border-radius: 0 var(--radius-sm) var(--radius-sm) 0; cursor: pointer; transition: all 0.3s; }
        .faq-item:hover { background: #e8f6f7; transform: translateX(5px); }
        footer { background: white; border-top: 1px solid #f1f5f9; padding: 1.5rem 0; text-align: center; }
        footer .footer-brand { font-weight: 700; color: var(--primary); }
        @media (max-width: 768px) { .clock-widget .time { font-size: 2rem; } }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top" id="navbar">
        <div class="container">
            <a class="navbar-brand" href="#" onclick="navigate('/dashboard')"><span class="brand-icon">🧬</span> Орфанный помощник</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="mainNav"><ul class="navbar-nav ms-auto" id="navMenu"></ul></div>
        </div>
    </nav>

    <div class="container my-4">
        <div class="d-flex justify-content-between align-items-center mb-3" id="breadcrumbBar" style="display:none;">
            <div id="breadcrumbPath" class="fw-medium"></div>
            <button class="btn-back" onclick="goBack()"><i class="bi bi-arrow-left"></i> Назад</button>
        </div>
        <div id="app"></div>
    </div>

    <footer>
        <p class="footer-brand mb-1">🧬 Орфанный помощник</p>
        <p class="text-muted small">Персональный ассистент по орфанным заболеваниям с паллиативным модулем</p>
        <p class="text-muted small">Разработчик: Истин А.А. © 2026 | Научный руководитель: д.м.н. Леднева В.С.</p>
    </footer>

    <div class="modal fade" id="notifyModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title fw-bold" id="notifyTitle"></h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body" id="notifyBody"></div>
                <div class="modal-footer"><button class="btn btn-primary" data-bs-dismiss="modal">OK</button></div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="addPatientModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title fw-bold">➕ Добавить нового пациента</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <form id="addPatientForm" onsubmit="event.preventDefault(); addPatientByDoctor();">
                        <div class="row">
                            <div class="col-md-6 mb-3"><label class="form-label fw-medium">ФИО пациента</label><input type="text" id="patName" class="form-control" required></div>
                            <div class="col-md-6 mb-3"><label class="form-label fw-medium">Дата рождения</label><input type="date" id="patBirth" class="form-control" required></div>
                            <div class="col-md-6 mb-3"><label class="form-label fw-medium">Диагноз</label><select id="patDiagnosis" class="form-select" required><option value="">Выберите...</option></select></div>
                            <div class="col-md-6 mb-3"><label class="form-label fw-medium">Статус диагноза</label><select id="patStatus" class="form-select"><option value="Подтвержден">Подтверждён</option><option value="На рассмотрении">На рассмотрении</option><option value="Подозрение">Подозрение</option></select></div>
                            <div class="col-md-6 mb-3"><label class="form-label fw-medium">СНИЛС</label><input type="text" id="patSnils" class="form-control"></div>
                            <div class="col-md-6 mb-3"><label class="form-label fw-medium">Полис ОМС</label><input type="text" id="patOms" class="form-control"></div>
                            <div class="col-md-12 mb-3"><label class="form-label fw-medium">Адрес</label><input type="text" id="patAddress" class="form-control"></div>
                            <div class="col-md-12 mb-3"><label class="form-label fw-medium">Генетический тест</label><input type="text" id="patGene" class="form-control" placeholder="Например: F508del/F508del"></div>
                            <div class="col-md-12 mb-3"><div class="form-check"><input type="checkbox" id="patPalliative" class="form-check-input"><label class="form-check-label">Паллиативный пациент</label></div></div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100"><i class="bi bi-person-plus"></i> Добавить пациента</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    // ============================================================
    //  НОВЫЙ КОД – АДАПТИРОВАННЫЙ ДЛЯ РАБОТЫ С СЕРВЕРОМ
    // ============================================================

    // === Утилиты ===
    const U = {
        genId: () => Date.now().toString(36) + Math.random().toString(36).substr(2),
        esc: (t) => { const d = document.createElement('div'); d.textContent = t || ''; return d.innerHTML; },
        notify: (title, msg, type = 'info') => {
            document.getElementById('notifyTitle').textContent = title;
            document.getElementById('notifyBody').innerHTML = msg;
            const h = document.querySelector('#notifyModal .modal-header');
            h.className = `modal-header bg-${type} text-white`;
            new bootstrap.Modal(document.getElementById('notifyModal')).show();
        },
        fmtDate: (d) => new Date(d).toLocaleDateString('ru-RU', { weekday:'long', day:'numeric', month:'long', year:'numeric' })
    };

    // === API-клиент ===
    const API = {
        async get(endpoint) {
            const res = await fetch(endpoint);
            if (!res.ok) throw new Error(await res.text());
            return res.json();
        },
        async post(endpoint, data) {
            const res = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (!res.ok) throw new Error(await res.text());
            return res.json();
        }
    };

    // === Аутентификация (храним текущего пользователя в памяти) ===
    let currentUser = null;

    const Auth = {
        cur: () => currentUser,
        async login(username, password) {
            const user = await API.post('/api/login', { username, password });
            currentUser = user;
            return user;
        },
        async register(data) {
            const user = await API.post('/api/register', data);
            currentUser = user;
            return user;
        },
        logout() {
            currentUser = null;
            navigate('/');
        }
    };

    // === Функции для работы с данными (все асинхронные) ===
    async function getRegistry() { return await API.get('/api/registry'); }
    async function addRegistryItem(item) { return await API.post('/api/registry', item); }

    async function getReports() { return await API.get('/api/reports'); }
    async function addReport(report) { return await API.post('/api/reports', report); }

    async function getDiary(userId) { return await API.get('/api/diary/' + userId); }
    async function addDiaryEntry(userId, entry) { return await API.post('/api/diary/' + userId, entry); }

    async function getPalliative(userId) { return await API.get('/api/palliative/' + userId); }
    async function addPalliativeEntry(userId, entry) { return await API.post('/api/palliative/' + userId, entry); }

    async function getMeds(userId) { return await API.get('/api/meds/' + userId); }
    async function addMed(userId, med) { return await API.post('/api/meds/' + userId, med); }

    async function getChat() { return await API.get('/api/chat'); }
    async function sendChatMessage(msg) { return await API.post('/api/chat', msg); }

    async function getUsers() { return await API.get('/api/users'); }
    async function updateUser(data) { return await API.post('/api/updateUser', data); }

    // === БАЗА ЗАБОЛЕВАНИЙ (без изменений) ===
    const DISEASES = [ /* ... весь массив из исходного файла ... */ ];
    const FAQ = [ /* ... весь массив из исходного файла ... */ ];

    // === НАВИГАЦИЯ (с асинхронным рендером) ===
    let page = window.location.hash.slice(1) || '/';
    let historyStack = [];

    function navigate(p, add = true) {
        if (add && page !== p && !['/login','/register','/'].includes(page)) historyStack.push(page);
        window.location.hash = '#' + p;
    }

    function goBack() {
        if (historyStack.length > 0) navigate(historyStack.pop(), false);
        else navigate(Auth.cur() ? '/dashboard' : '/');
    }

    function updateNav() {
        const nav = document.getElementById('navMenu');
        const u = Auth.cur();
        if (!u) {
            nav.innerHTML = `
                <li class="nav-item"><a class="nav-link" href="#" onclick="navigate('/login')">🔐 Войти</a></li>
                <li class="nav-item"><a class="nav-link" href="#" onclick="navigate('/register')">📝 Регистрация</a></li>
                <li class="nav-item"><a class="nav-link" href="#" onclick="navigate('/reference')">📚 Справочник</a></li>
                <li class="nav-item"><a class="nav-link" href="#" onclick="navigate('/faq')">❓ FAQ</a></li>
            `;
            return;
        }
        let items = '';
        if (u.role === 'parent') {
            items = `
                <li class="nav-item"><a class="nav-link" href="#" onclick="navigate('/dashboard')">🏠</a></li>
                <li class="nav-item"><a class="nav-link" href="#" onclick="navigate('/diary')">📋 Дневник</a></li>
                ${u.palliative ? '<li class="nav-item"><a class="nav-link" href="#" onclick="navigate(\'/palliative\')"><span class="palliative-badge">❤️ Паллиатив</span></a></li>' : ''}
                <li class="nav-item"><a class="nav-link" href="#" onclick="navigate('/medications')">💊 Лекарства</a></li>
                <li class="nav-item"><a class="nav-link" href="#" onclick="navigate('/chat')">💬 ТМК <span class="tmk-badge">Online</span></a></li>
                <li class="nav-item"><a class="nav-link" href="#" onclick="navigate('/reference')">📚 Справочник</a></li>
                <li class="nav-item"><a class="nav-link" href="#" onclick="navigate('/genetics')">🧬 Генетика</a></li>
                <li class="nav-item"><a class="nav-link" href="#" onclick="navigate('/faq')">❓ FAQ</a></li>
                <li class="nav-item"><a class="nav-link" href="#" onclick="navigate('/support')">❤️ Круг добра</a></li>
                <li class="nav-item"><a class="nav-link" href="#" onclick="navigate('/export')">📤 Отчёт</a></li>
            `;
        } else {
            items = `
                <li class="nav-item"><a class="nav-link" href="#" onclick="navigate('/dashboard')">🏠</a></li>
                <li class="nav-item"><a class="nav-link" href="#" onclick="navigate('/patients')">👥 Пациенты</a></li>
                <li class="nav-item"><a class="nav-link" href="#" onclick="navigate('/registry')">🏛️ Регистр</a></li>
                <li class="nav-item"><a class="nav-link" href="#" onclick="navigate('/analytics')">📈 Аналитика</a></li>
                <li class="nav-item"><a class="nav-link" href="#" onclick="navigate('/reference')">📚 Справочник</a></li>
                <li class="nav-item"><a class="nav-link" href="#" onclick="navigate('/genetics')">🧬 Генетика</a></li>
                <li class="nav-item"><a class="nav-link" href="#" onclick="navigate('/faq')">❓ FAQ</a></li>
            `;
        }
        items += `
            <li class="nav-item"><a class="nav-link" href="#" onclick="navigate('/profile')">👤</a></li>
            <li class="nav-item"><a class="nav-link text-danger" href="#" onclick="Auth.logout()">🚪</a></li>
        `;
        nav.innerHTML = items;
    }

    // === АСИНХРОННЫЙ РЕНДЕР ===
    async function render() {
        updateNav();
        const bar = document.getElementById('breadcrumbBar');
        const path = document.getElementById('breadcrumbPath');
        const names = {
            '/diary':'📋 Дневник',
            '/palliative':'❤️ Паллиатив',
            '/medications':'💊 Лекарства',
            '/chat':'💬 ТМК',
            '/reference':'📚 Справочник',
            '/genetics':'🧬 Генетика',
            '/faq':'❓ FAQ',
            '/registry':'🏛️ Регистр',
            '/analytics':'📈 Аналитика',
            '/profile':'👤 Профиль',
            '/patients':'👥 Пациенты',
            '/export':'📤 Отчёт',
            '/support':'❤️ Круг добра'
        };
        if (page === '/' || page === '/dashboard') {
            bar.style.display = 'none';
        } else {
            bar.style.display = 'flex';
            path.innerHTML = '🧬 Орфанный помощник → <strong>' + (names[page] || page) + '</strong>';
        }

        const app = document.getElementById('app');
        const u = Auth.cur();
        if (!u && !['/', '/login', '/register', '/reference', '/support', '/faq', '/genetics'].includes(page)) {
            navigate('/');
            return;
        }

        // Очищаем app и рендерим нужную страницу (все функции рендера теперь асинхронны)
        let html = '';
        switch (page) {
            case '/': html = renderWelcome(); break;
            case '/login': html = renderLogin(); break;
            case '/register': html = renderRegister(); break;
            case '/dashboard': html = await renderDashboard(); break;
            case '/diary': html = await renderDiary(); break;
            case '/palliative': html = await renderPalliative(); break;
            case '/medications': html = await renderMedications(); break;
            case '/chat': html = await renderChat(); break;
            case '/reference': html = renderReference(); break;
            case '/genetics': html = renderGenetics(); break;
            case '/faq': html = renderFAQ(); break;
            case '/support': html = renderSupport(); break;
            case '/registry': html = await renderRegistry(); break;
            case '/analytics': html = await renderAnalytics(); break;
            case '/export': html = renderExport(); break;
            case '/profile': html = await renderProfile(); break;
            case '/patients': html = await renderPatients(); break;

        }
        app.innerHTML = html;

        // Дополнительные инициализации после рендера
        if (page === '/dashboard') initDashboard();
        if (page === '/reference') filterDiseases();

        const u = Auth.cur();
        const fullName = document.getElementById('pn').value;
        const diagnosis = document.getElementById('pd')?.value || u.diagnosis;
        const palliative = document.getElementById('pp')?.checked || u.palliative;
        const newPassword = document.getElementById('pw').value;
        const data = { id: u.id, fullName, diagnosis, palliative };
        if (newPassword) data.password = newPassword;
        const updated = await updateUser(data);
        Auth.currentUser = updated; // обновляем текущего пользователя
        U.notify('Успех', 'Профиль обновлён', 'success');
        render();
    }

    async function saveDiary() {
        const u = Auth.cur();
        const today = new Date().toISOString().split('T')[0];
        const entry = {
            date: today,
            wellbeing: parseInt(document.querySelector('#app [type="range"]').value),
            weight: parseFloat(document.getElementById('dw').value),
            symptoms: document.getElementById('ds').value
        };
        await addDiaryEntry(u.id, entry);
        U.notify('✅ Сохранено', 'Запись сохранена', 'success');
    }

    async function savePalliative() {
        const u = Auth.cur();
        const today = new Date().toISOString().split('T')[0];
        const entry = {
            date: today,
            pain: parseInt(document.getElementById('pall_pain').value),
            appetite: parseInt(document.getElementById('pall_appetite').value),
            sleep: parseInt(document.getElementById('pall_sleep').value),
            mood: parseInt(document.getElementById('pall_mood').value),
            dyspnea: parseInt(document.getElementById('pall_dyspnea').value)
        };
        await addPalliativeEntry(u.id, entry);
        U.notify('✅ Сохранено', 'Запись сохранена', 'success');
    }

    async function addMed() {
        const u = Auth.cur();
        const n = prompt('Название:');
        const d = prompt('Дозировка:');
        const t = prompt('Время (08:00,13:00):');
        if (n && d && t) {
            const med = { name: n, dosage: d, schedule: t.split(',').map(x => ({ time: x.trim() })), quantity: 90 };
            await addMed(u.id, med);
            render();
        }
    }

    async function sendMsg() {
        const u = Auth.cur();
        const text = document.getElementById('ci').value.trim();
        if (!text) return;
        const msg = { from: u.role === 'doctor' ? 'doctor' : 'parent', text, ts: new Date().toISOString() };
        await sendChatMessage(msg);
        document.getElementById('ci').value = '';
        render();
    }

    async function sendReport() {
        const u = Auth.cur();
        const content = document.getElementById('rm').value.trim();
        if (!content) return;
        await addReport({ patientName: u.fullName || u.username, content, created: new Date().toISOString() });
        U.notify('✅ Отправлено', 'Отчёт отправлен врачу', 'success');
        document.getElementById('rm').value = '';
    }

    function filterDiseases() {
        const q = (document.getElementById('searchDisease')?.value || '').toLowerCase();
        const f = DISEASES.filter(d => d.name.toLowerCase().includes(q) || d.icd.toLowerCase().includes(q));
        const l = document.getElementById('diseaseList');
        if (l) {
            l.innerHTML = f.map(d => `<div class="col-md-4 mb-3"><div class="card" onclick="U.notify('${d.icon} ${d.name}','<p><strong>МКБ-10:</strong> ${d.icd}</p><p>${d.desc}</p><p><strong>Диагностика:</strong> ${d.diag}</p><p><strong>Лечение:</strong> ${d.treat}</p><p><strong>Ген:</strong> ${d.gene||'—'}</p><p><strong>Мутации:</strong> ${d.mutations||'—'}</p>','info')" style="cursor:pointer;"><div class="card-body"><div style="font-size:2rem;">${d.icon}</div><h6>${U.esc(d.name)}</h6><span class="badge-icd">${d.icd}</span></div></div></div>`).join('') || '<p>Ничего не найдено</p>';
        }
    }

    function showAddPatientModal() {
        const sel = document.getElementById('patDiagnosis');
        sel.innerHTML = '<option value="">Выберите...</option>' + DISEASES.map(d => `<option value="${d.id}">${d.icon} ${d.name}</option>`).join('');
        new bootstrap.Modal(document.getElementById('addPatientModal')).show();
    }

    async function addPatientByDoctor() {
        const patient = {
            patientId: U.genId(),
            fullName: document.getElementById('patName').value,
            diagnosis: document.getElementById('patDiagnosis').value,
            status: document.getElementById('patStatus').value,
            snils: document.getElementById('patSnils').value,
            oms: document.getElementById('patOms').value,
            address: document.getElementById('patAddress').value,
            birthDate: document.getElementById('patBirth').value,
            geneTest: document.getElementById('patGene').value,
            palliative: document.getElementById('patPalliative').checked,
            addedByDoctor: Auth.cur().id
        };
        await addRegistryItem(patient);
        bootstrap.Modal.getInstance(document.getElementById('addPatientModal')).hide();
        U.notify('✅ Добавлено', `Пациент ${U.esc(patient.fullName)} добавлен в регистр`, 'success');
        document.getElementById('addPatientForm').reset();
        if (page === '/patients') render();
    }

    function calcGenetics() {
        const f = document.getElementById('fatherStatus').value;
        const m = document.getElementById('motherStatus').value;
        let risk = 0;
        if (f === 'carrier' && m === 'carrier') risk = 25;
        else if ((f === 'carrier' && m === 'sick') || (f === 'sick' && m === 'carrier')) risk = 50;
        else if (f === 'sick' && m === 'sick') risk = 100;
        document.getElementById('genResult').innerHTML = `Вероятность: <strong>${risk}%</strong>`;
    }

    function submitToKrugDobra() {
        U.notify('Заявка сформирована', 'Заявка в Фонд «Круг добра» отправлена. Ожидайте ответа в течение 14 рабочих дней.', 'info');
    }

    async function exportCSV() {
        const r = await getRegistry();
        let csv = '\uFEFFФИО;Диагноз;Статус\n';
        r.forEach(p => {
            csv += `${p.fullName};${DISEASES.find(d=>d.id===p.diagnosis)?.name||p.diagnosis};${p.status}\n`;
        });
        const b = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(b);
        a.download = 'registry.csv';
        a.click();
    }

    async function exportExcel() {
        const r = await getRegistry();
        const data = r.map(p => ({
            'ФИО': p.fullName,
            'Диагноз': DISEASES.find(d => d.id === p.diagnosis)?.name || p.diagnosis,
            'Статус': p.status
        }));
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Регистр');
        XLSX.writeFile(wb, 'registry.xlsx');
    }

    async function exportPDF() {
        const u = Auth.cur();
        const diary = await getDiary(u.id);
        if (!diary.length) { U.notify('Ошибка', 'Нет данных', 'warning'); return; }
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text(`Дневник: ${u.fullName||u.username}`, 14, 20);
        doc.autoTable({
            head: [['Дата', 'Самочувствие', 'Вес']],
            body: diary.slice(-14).map(e => [e.date, e.wellbeing, e.weight]),
            startY: 30,
            headStyles: { fillColor: [13, 115, 119] }
        });
        doc.save(`diary_${u.id}.pdf`);
    }

    function showGeneDetail(id) {
        const d = DISEASES.find(x => x.id === id);
        if (!d) return;
        U.notify(`🧬 ${d.name}`, `<p><strong>Ген:</strong> ${d.gene||'Не указан'}</p><p><strong>Основные мутации:</strong> ${d.mutations||'Не указаны'}</p><p><strong>Алгоритм диагностики:</strong></p><p class="text-muted">${d.algorithm||'Не указан'}</p><hr><p><strong>Описание:</strong> ${d.desc}</p><p><strong>Лечение:</strong> ${d.treat}</p>`, 'info');
    }

    // === ЧАСЫ И КАЛЕНДАРЬ ===
    let clockInterval;

    function initDashboard() {
        function updateClock() {
            const n = new Date();
            const c = document.getElementById('liveClock');
            const d = document.getElementById('liveDate');
            if (c) c.textContent = n.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            if (d) d.textContent = n.toLocaleDateString('ru-RU', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        }
        updateClock();
        if (clockInterval) clearInterval(clockInterval);
        clockInterval = setInterval(updateClock, 1000);

        const cal = document.getElementById('miniCalendar');
        if (cal) {
            const n = new Date();
            const m = ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь', 'Июль', 'Август', 'Сентябрь', 'Окторябрь', 'Ноябрь', 'Декабрь'];
            const fd = new Date(n.getFullYear(), n.getMonth(), 1).getDay() || 7;
            const days = new Date(n.getFullYear(), n.getMonth() + 1, 0).getDate();
            let h = `<div class="month-title">${m[n.getMonth()]} ${n.getFullYear()}</div><table><tr><th>Пн</th><th>Вт</th><th>Ср</th><th>Чт</th><th>Пт</th><th>Сб</th><th>Вс</th></tr><tr>`;
            for (let i = 1; i < fd; i++) h += '<td></td>';
            for (let d = 1; d <= days; d++) {
                if ((fd + d - 1) % 7 === 1 && d > 1) h += '</tr><tr>';
                h += `<td class="${d === n.getDate() ? 'today' : ''}">${d}</td>`;
            }
            h += '</tr></table>';
            cal.innerHTML = h;
        }
    }

    // === ИНИЦИАЛИЗАЦИЯ (подписка на hashchange) ===
    window.addEventListener('hashchange', () => {
        page = window.location.hash.slice(1) || '/';
        if (clockInterval) clearInterval(clockInterval);
        render();
    });

    // Первый рендер
    render();
    </script>
</body>
